    // Up to Right (around the cross) smoothly turns the character without
    // requiring a finger lift.
    //
    // Restricted to D-pad arrows (up/down/left/right). Face buttons, shoulders,
    // and menu buttons don't fire-on-slide since they're discrete-tap actions.
    const DPAD_NAMES = new Set(['up', 'down', 'left', 'right']);
    // identifier -> currently-pressed D-pad name (or null if finger has left
    // the D-pad area entirely)
    const dpadDragState = new Map();

    // Seed dragState from any D-pad touchstart so touchmove knows what was
    // pressed first. Listening at the document level captures every touch
    // regardless of which hotzone it started on.
    document.addEventListener('touchstart', (e) => {
      for (const t of e.changedTouches) {
        const startName = hotzoneTouches.get(t.identifier);
        if (startName && DPAD_NAMES.has(startName)) {
          dpadDragState.set(t.identifier, startName);
        }
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      for (const t of e.changedTouches) {
        // Only act on touches that started on the D-pad.
        if (!dpadDragState.has(t.identifier)) continue;
        const current = dpadDragState.get(t.identifier);
        // Find what's under the finger right now. elementFromPoint walks the
        // hit-test stack; .hotzone elements sit at z-index 3 above the
        // controller frame's ::after overlay, so they're the topmost hit.
        const el = document.elementFromPoint(t.clientX, t.clientY);
        const hz = el && el.closest && el.closest('.hotzone');
        const overName = hz && hz.dataset.hot;
        // If finger is still on the same D-pad arrow, nothing to do.
        if (overName === current) continue;
        // If finger has moved onto a DIFFERENT D-pad arrow, swap: release
        // the previous one, press the new one. Diagonals are not synthesized
        // — the finger is over exactly one arrow at a time.
        if (overName && DPAD_NAMES.has(overName)) {
          // Release the old direction first so movement state is clean.
          if (current) {
            hotzoneTouches.delete(t.identifier);
            // Only release if no OTHER touch is still on the old hotzone.
            let stillHeld = false;
            for (const v of hotzoneTouches.values()) {
              if (v === current) { stillHeld = true; break; }
            }
            if (!stillHeld) applyHotzone(current, false);
          }
          // Press the new direction. Register the touch as belonging to the
          // new hotzone so a later touchend releases the correct one.
          hotzoneTouches.set(t.identifier, overName);
          dpadDragState.set(t.identifier, overName);
          applyHotzone(overName, true);
        }
        // Else: finger is in the gap between arrows. STICKY behavior —
        // keep the previously-pressed direction held so the slide between
        // arrows feels smooth (no stutter, no momentary stop). The
        // direction will only release when (a) the finger reaches a new
        // arrow (handled above), or (b) the finger lifts entirely
        // (handled by clearDpadDrag on touchend).
      }
    }, { passive: true });

    // Clean up the drag-state map AND release the D-pad direction when the
    // finger lifts. This is the global counterpart to the per-hotzone
    // touchend listener in bindHotzone() — needed because drag-to-turn
    // re-assigns a touch from arrow A to arrow B during slide, but the
    // touchend event fires against arrow A's element (where the touch
    // started). If the finger lifts while NOT over arrow A, arrow A's
    // listener never fires and the direction stays pressed forever ("keep
    // walking" bug). This document-level handler catches every release and
    // ensures the active D-pad direction is released cleanly.
    const clearDpadDrag = (e) => {
      for (const t of e.changedTouches) {
        // Always look up the touch in hotzoneTouches first — defends against
        // the case where dpadDragState's seed listener missed the touch
        // (e.g. modal opened/closed mid-press, touchstart raced with the
        // seed). Without this, a held direction can persist after release
        // ("sustained walk" bug). Release unconditionally if the touch is
        // tracked as holding a D-pad direction.
        const heldName = hotzoneTouches.get(t.identifier);
        if (heldName && DPAD_NAMES.has(heldName)) {
          hotzoneTouches.delete(t.identifier);
          let stillHeld = false;
          for (const v of hotzoneTouches.values()) {
            if (v === heldName) { stillHeld = true; break; }
          }
          if (!stillHeld) applyHotzone(heldName, false);
        }
        dpadDragState.delete(t.identifier);
      }
    };
    document.addEventListener('touchend',    clearDpadDrag, { passive: true });
    document.addEventListener('touchcancel', clearDpadDrag, { passive: true });

    // Belt-and-suspenders: every game frame, check that joyInput directions
    // match what hotzoneTouches says is held. If a direction is set in
    // joyInput but no touch is on it AND no key is, force-clear it. This
    // catches any sustained-walk leak that slips through both the per-element
    // listener and the document-level cleanup. Cheap — runs once per frame.
    function reconcileJoyInput() {
      for (const dir of DPAD_NAMES) {
        if (!joyInput[dir]) continue;
        let touchHeld = false;
        for (const v of hotzoneTouches.values()) {
          if (v === dir) { touchHeld = true; break; }
        }
        if (!touchHeld) joyInput[dir] = false;
      }
    }

    // ============ Update (per-frame movement + animation) ============
    // Frame-rate independent: position += direction × speed × deltaTime.
    function update(dt) {
      // Reconcile joystick input against actual touches every frame —
      // defensive cleanup for sustained-walk leak.
      reconcileJoyInput();

      // Combat animation ticker. Advances player.combatPhase based on elapsed
      // wall time (not dt-summed) so the animation runs at COMBAT_FRAME_MS
      // regardless of game tick rate. When phase exceeds the frame count,
      // the action is cleared and rendering returns to walk/fly.
      if (player.combatAction) {
        const elapsed = nowMs() - player.combatStartedAt;
        const phase = Math.floor(elapsed / COMBAT_FRAME_MS);
        if (phase >= COMBAT_FRAMES) {
          player.combatAction = null;
          player.combatPhase  = 0;
        } else {
          player.combatPhase = phase;
        }
      }

      // Combine keyboard + joystick — either source can drive movement.
      const moveLeft  = keyInput.left  || joyInput.left;
      const moveRight = keyInput.right || joyInput.right;
      const moveUp    = keyInput.up    || joyInput.up;
      const moveDown  = keyInput.down  || joyInput.down;

      let dx = 0, dy = 0;
      if (moveLeft)  dx -= 1;
      if (moveRight) dx += 1;
      if (moveUp)    dy -= 1;
      if (moveDown)  dy += 1;

      // Determine facing direction this frame. Horizontal beats vertical on diagonals
      // (classic JRPG feel). If no input, preserve last-known facing.
      let newFacing = null;
      if (dx < 0) newFacing = 'left';
      else if (dx > 0) newFacing = 'right';
      else if (dy < 0) newFacing = 'up';
      else if (dy > 0) newFacing = 'down';
      if (newFacing) player.facing = newFacing;

      // Movement-input flag. Set BEFORE the run/fly mode is computed so the
      // click-to-sustain logic can see whether the player is moving this frame.
      const inputActive = dx !== 0 || dy !== 0;
      player.isMoving = inputActive;

      // Normalize diagonal so 45° travel isn't √2 faster than cardinal.
      if (dx !== 0 && dy !== 0) {
        const invSqrt2 = 0.7071067811865475;
        dx *= invSqrt2;
        dy *= invSqrt2;
      }

      // Click-to-sustain run/fly: if a sustain toggle is active and the player
      // has moved during this session, clear the toggle the moment they stop.
      // Must run BEFORE currentRunMode() so the cleared toggles take effect
      // immediately this frame (no one-frame run/fly flash on stop).
      maybeClearToggles(inputActive);

      // Movement mode: walk → 1×, run → RUN_SCALE, fly → FLY_SCALE.
      // Same scale modifies animation FPS so feet/wings keep visual pace
      // with traversal.
      player.mode = currentRunMode();
      const modeScale = (player.mode === 'fly') ? FLY_SCALE
                       : (player.mode === 'run') ? RUN_SCALE
                       : 1;
      const speed = player.speed * modeScale;

      // Axis-separated movement with collision. Applying X and Y in two passes
      // (rather than one combined step) is what produces "sliding" — pressing
      // diagonally into a wall lets you keep moving along the unblocked axis.
      const moveStepX = dx * speed * dt;
      const moveStepY = dy * speed * dt;

      const tryX = player.x + moveStepX;
      if (!blocked(tryX, player.y)) {
        player.x = tryX;
      }
      const tryY = player.y + moveStepY;
      if (!blocked(player.x, tryY)) {
        player.y = tryY;
      }

      // Region transition — walking THROUGH a region border (e.g., pressing
      // up at the top edge of Central) hot-swaps the active region and
      // re-anchors the player at the opposite border of the new region.
      if (attemptRegionTransition(moveUp, moveDown)) return;

      // Animation step: advance the walk cycle whenever the player is INPUTTING
      // movement — even if collision blocked them this frame. "Marching in place"
      // against a wall reads as natural feedback ("I'm trying to walk, I just
      // can't go forward") rather than a frozen sprite that feels unresponsive.
      // Animation FPS scales with the mode so feet/wings keep pace with the
      // faster movement (otherwise running looks like a low-fps slide).
      // Fly mode advances the cycle ALL THE TIME — wings flap even while idle.
      if (inputActive || player.mode === 'fly') {
        const animFps = ANIM_FPS * modeScale;
        player.animTime += dt;
        player.animFrame = Math.floor(player.animTime * animFps) % ANIM_FRAMES;
      } else {
        player.animTime = 0;
        player.animFrame = 0;
      }

      // Idle progression — runs ONLY while standing still in walk mode (not
      // run/fly). Each pose plays for IDLE_POSE_DURATION seconds; on rollover
      // the pose advances top → bottom and HALTS on the final pose (the
      // sleeping one) — no wrap. The within-pose micro-anim still cycles its
      // 4 cols at IDLE_ANIM_FPS regardless of pose, so even on the final
      // sleeping pose the Z bobs up and out forever until input arrives.
      // Any movement resets the cycle back to pose 0 so the next idle session
      // starts fresh at the top of the sheet.
      // Gate idle on the post-combat suppression window: while suppressed,
      // the state machine doesn't tick (timer stays at 0) so when the
      // window expires the pose-0 standing breath starts fresh.
      const idleActive = !inputActive
                       && player.mode === 'walk'
                       && nowMs() >= player.idleSuppressedUntil;
      if (idleActive) {
        player.idlePoseTime += dt;
        if (player.idlePoseTime >= IDLE_POSE_DURATION) {
          if (player.idlePose < IDLE_SHEET.rowBases.length - 1) {
            player.idlePoseTime -= IDLE_POSE_DURATION;
            player.idlePose    += 1;
            player.idleAnimTime = 0;
          } else {
            // Already on the final pose — clamp the timer so it doesn't grow
            // unboundedly across long sleep sessions.
            player.idlePoseTime = IDLE_POSE_DURATION;
          }
        }
        player.idleAnimTime += dt;
        player.idleAnimFrame = Math.floor(player.idleAnimTime * IDLE_ANIM_FPS) % ANIM_FRAMES;
      } else {
        player.idlePose       = 0;
        player.idlePoseTime   = 0;
        player.idleAnimTime   = 0;
        player.idleAnimFrame  = 0;
      }
    }

    // ============ Camera update ============
    // Centers the viewport on the player, then clamps so it never reveals
    // anything outside the world bounds (no void-edge peeking).
    //
    // The camera position is ROUNDED to integer pixels. Without this, the
    // player's fractional sub-pixel coordinates flow into the camera and then
    // into every tile draw call. Drawing at fractional offsets triggers the
    // canvas's anti-aliased sampling — which exposes tile edges as visible
    // seam outlines that "shimmer" as the camera scrolls. Snapping to whole
    // pixels makes the seams disappear entirely (every tile lines up exactly).
    function updateCamera() {
      const targetX = player.x + CHAR_W / 2 - VIEWPORT_W / 2;
      const targetY = player.y + CHAR_H / 2 - VIEWPORT_H / 2;
      const maxCamX = MAP_WIDTH  * TILE_SIZE - VIEWPORT_W;
      const maxCamY = MAP_HEIGHT * TILE_SIZE - VIEWPORT_H;
      camera.x = Math.round(Math.max(0, Math.min(maxCamX, targetX)));
      camera.y = Math.round(Math.max(0, Math.min(maxCamY, targetY)));
    }

    // ============ Render ============
    function drawTiles() {
      // Tile the 32×32 grass across the map. Each cell gets a deterministic rotation
      // (0°, 90°, 180°, 270°) based on its (x, y) position — this breaks up the obvious
      // repeat pattern without sacrificing pixel-art crispness or needing new assets.
      // CAMERA: only loop over tiles inside the viewport (saves drawing the whole
      // 20×20 world when only 10×10 is ever visible).
      const half = TILE_SIZE / 2;
      const startX = Math.max(0, Math.floor(camera.x / TILE_SIZE));
      const endX   = Math.min(MAP_WIDTH  - 1, Math.floor((camera.x + VIEWPORT_W - 1) / TILE_SIZE));
      const startY = Math.max(0, Math.floor(camera.y / TILE_SIZE));
      const endY   = Math.min(MAP_HEIGHT - 1, Math.floor((camera.y + VIEWPORT_H - 1) / TILE_SIZE));
      for (let y = startY; y <= endY; y++) {
        for (let x = startX; x <= endX; x++) {
          // Deterministic per-tile rotation index, 0-3. Coprime multipliers (7, 13)
          // mod 4 keep the pattern visually random without obvious row/column repeats.
          const rot = ((x * 7 + y * 13) & 3) * (Math.PI / 2);
          const cx = x * TILE_SIZE + half - camera.x;
          const cy = y * TILE_SIZE + half - camera.y;
          // Tile type dispatch: 0 = grass (Central), 1 = ice (North).
          const tType = MAP_DATA.tiles[y][x];
          // Tile types: 0=grass (Central), 1=snow (North), 2=HQ floor, 3=lava (South)
          let tileAsset;
          if      (tType === 3) tileAsset = ASSETS.lava;
          else if (tType === 2) tileAsset = ASSETS.hqFloor;
          else if (tType === 1) tileAsset = ASSETS.snow;
          else                   tileAsset = ASSETS.grass;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(rot);
          ctx.drawImage(tileAsset, -half, -half);
          ctx.restore();
        }
      }
      // HQ region — draw the hugehouse art as a single big sprite filling
      // the top 1024 px (32 tiles) of the world. Renders AFTER tiles so the
      // building covers the floor, but BEFORE Y-sorted sprites so the player
      // can stand "in front of" it where Y-sort places them.
      if (currentRegion === 'hq' && ASSETS.houseHuge) {
        const sx = -camera.x;
        const sy = -camera.y;
        if (sx + HQ_BG_W >= 0 && sx < VIEWPORT_W && sy + HQ_BG_H >= 0 && sy < VIEWPORT_H) {
          ctx.drawImage(ASSETS.houseHuge, sx, sy, HQ_BG_W, HQ_BG_H);
        }
      }
    }

    // Y-sort sprite rendering: every overlapping object (player + trees + future
    // NPCs) is sorted by its "feet Y" (the bottom edge of its visual footprint)
    // and drawn lowest-feet-first. Result: a sprite whose feet are FURTHER DOWN
    // the screen is rendered LAST and appears in front, matching the 3/4-view
    // intuition that "lower on screen = closer to the viewer."
    // CAMERA: positions are stored in WORLD coords; subtract camera.x/y to get
    // screen coords at draw time. Off-screen sprites are culled.
    function drawWorld() {
      // Collect drawables with their sort key. World-space coords kept here.
      const drawables = [];
      for (const obj of MAP_DATA.objects) {
        if (obj.type === 'tree') {
          drawables.push({
            kind: 'tree',
            x: obj.x * TILE_SIZE,
            y: obj.y * TILE_SIZE,
            feetY: obj.y * TILE_SIZE + TREE_H,
          });
        } else if (HOUSE_TYPES[obj.type]) {
          const dims = HOUSE_TYPES[obj.type];
          drawables.push({
            kind: 'house',
            type: obj.type,
            x: obj.x * TILE_SIZE,
            y: obj.y * TILE_SIZE,
            feetY: obj.y * TILE_SIZE + dims.h,   // bottom of visual = feet line
            w: dims.w,
            h: dims.h,
            assetKey: dims.asset,
          });
        } else if (obj.type === 'ufo') {
          drawables.push({
            kind: 'ufo',
            x: obj.x * TILE_SIZE,
            y: obj.y * TILE_SIZE,
            feetY: obj.y * TILE_SIZE + UFO_H,
          });
        } else if (obj.type === 'tomb') {
          drawables.push({
            kind: 'tomb',
            x: obj.x * TILE_SIZE,
            y: obj.y * TILE_SIZE,
            variant: obj.variant || 0,
            feetY: obj.y * TILE_SIZE + TOMB_H,
          });
        }
      }
      for (const npc of NPCS) {
        if (npc.active === false) continue;   // docked: invisible in level
        if ((npc.region || 'central') !== currentRegion) continue;   // different region
        drawables.push({
          kind: 'npc',
          npc: npc,
          x: npc.x,
          y: npc.y,
          feetY: npc.y + npc.h,
        });
      }
      drawables.push({
        kind: 'player',
        x: player.x,
        y: player.y,
        feetY: player.y + CHAR_H,
      });
      drawables.sort((a, b) => a.feetY - b.feetY);

      for (const d of drawables) {
        // World → screen transform.
        const screenX = Math.round(d.x - camera.x);
        const screenY = Math.round(d.y - camera.y);

        if (d.kind === 'tree') {
          // Cull trees fully outside the viewport.
          if (screenX + TREE_W < 0 || screenX > VIEWPORT_W) continue;
          if (screenY + TREE_H < 0 || screenY > VIEWPORT_H) continue;
          ctx.drawImage(ASSETS.tree, screenX, screenY);
        } else if (d.kind === 'house') {
          if (screenX + d.w < 0 || screenX > VIEWPORT_W) continue;
          if (screenY + d.h < 0 || screenY > VIEWPORT_H) continue;
          const sprite = ASSETS[d.assetKey];
          if (sprite) ctx.drawImage(sprite, screenX, screenY);
        } else if (d.kind === 'tomb') {
          if (screenX + TOMB_W < 0 || screenX > VIEWPORT_W) continue;
          if (screenY + TOMB_H < 0 || screenY > VIEWPORT_H) continue;
          const sprite = ASSETS.tombFrames && ASSETS.tombFrames[d.variant];
          if (sprite) ctx.drawImage(sprite, screenX, screenY);
        } else if (d.kind === 'ufo') {
          if (screenX + UFO_W < 0 || screenX > VIEWPORT_W) continue;
          if (screenY + UFO_H < 0 || screenY > VIEWPORT_H) continue;
          if (ASSETS.ufo) ctx.drawImage(ASSETS.ufo, screenX, screenY);
          // When the player's adjacent, paint a "TAP A" prompt above the UFO.
          if (ufoState.adjacent) {
            const text  = 'INTERACT · TAP ENTER/A';
            ctx.font = "7px 'Cinzel', serif";
            const padX = 5, padY = 3;
            const tw = Math.ceil(ctx.measureText(text).width);
            const bw = tw + padX * 2, bh = 13;
            let bx = Math.round(screenX + UFO_W / 2 - bw / 2);
            let by = Math.round(screenY - bh - 3);
            if (bx < 2) bx = 2;
            if (bx + bw > VIEWPORT_W - 2) bx = VIEWPORT_W - 2 - bw;
            if (by < 2) by = Math.round(screenY + UFO_H + 3);
            ctx.fillStyle   = 'rgba(10, 6, 24, 0.88)';
            ctx.strokeStyle = '#e8c878';
            ctx.lineWidth   = 1;
            ctx.fillRect(bx, by, bw, bh);
            ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
            ctx.fillStyle    = '#f4e3b3';
            ctx.textBaseline = 'middle';
            ctx.textAlign    = 'left';
            ctx.fillText(text, bx + padX, by + bh / 2 + 0.5);
          }
        } else if (d.kind === 'npc') {
          const npc = d.npc;
          if (screenX + npc.w < 0 || screenX > VIEWPORT_W) continue;
          if (screenY + npc.h < 0 || screenY > VIEWPORT_H) continue;
          // Look up the NPC's frame set, then pick the current walk-cycle
          // frame for its current facing via its walkOrder mapping.
          const frameSet = ASSETS[npc.framesKey];
          if (frameSet) {
            const frames = frameSet[npc.facing];
            const order  = npc.walkOrder[npc.facing];
            if (frames && order) {
              const sprite = frames[order[npc.animFrame]];
              if (sprite) ctx.drawImage(sprite, screenX, screenY);
            }
          }
          // Cry balloon — drawn after the NPC sprite so it sits on top in z.
          drawCryBalloon(npc, screenX, screenY);
        } else if (d.kind === 'player') {
          // Dispatch on player.combatAction → player.mode → idle/walk/fly:
          //   combat (any action) → ASSETS.combatFrames[action]
          //                         (variable-width × 56 canvas — width grows
          //                         for beam frames; character anchored at
          //                         dest x=COMBAT_ANCHOR_X aligned to walk
          //                         box centerline; mirrored if facing left)
          //   idle (walk mode, no input) → ASSETS.idleFrames[pose][col]
          //                                (40×40 canvas, X off -4, Y off +5)
          //   walk → ASSETS.charFrames    (32×45 canvas, drawn at screenX,Y)
          //   run  → ASSETS.runFrames     (32×45 canvas, drawn at screenX,Y)
          //   fly  → ASSETS.flyFrames     (56×45 canvas, drawn at screenX-FLY_OFFSET_X)
          // Combat takes precedence so a punch fires visibly even mid-walk.
          if (player.combatAction && ASSETS.combatFrames) {
            const frames = ASSETS.combatFrames[player.combatAction];
            const sprite = frames && frames[player.combatPhase];
            if (sprite) {
              // Per-frame canvas width — varies because beam frames capture
              // a wider source crop. Anchor X within each canvas is the
              // constant COMBAT_ANCHOR_X so the character body stays in
              // the same screen-space spot frame-to-frame.
              const cw = sprite.width;
              const charCenterX = screenX + CHAR_W / 2;          // walk-box centerline
              const drawY = screenY + COMBAT_OFFSET_Y;            // push UP so combat feet = walk feet
              if (player.facing === 'left') {
                // Mirror horizontally. Anchor for the mirrored canvas is
                // (cw - COMBAT_ANCHOR_X) so the character body still lands
                // at charCenterX. Beam extends LEFT of character.
                const drawX = charCenterX - (cw - COMBAT_ANCHOR_X);
                ctx.save();
                ctx.translate(drawX + cw, drawY);
                ctx.scale(-1, 1);
                ctx.drawImage(sprite, 0, 0);
                ctx.restore();
              } else {
                // Right / up / down all play right-facing. Up/down dedicated
                // sprites can be added in a Phase B.6 pass.
                const drawX = charCenterX - COMBAT_ANCHOR_X;
                ctx.drawImage(sprite, drawX, drawY);
              }
            }
            // Combat draws over everything else this frame — skip the
            // walk/idle/fly fall-through.
            continue;
          }
          const isIdle = (player.mode === 'walk' && !player.isMoving);
          if (isIdle && ASSETS.idleFrames) {
            const pose   = ASSETS.idleFrames[player.idlePose];
            const sprite = pose && pose[player.idleAnimFrame];
            if (sprite) ctx.drawImage(sprite, screenX - IDLE_OFFSET_X, screenY + IDLE_OFFSET_Y);
          } else {
            let frameSet, order, drawX = screenX;
            if (player.mode === 'fly') {
              frameSet = ASSETS.flyFrames;
              order    = FLY_WALK_ORDER[player.facing];
              drawX    = screenX - FLY_OFFSET_X;
            } else if (player.mode === 'run') {
              frameSet = ASSETS.runFrames;
              order    = RUN_WALK_ORDER[player.facing];
            } else {
              frameSet = ASSETS.charFrames;
              order    = WALK_ORDER[player.facing];
            }
            if (frameSet && order) {
              const frames = frameSet[player.facing];
              const sprite = frames && frames[order[player.animFrame]];
              if (sprite) ctx.drawImage(sprite, drawX, screenY);
            }
          }
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawTiles();
      drawWorld();
    }

    // ============ Game loop ============
    let lastTime = 0;
    function loop(now) {
      // First frame has no dt; just record the timestamp and bail.
      if (lastTime === 0) { lastTime = now; requestAnimationFrame(loop); return; }
      let dt = (now - lastTime) / 1000;
      lastTime = now;
      // Cap dt to avoid huge jumps on tab-resume (capped to 50ms ≈ 20fps frame).
      if (dt > 0.05) dt = 0.05;
      // Skip world updates while a modal is open — the player can't walk,
      // NPC patrols freeze, animation stays on the current frame, time stands
      // still. render() still runs so the (frozen) world remains visible
      // behind the pause modal.
      if (!modalState.current) {
        update(dt);
        updateNPCs(dt);
        updateInteractions();
        updateUfoAdjacency();
        updateHugeHouseAdjacency();
        updateCamera();
      }
      render();
      requestAnimationFrame(loop);
    }

    // ============ Boot ============
    async function boot() {
      const fillEl = document.getElementById('loading-fill');
      const statusEl = document.getElementById('loading-status');
      try {
        await loadAllAssets((progress, message) => {
          fillEl.style.width = (progress * 100) + '%';
          statusEl.textContent = message;
        });
      } catch (e) {
        statusEl.textContent = 'Asset load failed — ' + e.message;
        console.error(e);
        return;
      }

      // Generate the player headshot for the map marker — cropped from the
      // walk sheet's DOWN row frame 0 (face visible). Saved as a data URL
      // and inlined onto the .map-marker background.
      setMapMarkerHeadshot();
      // North-region tile — wired to the real snow asset (assets/tile_snow.png).
      // The procedural makeIceTileCanvas fallback is retained below in case
      // the asset fails to load; falls back to it only when ASSETS.snow is
      // missing.
      if (!ASSETS.snow) ASSETS.snow = makeIceTileCanvas();
      // HQ floor tile — stone-path color so the area beneath the courtyard
      // art (and the south apron outside the gate) blends as paving.
      ASSETS.hqFloor = makeHqFloorTileCanvas();

      // Reveal the stage
      const loadingEl = document.getElementById('loading');
      setTimeout(() => { loadingEl.classList.add('done'); }, 250);

      // Kick off the game loop
      requestAnimationFrame(loop);
    }

    // Procedural HQ floor tile — warm stone color matching the courtyard
    // paving so the bottom apron (outside the gate) blends seamlessly into
    // the hugehouse art above. 32x32 with a few subtle paver hints.
    function makeHqFloorTileCanvas() {
      const c = document.createElement('canvas');
      c.width = TILE_SIZE; c.height = TILE_SIZE;
      const cctx = c.getContext('2d');
      const g = cctx.createLinearGradient(0, 0, 0, TILE_SIZE);
      g.addColorStop(0, '#b5a890');
      g.addColorStop(1, '#9b8e76');
      cctx.fillStyle = g;
      cctx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
      // A few darker grout flecks so it doesn't look like solid blocks.
      cctx.fillStyle = 'rgba(60, 50, 35, 0.25)';
      cctx.fillRect( 6,  4, 1, 1);
      cctx.fillRect(20,  9, 1, 1);
      cctx.fillRect(11, 18, 1, 1);
      cctx.fillRect(26, 22, 1, 1);
      cctx.fillRect(15, 27, 1, 1);
      return c;
    }

    // Procedural ice tile — fallback used if /assets/tile_snow.png fails to
    // load. Deterministic frost pattern at the base color; rendered into a
    // 32×32 canvas exactly like the real snow asset so the renderer doesn't
    // care which one it gets.
    function makeIceTileCanvas() {
      const c = document.createElement('canvas');
      c.width = TILE_SIZE; c.height = TILE_SIZE;
      const cctx = c.getContext('2d');
      // Base — icy blue vertical gradient.
      const g = cctx.createLinearGradient(0, 0, 0, TILE_SIZE);
      g.addColorStop(0, '#c8e0f0');
      g.addColorStop(1, '#9eb8d0');
      cctx.fillStyle = g;
      cctx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
      // Frost highlights (warm-white specks).
      cctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      cctx.fillRect( 4,  5, 2, 2);
      cctx.fillRect(20,  8, 1, 1);
      cctx.fillRect( 8, 24, 1, 1);
      cctx.fillRect(25, 18, 2, 1);
      cctx.fillRect(14,  3, 1, 1);
      // Cool-blue cracks/specks.
      cctx.fillStyle = 'rgba(40, 80, 120, 0.55)';
      cctx.fillRect( 2, 14, 1, 1);
      cctx.fillRect(16, 22, 1, 2);
      cctx.fillRect(28,  6, 1, 1);
      cctx.fillRect(11, 28, 2, 1);
      return c;
    }

    // ============ Region transition ============
    // Hot-swap MAP_DATA + COLLIDERS to a new region and re-anchor the player
    // at the opposite border (so coming in from the south of north places
    // them at the bottom of north, etc.). Resets animation/idle/B state
    // since the player's context just changed.
    function transitionRegion(toRegion) {
      if (!REGIONS[toRegion] || toRegion === currentRegion) return;
      const from = currentRegion;
      currentRegion = toRegion;
      MAP_DATA   = REGIONS[currentRegion];
      COLLIDERS  = buildColliders(MAP_DATA);
      if (from === 'central' && toRegion === 'north') {
        player.y = MAP_HEIGHT * TILE_SIZE - CHAR_H - 6;   // enter from south of north
      } else if (from === 'north' && toRegion === 'central') {
        player.y = 6;                                       // enter from north of central
      } else if (from === 'central' && toRegion === 'south') {
        player.y = 6;                                       // enter from north of south
      } else if (from === 'south' && toRegion === 'central') {
        player.y = MAP_HEIGHT * TILE_SIZE - CHAR_H - 6;   // enter from south of central
      } else if (from === 'central' && toRegion === 'hq') {
        // Stash the Central position so the HQ→Central return drops the
        // player right back at the gate they came from.
        hugeHouseState.lastWorldX = player.x;
        hugeHouseState.lastWorldY = player.y;
        // Spawn just south of the HQ gate gap — center x is roughly 640
        // (mid of 483..793 gap), Y just below the perimeter wall.
        player.x = 640 - CHAR_W / 2;
        player.y = 950;
      } else if (from === 'hq' && toRegion === 'central') {
        // Drop player back where they were in Central, just south of the
        // hugehouse gate.
        player.x = hugeHouseState.lastWorldX || (MAP_WIDTH  * TILE_SIZE) / 2 - CHAR_W / 2;
        player.y = hugeHouseState.lastWorldY || (MAP_HEIGHT * TILE_SIZE) / 2 - CHAR_H / 2;
      }
      // Reset transient state so the new region starts clean.
      player.animTime = 0; player.animFrame = 0;
      player.idlePose = 0; player.idlePoseTime = 0; player.idleAnimTime = 0; player.idleAnimFrame = 0;
      resetBState();
      updateCamera();
    }
    // Detect whether the player is at a region border AND pressing into it.
    // Called from update() once per frame. Also exposed for the A/Enter
    // interact button so the player can confirm a transition manually.
    function attemptRegionTransition(moveUp, moveDown) {
      if (currentRegion === 'central' && player.y <= 4 && moveUp) {
        transitionRegion('north');
        return true;
      }
      if (currentRegion === 'central' && player.y >= MAP_HEIGHT * TILE_SIZE - CHAR_H - 4 && moveDown) {
        transitionRegion('south');
        return true;
      }
      if (currentRegion === 'north' && player.y >= MAP_HEIGHT * TILE_SIZE - CHAR_H - 4 && moveDown) {
        transitionRegion('central');
        return true;
      }
      if (currentRegion === 'south' && player.y <= 4 && moveUp) {
        transitionRegion('central');
        return true;
      }
      if (currentRegion === 'hq' && player.y >= MAP_HEIGHT * TILE_SIZE - CHAR_H - 4 && moveDown) {
        transitionRegion('central');
        return true;
      }
      return false;
    }
    function regionExitReady() {
      if (currentRegion === 'central' && player.y <= 8) return 'north';
      if (currentRegion === 'central' && player.y >= MAP_HEIGHT * TILE_SIZE - CHAR_H - 8) return 'south-enter';
      if (currentRegion === 'north'   && player.y >= MAP_HEIGHT * TILE_SIZE - CHAR_H - 8) return 'south';
      if (currentRegion === 'south'   && player.y <= 8) return 'central-from-south';
      if (currentRegion === 'hq'      && player.y >= MAP_HEIGHT * TILE_SIZE - CHAR_H - 8) return 'central-from-hq';
      return null;
    }

    // Crop the player's head from the walk sheet (DOWN row frame 0, top
    // portion = head + hair). Bakes it into a small canvas, converts to a
    // data URL, then sets it as the .map-marker background. Called once at
    // boot after assets load.
    function setMapMarkerHeadshot() {
      const sheetImg = ASSETS.sheet;
      const marker   = document.getElementById('map-marker');
      if (!sheetImg || !marker) return;
      // Source region: DOWN row frame 0 head zone. The walk sheet's DOWN
      // content y range is 942..1196; head sits in the top third (y~942-1080).
      // Frame 0 x range is centered on SHEET.cols[0]=336, frameW=200 → x=236..436.
      // Tighter head crop: x=276..396, y=940..1080.
      const SRC = { x: 276, y: 940, w: 120, h: 140 };
      const SIZE = 64;   // bake at 64×64 for crisp scaling at the 32px CSS size
      const c = document.createElement('canvas');
      c.width = SIZE; c.height = SIZE;
      const cctx = c.getContext('2d');
      cctx.imageSmoothingEnabled = true;
      cctx.imageSmoothingQuality = 'high';
      // Aspect-preserving fit, centered.
      const scale = Math.min(SIZE / SRC.w, SIZE / SRC.h);
      const dW = Math.round(SRC.w * scale);
      const dH = Math.round(SRC.h * scale);
      const dX = Math.floor((SIZE - dW) / 2);
      const dY = Math.floor((SIZE - dH) / 2);
      cctx.drawImage(sheetImg, SRC.x, SRC.y, SRC.w, SRC.h, dX, dY, dW, dH);
      // Chroma-out the sheet's near-white BG so the head reads on the dark
      // map background instead of carrying a white halo into the circle.
      chromaKeyExteriorWhite(c, 235);
      const url = c.toDataURL();
      marker.style.backgroundImage    = `url(${url})`;
      marker.style.backgroundSize     = 'cover';
      marker.style.backgroundPosition = 'center';
    }

    boot();
  </script>
</body>
</html>

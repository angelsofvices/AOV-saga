<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Viridia — Planet 27 of the Aethryx Expanse. The Final World. Mythological heart of The AOV Saga." />
  <title>Viridia — The Final World · The AOV Saga</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ---------- Reset & Tokens ---------- */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #050310;
      --void-2: #0a0618;
      --indigo-deep: #1a0d3a;
      --purple-cosmic: #2b1758;
      --purple-soft: #4a2d8a;
      --emerald: #2fe6a8;
      --emerald-deep: #0f8a66;
      --emerald-glow: rgba(47, 230, 168, 0.25);
      --gold: #e8c878;
      --gold-bright: #f5dc9c;
      --gold-deep: #b8923f;
      --ivory: #f3ecdc;
      --mist: #b8aec8;
      --mist-deep: #6f6582;
      --border: rgba(232, 200, 120, 0.18);
      --border-soft: rgba(232, 200, 120, 0.08);
      --border-emerald: rgba(47, 230, 168, 0.22);
      --glass: rgba(20, 12, 38, 0.55);
      --glass-strong: rgba(28, 16, 54, 0.72);

      --font-display: 'Cinzel', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-meta: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--void);
      color: var(--ivory);
      line-height: 1.7;
      font-size: 18px;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }

    .cosmos {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 25% 12%, rgba(15, 138, 102, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(74, 45, 138, 0.28) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(43, 23, 88, 0.5) 0%, transparent 60%),
        linear-gradient(180deg, #050310 0%, #0a0618 50%, #050310 100%);
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .stars::before, .stars::after {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        radial-gradient(1px 1px at 23% 17%, rgba(243, 236, 220, 0.9), transparent),
        radial-gradient(1px 1px at 67% 41%, rgba(47, 230, 168, 0.7), transparent),
        radial-gradient(1.5px 1.5px at 84% 73%, rgba(243, 236, 220, 0.85), transparent),
        radial-gradient(1px 1px at 12% 83%, rgba(243, 236, 220, 0.6), transparent),
        radial-gradient(1px 1px at 45% 28%, rgba(47, 230, 168, 0.5), transparent),
        radial-gradient(1px 1px at 91% 12%, rgba(243, 236, 220, 0.7), transparent),
        radial-gradient(1px 1px at 38% 64%, rgba(232, 200, 120, 0.55), transparent),
        radial-gradient(2px 2px at 76% 88%, rgba(243, 236, 220, 0.95), transparent),
        radial-gradient(1px 1px at 8% 38%, rgba(243, 236, 220, 0.5), transparent),
        radial-gradient(1px 1px at 58% 5%, rgba(47, 230, 168, 0.45), transparent);
      background-size: 600px 600px;
      animation: drift 240s linear infinite;
      opacity: 0.85;
    }

    .stars::after {
      background-size: 900px 900px;
      animation-duration: 380s;
      animation-direction: reverse;
      opacity: 0.5;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-300px, -300px, 0); }
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        repeating-radial-gradient(circle at 17% 32%, rgba(243, 236, 220, 0.4) 0, transparent 1px, transparent 3px),
        repeating-radial-gradient(circle at 67% 78%, rgba(243, 236, 220, 0.3) 0, transparent 1px, transparent 4px);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
    }

    .narrow {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 96px 0;
      position: relative;
    }

    .eyebrow {
      font-family: var(--font-meta);
      text-transform: uppercase;
      letter-spacing: 0.42em;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--emerald);
      opacity: 0.85;
      margin-bottom: 20px;
    }

    .eyebrow.gold { color: var(--gold); }

    .eyebrow::before, .eyebrow::after {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: currentColor;
      vertical-align: middle;
      margin: 0 14px;
      opacity: 0.6;
    }

    h1, h2, h3 {
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    h2 {
      font-size: 1.75rem;
      color: var(--ivory);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    h3 {
      font-size: 1.2rem;
      color: var(--ivory);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    p {
      color: var(--mist);
      margin-bottom: 16px;
    }

    .lead {
      font-size: 1.18rem;
      color: var(--ivory);
      opacity: 0.92;
      font-style: italic;
      line-height: 1.7;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
    }

    .hero-meta {
      font-family: var(--font-meta);
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--emerald);
      opacity: 0.75;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(3rem, 12vw, 7rem);
      line-height: 0.95;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
      background: linear-gradient(180deg, #c4f5e0 0%, var(--emerald) 50%, var(--emerald-deep) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: hero-glow 6s ease-in-out infinite alternate;
    }

    @keyframes hero-glow {
      from { filter: drop-shadow(0 0 20px rgba(47, 230, 168, 0.18)); }
      to { filter: drop-shadow(0 0 40px rgba(47, 230, 168, 0.4)); }
    }

    .hero-tagline {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--ivory);
      opacity: 0.7;
      margin-bottom: 36px;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .hero-divider .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--emerald), transparent);
    }

    .hero-divider .diamond {
      width: 6px;
      height: 6px;
      background: var(--emerald);
      transform: rotate(45deg);
      box-shadow: 0 0 12px var(--emerald);
    }

    .hero-quote {
      font-family: var(--font-body);
      font-style: italic;
      font-size: clamp(1.05rem, 2.5vw, 1.3rem);
      color: var(--ivory);
      max-width: 600px;
      margin: 0 auto;
      opacity: 0.9;
    }

    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-meta);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--mist-deep);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 36px;
      background: linear-gradient(180deg, var(--mist-deep), transparent);
      margin: 12px auto 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    .section-head {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-head .lead {
      max-width: 560px;
      margin: 0 auto;
    }

    .prose p {
      font-size: 1.05rem;
      color: var(--mist);
      margin-bottom: 22px;
      line-height: 1.85;
    }

    .prose p:first-of-type::first-letter {
      font-family: var(--font-display);
      font-size: 3.4rem;
      float: left;
      line-height: 0.9;
      padding: 6px 12px 0 0;
      color: var(--emerald);
      font-weight: 600;
    }

    .prose .pullquote {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--emerald);
      text-align: center;
      padding: 36px 24px;
      margin: 32px 0;
      border-top: 1px solid var(--border-emerald);
      border-bottom: 1px solid var(--border-emerald);
      line-height: 1.4;
      font-style: normal;
    }

    .veil-block {
      background:
        radial-gradient(circle at 50% 0%, rgba(47, 230, 168, 0.08), transparent 70%),
        var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-emerald);
      border-radius: 4px;
      padding: 48px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .veil-block::before, .veil-block::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
    }

    .veil-block::before { top: 0; background: linear-gradient(90deg, transparent, var(--emerald), transparent); opacity: 0.5; }
    .veil-block::after { bottom: 0; background: linear-gradient(90deg, transparent, var(--emerald), transparent); opacity: 0.5; }

    .veil-diagram {
      width: 200px;
      height: 200px;
      margin: 0 auto 28px;
      animation: veil-rotate 60s linear infinite;
    }

    @keyframes veil-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .veil-splits {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 520px;
      margin: 32px auto 0;
      text-align: left;
    }

    .veil-split {
      font-family: var(--font-meta);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mist);
      padding: 10px 14px;
      border: 1px solid var(--border-soft);
      border-radius: 2px;
      background: rgba(5, 3, 16, 0.4);
    }

    .veil-split .num {
      color: var(--emerald);
      margin-right: 8px;
      font-weight: 500;
    }

    .realms {
      display: grid;
      gap: 24px;
    }

    .realm-card {
      position: relative;
      padding: 40px 28px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .realm-card[data-realm="virtue"] {
      --r-glow: var(--gold);
      --r-glow-soft: rgba(232, 200, 120, 0.28);
    }

    .realm-card[data-realm="vice"] {
      --r-glow: #b87cff;
      --r-glow-soft: rgba(184, 124, 255, 0.28);
    }

    .realm-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 4px;
      box-shadow: 0 0 0 1px transparent, 0 0 50px transparent;
      transition: all 0.6s;
      pointer-events: none;
    }

    .realm-card:hover {
      transform: translateY(-3px);
      background: var(--glass-strong);
    }

    .realm-card:hover::after {
      box-shadow: 0 0 0 1px var(--r-glow), 0 0 60px var(--r-glow-soft);
    }

    .realm-glyph {
      width: 48px;
      height: 48px;
      margin-bottom: 24px;
      color: var(--r-glow);
      filter: drop-shadow(0 0 12px var(--r-glow-soft));
    }

    .realm-tag {
      font-family: var(--font-meta);
      font-size: 0.65rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--r-glow);
      opacity: 0.85;
      margin-bottom: 10px;
    }

    .realm-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ivory);
      margin-bottom: 8px;
    }

    .realm-sub {
      font-family: var(--font-meta);
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mist-deep);
      margin-bottom: 22px;
    }

    .realm-desc {
      font-size: 1rem;
      color: var(--mist);
      line-height: 1.75;
    }

    .realm-traits {
      list-style: none;
      margin-top: 18px;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .realm-traits li {
      font-family: var(--font-meta);
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--r-glow);
      padding: 6px 10px;
      border: 1px solid var(--r-glow-soft);
      border-radius: 2px;
      opacity: 0.85;
    }.location-grid {
      display: grid;
      gap: 20px;
    }

    .location-card {
      position: relative;
      padding: 28px 24px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .location-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 4px;
      box-shadow: 0 0 0 1px transparent, 0 0 36px transparent;
      transition: all 0.5s;
      pointer-events: none;
    }

    .location-card:hover {
      transform: translateY(-3px);
      background: var(--glass-strong);
    }

    .location-card:hover::after {
      box-shadow: 0 0 0 1px var(--loc-glow, var(--emerald)), 0 0 50px var(--loc-glow-soft, rgba(47, 230, 168, 0.22));
    }

    .location-card[data-mood="sacred"] { --loc-glow: var(--emerald);  --loc-glow-soft: rgba(47, 230, 168, 0.25); }
    .location-card[data-mood="wild"]   { --loc-glow: #6fb3ff;         --loc-glow-soft: rgba(111, 179, 255, 0.25); }
    .location-card[data-mood="dark"]   { --loc-glow: #9b3a4f;         --loc-glow-soft: rgba(155, 58, 79, 0.32); }
    .location-card[data-mood="modern"] { --loc-glow: var(--gold);     --loc-glow-soft: rgba(232, 200, 120, 0.25); }

    .location-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      gap: 12px;
    }

    .location-type {
      font-family: var(--font-meta);
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mist-deep);
    }

    .location-philosophy {
      font-family: var(--font-meta);
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--loc-glow, var(--emerald));
      white-space: nowrap;
    }

    .location-name {
      font-family: var(--font-display);
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ivory);
      margin-bottom: 14px;
      line-height: 1.25;
    }

    .location-desc {
      font-size: 0.97rem;
      color: var(--mist);
      line-height: 1.7;
      flex-grow: 1;
    }

    .khronexus {
      position: relative;
      padding: 60px 32px;
      background:
        radial-gradient(circle at 50% 0%, rgba(155, 58, 79, 0.18), transparent 60%),
        rgba(15, 6, 24, 0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(155, 58, 79, 0.3);
      border-radius: 4px;
      text-align: center;
      overflow: hidden;
    }

    .khronexus::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #9b3a4f, transparent);
    }

    .khronexus .eyebrow { color: #c97a8c; }
    .khronexus h2 { color: var(--ivory); }

    .khronexus .lead {
      max-width: 540px;
      margin: 0 auto 24px;
      color: #d8c3cf;
    }

    .khronexus-traits {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
    }

    .khronexus-traits span {
      font-family: var(--font-meta);
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c97a8c;
      padding: 8px 14px;
      border: 1px solid rgba(155, 58, 79, 0.3);
      border-radius: 2px;
    }

    .inhabitants {
      display: grid;
      gap: 16px;
    }

    .codex-card {
      position: relative;
      padding: 24px 22px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    .codex-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 4px;
      box-shadow: 0 0 0 1px transparent, 0 0 36px transparent;
      transition: all 0.5s;
      pointer-events: none;
    }

    .codex-card:hover {
      transform: translateY(-3px);
      background: var(--glass-strong);
    }

    .codex-card:hover::after {
      box-shadow: 0 0 0 1px var(--codex-glow, var(--gold)), 0 0 50px var(--codex-glow-soft, rgba(232, 200, 120, 0.22));
    }

    .codex-card[data-cat="divine"]   { --codex-glow: var(--gold);     --codex-glow-soft: rgba(232, 200, 120, 0.32); }
    .codex-card[data-cat="virtue"]   { --codex-glow: var(--emerald);  --codex-glow-soft: rgba(47, 230, 168, 0.25); }
    .codex-card[data-cat="vice"]     { --codex-glow: #b87cff;         --codex-glow-soft: rgba(184, 124, 255, 0.28); }
    .codex-card[data-cat="legend"]   { --codex-glow: #d49656;         --codex-glow-soft: rgba(212, 150, 86, 0.25); }
    .codex-card[data-cat="creature"] { --codex-glow: #5fe6d8;         --codex-glow-soft: rgba(95, 230, 216, 0.22); }

    .codex-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      gap: 12px;
    }

    .codex-id {
      font-family: var(--font-meta);
      font-size: 0.58rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mist-deep);
    }

    .codex-tier {
      font-family: var(--font-display);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--codex-glow, var(--gold));
      white-space: nowrap;
    }

    .codex-name {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ivory);
      margin-bottom: 6px;
      line-height: 1.25;
    }

    .codex-tag {
      font-family: var(--font-meta);
      font-size: 0.6rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--codex-glow, var(--gold));
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .codex-lore {
      font-size: 0.9rem;
      color: var(--mist);
      line-height: 1.6;
      font-style: italic;
      margin-top: auto;
    }

    .continue {
      display: grid;
      gap: 16px;
      margin-top: 40px;
    }

    .continue-card {
      display: block;
      padding: 28px 24px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.4s ease;
      position: relative;
    }

    .continue-card:hover {
      border-color: var(--border);
      background: var(--glass-strong);
      transform: translateY(-2px);
    }

    .continue-eyebrow {
      font-family: var(--font-meta);
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .continue-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ivory);
      margin-bottom: 8px;
    }

    .continue-tag {
      font-size: 0.95rem;
      color: var(--mist);
      font-style: italic;
    }

    .continue-card .arrow {

      left: 50%;
      transform: translateX(-50%);

      height: 20px;

    .menu-toggle:hover {

    .menu-toggle .bar {

    .menu-backdrop {

    .menu-backdrop.open {

    .menu-drawer {

      right: 0;
      bottom: 0;
      width: 75%;

      flex-direction: column;
      padding: 90px 32px 40px;
      overflow-y: auto;

    .menu-drawer.open {
      transform: translateX(0);

    .menu-drawer::before {

      top: 0;
      left: 0;
      right: 0;
      height: 1px;

    .menu-list li {

      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);

    .menu-drawer.open .menu-list li { opacity: 1; transform: translateX(0); }
    .menu-drawer.open .menu-list li:nth-child(1) { transition-delay: 0.15s; }
    .menu-drawer.open .menu-list li:nth-child(2) { transition-delay: 0.22s; }
    .menu-drawer.open .menu-list li:nth-child(3) { transition-delay: 0.29s; }
    .menu-drawer.open .menu-list li:nth-child(4) { transition-delay: 0.36s; }
    .menu-drawer.open .menu-list li:nth-child(5) { transition-delay: 0.43s; }
    .menu-drawer.open .menu-list li:nth-child(6) { transition-delay: 0.50s; }

    .menu-link {
      display: block;
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ivory);
      text-decoration: none;
      padding: 18px 0;
      border-bottom: 1px solid var(--border-soft);
      position: relative;
      transition: color 0.35s ease, padding-left 0.35s ease;
    }

    .menu-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .menu-link:hover, .menu-link.active {
      color: var(--gold);
      padding-left: 28px;
    }

    .menu-link:hover::before, .menu-link.active::before { width: 18px; }

    .menu-sigil {
      margin-top: auto;
      padding-top: 40px;
      text-align: center;
      opacity: 0.4;
    }

    .menu-sigil svg { width: 28px; height: 28px; }

    body.menu-open { overflow: hidden; }

    @media (min-width: 560px) {

    @media (min-width: 720px) {

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

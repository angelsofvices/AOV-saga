<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="AOV™ Saga: Realms — 2D action prototype with Adventure (side-scroller) and Tournament (2D fighter) modes." />
  <title>Realms · The AOV Saga</title>
  <meta name="theme-color" content="#050310">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #050310;
      --navy: #1a1a2e;
      --navy-mid: #232342;
      --gold: #c9a961;
      --gold-bright: #f4e3b3;
      --gold-pale: #e8c878;
      --gold-deep: #8a6d2c;
      --mist: #c8c2dc;
      --mist-deep: #7a7390;
      --crimson: #d34c4c;
      --emerald: #4ec97c;
      --cosmic-blue: #6fa3e8;
      --purple: #b08bff;
      --font-display: 'Cinzel', 'Trajan Pro', serif;
      --font-meta: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    [hidden] { display: none !important; }
    body {
      font-family: var(--font-meta);
      background: radial-gradient(ellipse at top, #1c1432 0%, var(--void) 65%);
      color: var(--mist);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0.01em;
    }
    .app { max-width: 1280px; margin: 0 auto; padding: 12px 16px; }
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; border-bottom: 1px solid rgba(232, 200, 120, 0.15);
      margin-bottom: 14px;
    }
    .nav-back {
      font-family: var(--font-meta); font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold-pale); text-decoration: none;
      padding: 6px 12px; border: 1px solid rgba(232, 200, 120, 0.3); border-radius: 4px;
    }
    .nav-back:hover { background: rgba(232, 200, 120, 0.08); }
    .nav-title {
      font-family: var(--font-display); letter-spacing: 0.18em;
      color: var(--gold-bright); font-size: 0.95rem;
    }

    /* ============ Title screen ============ */
    .title-screen {
      min-height: 78vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; gap: 18px;
    }
    .title-eyebrow {
      font-family: var(--font-meta); font-size: 0.6rem; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--gold); opacity: 0.85;
    }
    .title-h1 {
      font-family: var(--font-display); font-size: clamp(2.2rem, 9vw, 5rem);
      letter-spacing: 0.1em;
      background: linear-gradient(180deg, var(--gold-pale) 0%, var(--gold) 50%, var(--gold-deep) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 22px rgba(232, 200, 120, 0.22));
    }
    .title-tagline {
      font-family: var(--font-meta); font-size: 0.7rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--mist); opacity: 0.85;
      max-width: 640px; line-height: 1.6;
    }
    .title-divider { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
    .title-divider .line { width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .title-divider .diamond { width: 8px; height: 8px; background: var(--gold-bright);
      transform: rotate(45deg); box-shadow: 0 0 12px var(--gold); }

    /* ============ Mode picker ============ */
    .mode-pick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
      max-width: 760px;
      width: 100%;
    }
    .mode-btn {
      display: flex; flex-direction: column; gap: 6px; align-items: center;
      padding: 26px 18px;
      background: linear-gradient(160deg, rgba(20,14,44,0.85), rgba(10,6,24,0.65));
      border: 1px solid var(--gold);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--gold-bright);
    }
    .mode-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.55), 0 0 26px rgba(232,200,120,0.28);
      background: linear-gradient(160deg, rgba(232,200,120,0.12), rgba(10,6,24,0.65));
    }
    .mode-pill {
      font-family: var(--font-meta); font-size: 0.55rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--gold-pale); opacity: 0.85;
      padding: 3px 8px; border: 1px solid rgba(232,200,120,0.3); border-radius: 12px;
    }
    .mode-name {
      font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.14em;
      color: var(--gold-bright);
    }
    .mode-tag {
      font-family: var(--font-meta); font-size: 0.62rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--mist); opacity: 0.85;
      max-width: 280px; line-height: 1.45;
    }
    .btn-secondary {
      font-family: var(--font-meta); font-size: 0.62rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--mist); background: transparent;
      border: 1px solid rgba(232, 200, 120, 0.35); border-radius: 4px;
      padding: 10px 20px; cursor: pointer;
    }
    .btn-secondary:hover { background: rgba(232, 200, 120, 0.08); color: var(--gold-bright); }

    @media (max-width: 560px) {
      .mode-pick { grid-template-columns: 1fr; }
      .mode-name { font-size: 1.3rem; }
    }

    /* ============ Game stage (canvas) ============ */
    .stage {
      position: relative;
      max-width: 1080px; margin: 0 auto;
      background: #000;
      border: 1px solid rgba(232, 200, 120, 0.3);
      border-radius: 6px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.55);
      aspect-ratio: 16 / 9;
    }
    .stage canvas {
      display: block; width: 100%; height: 100%;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
    }
    .stage-hud {
      position: absolute; top: 8px; left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-meta); font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--gold-pale);
      pointer-events: none;
    }
    .stage-hud .btn-secondary { pointer-events: auto; }
    .placeholder-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 30px;
      background: linear-gradient(180deg, rgba(5,3,16,0.95), rgba(20,14,44,0.85));
      text-align: center;
    }
    .placeholder-overlay .label {
      font-family: var(--font-meta); font-size: 0.6rem; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--gold);
    }
    .placeholder-overlay h2 {
      font-family: var(--font-display); font-size: clamp(1.6rem, 5vw, 2.6rem); letter-spacing: 0.15em;
      color: var(--gold-bright);
    }
    .placeholder-overlay p { max-width: 520px; line-height: 1.55; font-size: 0.85rem; color: var(--mist); }

    /* ============ Footer note ============ */
    .footer-note {
      text-align: center; margin: 30px 0 20px;
      font-family: var(--font-meta); font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--mist-deep);
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="/games.html">← Games</a>
  <span class="nav-title">Realms · v6</span>
  <span style="width: 80px;"></span>
</nav>

<main class="app" id="app">

  <!-- ============ Title screen ============ -->
  <section class="title-screen" id="title-screen">
    <div class="title-eyebrow">Prototype 06 · 2D Action</div>
    <h1 class="title-h1">Realms</h1>
    <div class="title-divider"><span class="line"></span><span class="diamond"></span><span class="line"></span></div>
    <p class="title-tagline">Side-scrolling realms · Arena duels · Two modes, one universe</p>
    <div class="mode-pick">
      <button class="mode-btn" id="btn-mode-adventure">
        <div class="mode-pill">Mode A</div>
        <div class="mode-name">Adventure</div>
        <div class="mode-tag">Solion runs the realms · Side-scroller · Collect astralites, reach the portal</div>
      </button>
      <button class="mode-btn" id="btn-mode-tournament">
        <div class="mode-pill">Mode B</div>
        <div class="mode-name">Tournament</div>
        <div class="mode-tag">Arena duels · 2 fighters · Best of 3 rounds · vs CPU or hot-seat</div>
      </button>
    </div>
    <button class="btn-secondary" id="btn-spec" style="margin-top: 14px;">Design spec</button>
  </section>

  <!-- ============ Game stage (hidden until a mode is picked) ============ -->
  <section class="stage" id="stage" hidden>
    <canvas id="game-canvas" width="960" height="540"></canvas>
    <div class="stage-hud" id="stage-hud">
      <span id="hud-left">—</span>
      <button class="btn-secondary" id="btn-back-title">← Title</button>
    </div>
    <div class="placeholder-overlay" id="placeholder-overlay" hidden>
      <div class="label" id="placeholder-label">Mode</div>
      <h2 id="placeholder-title">Coming next</h2>
      <p id="placeholder-body">This mode lands in the next build. Use ← Title to go back.</p>
    </div>
  </section>

  <div class="footer-note">v6 · single-file prototype · canvas-based 2D</div>

</main>

<script>
'use strict';

// ============ Constants ============
const CANVAS_W = 960;
const CANVAS_H = 540;

// ============ State machine ============
const state = {
  mode: null,        // null (title) | 'adventure' | 'tournament'
  paused: false,
  inputs: { left:false, right:false, up:false, down:false, attack:false, jump:false, block:false }
};

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function $(id) { return document.getElementById(id); }
function show(id, on) { const el = $(id); if (el) el.hidden = !on; }

// ============ Title → Mode select ============
$('btn-mode-adventure').onclick = () => enterMode('adventure');
$('btn-mode-tournament').onclick = () => enterMode('tournament');
$('btn-back-title').onclick = () => backToTitle();
$('btn-spec').onclick = () => window.open('https://github.com/angelsofvices/AOV-saga/blob/main/REALMS_SPEC.md','_blank');

function enterMode(mode) {
  state.mode = mode;
  show('title-screen', false);
  show('stage', true);
  // Placeholder overlay for now — Adventure & Tournament land in P6.1 / P6.2.
  showPlaceholder(mode);
  // Kick the render loop (it'll be a clear screen for now; modes hook in next).
  requestAnimationFrame(loop);
}

function backToTitle() {
  state.mode = null;
  show('stage', false);
  show('title-screen', true);
}

function showPlaceholder(mode) {
  const overlay = $('placeholder-overlay');
  if (mode === 'adventure') {
    $('placeholder-label').textContent = 'Mode A · Adventure';
    $('placeholder-title').textContent = 'Solion · Realm of Viridia';
    $('placeholder-body').textContent = "Side-scroller incoming in P6.1 — Solion runs Viridia, collects astralites, fights minions, reaches the Astral Portal. Sprite assets are already wired up from Expedition P4.";
    $('hud-left').textContent = 'Adventure · Level 1';
  } else {
    $('placeholder-label').textContent = 'Mode B · Tournament';
    $('placeholder-title').textContent = 'Solion vs Kravos';
    $('placeholder-body').textContent = "Arena fighter incoming in P6.2 — Solion Highreach (Aura/Humanoid-Noid) vs Kravos Dragonsong (Beast/Unknown-Void). Best of 3 rounds. Placeholder sprites until proper fighter sheets land.";
    $('hud-left').textContent = 'Tournament · Solion vs Kravos';
  }
  overlay.hidden = false;
}

// ============ Game loop scaffolding ============
// Each mode will own its own update(dt) + draw() once we build them. For now the
// loop just clears the canvas to a starfield placeholder so the stage isn't empty.
let lastFrame = 0;
function loop(t) {
  if (!state.mode) return;
  const dt = Math.min(50, t - lastFrame) / 1000;
  lastFrame = t;
  // Draw a simple animated starfield as the placeholder background.
  drawStarfield(t);
  requestAnimationFrame(loop);
}

function drawStarfield(t) {
  ctx.fillStyle = '#050310';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  // Slow drifting stars seeded by index for stable positions.
  ctx.fillStyle = '#f3ecdc';
  for (let i = 0; i < 80; i++) {
    const x = ((i * 137 + t * 0.02) % CANVAS_W);
    const y = (i * 71) % CANVAS_H;
    const size = (i % 3) === 0 ? 1.5 : 1;
    ctx.globalAlpha = 0.3 + ((i * 17) % 50) / 100;
    ctx.fillRect(x, y, size, size);
  }
  ctx.globalAlpha = 1;
  // Cosmic glow at top.
  const grad = ctx.createRadialGradient(CANVAS_W/2, 0, 0, CANVAS_W/2, 0, CANVAS_W);
  grad.addColorStop(0, 'rgba(232, 200, 120, 0.18)');
  grad.addColorStop(1, 'rgba(232, 200, 120, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

// ============ Input ============
const KEY_MAP = {
  'ArrowLeft':  'left', 'KeyA': 'left',
  'ArrowRight': 'right','KeyD': 'right',
  'ArrowUp':    'up',   'KeyW': 'up', 'Space': 'jump',
  'ArrowDown':  'down', 'KeyS': 'down',
  'KeyZ': 'attack', 'KeyJ': 'attack',
  'KeyX': 'block',  'KeyK': 'block'
};
window.addEventListener('keydown', e => {
  const k = KEY_MAP[e.code];
  if (k) { state.inputs[k] = true; e.preventDefault(); }
  if (e.code === 'Escape' && state.mode) backToTitle();
});
window.addEventListener('keyup', e => {
  const k = KEY_MAP[e.code];
  if (k) { state.inputs[k] = false; e.preventDefault(); }
});

// Init: title visible, stage hidden
show('stage', false);
show('title-screen', true);

</script>

</body>
</html>

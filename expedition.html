    // Khronis walk sheet slicer — BOSS. Same pipeline as Daemon but with
    // bigger source frame (260×246) and bigger display canvas (96×91) so
    // the wing-spread reads as imposing.
    function sliceKhronisSheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = KHRONIS_SHEET.rowBases[dir];
        const cropY = baseY - KHRONIS_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = KHRONIS_SHEET.cols[i];
          const cropX = centerX - KHRONIS_SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width  = KHRONIS_W;
          c.height = KHRONIS_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            sheetImg,
            cropX, cropY, KHRONIS_SHEET.frameW, KHRONIS_SHEET.frameH,
            0, 0, KHRONIS_W, KHRONIS_H
          );
          chromaKeyWhite(c);
          result[dir].push(c);
        }
      }
      return result;
    }



    // Center-flood retention — used by the fly slicer to suppress wing-tip
    // fragments from NEIGHBORING frames that bleed into the current crop
    // window (most visible on UP row frames 1-3, where adjacent poses' wing
    // tips overlap into the next frame's crop). Seeds an 8-connected flood
    // at the bottom-center column (player body/feet) and zeroes alpha on
    // any opaque pixel not reachable from the seed. Run AFTER chromaKeyWhite
    // and BEFORE bake-down so connectivity is computed at source resolution
    // (small dest canvases break thin pixel chains).
    // Largest-component retention — alternative to keepCenterConnected for
    // sheets where the character isn't reliably horizontally centered in
    // each frame (e.g. the combat sheet, where BLASTER row characters sit
    // at the LEFT of the frame and the blast extends right). Finds every
    // 8-connected opaque blob, retains only the LARGEST, drops the rest.
    // Robust to off-center characters and frame-bleed fragments.
    function keepLargestComponent(canvas) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const ALPHA_T = 30;
      const labels = new Int32Array(w * h);   // 0 = unlabeled
      const sizes  = [0];                     // index 0 unused
      let nextLabel = 1;
      for (let i = 0; i < w * h; i++) {
        if (labels[i] > 0) continue;
        if (data[i * 4 + 3] < ALPHA_T) continue;
        // Iterative 8-connected flood from this pixel
        const stack = [i];
        labels[i] = nextLabel;
        let size = 0;
        while (stack.length) {
          const idx = stack.pop();
          size++;
          const x = idx % w, y = (idx - x) / w;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx, ny = y + dy;
              if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
              const ni = ny * w + nx;
              if (labels[ni] > 0) continue;
              if (data[ni * 4 + 3] < ALPHA_T) continue;
              labels[ni] = nextLabel;
              stack.push(ni);
            }
          }
        }
        sizes.push(size);
        nextLabel++;
      }
      if (nextLabel === 1) return;   // nothing opaque
      let largest = 1;
      for (let i = 2; i < sizes.length; i++) {
        if (sizes[i] > sizes[largest]) largest = i;
      }
      for (let i = 0; i < w * h; i++) {
        if (labels[i] !== largest) data[i * 4 + 3] = 0;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    function keepCenterConnected(canvas, seedX) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const ALPHA_T = 30;
      const keep = new Uint8Array(w * h);
      const stack = [];
      // Seed: a vertical strip up the bottom-center column. The player's
      // body+feet live here regardless of facing/pose, and stray fragments
      // from neighbor frames live at the LEFT/RIGHT edges so the seed never
      // accidentally lands on a fragment.
      const sx0 = Math.max(0, seedX - 2);
      const sx1 = Math.min(w - 1, seedX + 2);
      for (let dy = 0; dy < Math.floor(h / 2); dy++) {
        const sy = h - 1 - dy;
        for (let sx = sx0; sx <= sx1; sx++) {
          const idx = sy * w + sx;
          if (data[idx * 4 + 3] >= ALPHA_T && !keep[idx]) {
            keep[idx] = 1;
            stack.push(idx);
          }
        }
      }
      while (stack.length) {
        const i = stack.pop();
        const x = i % w, y = (i - x) / w;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
            const ni = ny * w + nx;
            if (keep[ni]) continue;
            if (data[ni * 4 + 3] >= ALPHA_T) {
              keep[ni] = 1;
              stack.push(ni);
            }
          }
        }
      }
      for (let i = 0; i < w * h; i++) {
        if (!keep[i]) data[i * 4 + 3] = 0;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // Fly sheet slicer — bakes at the WIDER fly canvas (CHAR_W_FLY × CHAR_H_FLY)
    // so the extended wings aren't horizontally crushed. The renderer offsets
    // this canvas by FLY_OFFSET_X when drawing so the player's feet line up
    // with the same world position as when walking.
    // Run sheet slicer — same pipeline as walk slicer, baked at CHAR_W ×
    // CHAR_H so the renderer can pull from ASSETS.runFrames using the
    // same code path that consumes ASSETS.charFrames.
    function sliceRunSheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = RUN_SHEET.rowBases[dir];
        const cropY = baseY - RUN_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = RUN_SHEET.cols[i];
          const cropX = centerX - RUN_SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width  = CHAR_W;
          c.height = CHAR_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            sheetImg,
            cropX, cropY, RUN_SHEET.frameW, RUN_SHEET.frameH,
            0, 0, CHAR_W, CHAR_H
          );
          chromaKeyWhite(c);
          result[dir].push(c);
        }
      }
      return result;
    }

    function sliceFlySheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = FLY_SHEET.rowBases[dir];
        const cropY = baseY - FLY_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = FLY_SHEET.cols[i];
          const cropX = centerX - FLY_SHEET.frameW / 2;
          // Stage 1 — copy frame to a SOURCE-RES work canvas so the chroma
          // + center-flood operate on full-fidelity pixels (the bake-down
          // would break thin wing chains at 56×45). This kills neighbor-
          // frame wing-tip bleed (UP rows 1-3) without touching the
          // player's own wings.
          const work = document.createElement('canvas');
          work.width  = FLY_SHEET.frameW;
          work.height = FLY_SHEET.frameH;
          const wctx = work.getContext('2d');
          wctx.imageSmoothingEnabled = false;
          wctx.drawImage(
            sheetImg,
            cropX, cropY, FLY_SHEET.frameW, FLY_SHEET.frameH,
            0, 0, FLY_SHEET.frameW, FLY_SHEET.frameH
          );
          chromaKeyWhite(work);
          keepCenterConnected(work, Math.floor(FLY_SHEET.frameW / 2));
          // Stage 2 — bake the cleaned source frame down to the fly canvas
          // size (NEAREST keeps the pixel-art crisp).
          const c = document.createElement('canvas');
          c.width  = CHAR_W_FLY;
          c.height = CHAR_H_FLY;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            work,
            0, 0, FLY_SHEET.frameW, FLY_SHEET.frameH,
            0, 0, CHAR_W_FLY, CHAR_H_FLY
          );
          result[dir].push(c);
        }
      }
      return result;
    }

    // Idle sheet slicer — rows are POSES (not directions), so the return shape
    // is an array-of-arrays: ASSETS.idleFrames[pose][frame]. Each frame is
    // baked at CHAR_W_IDLE × CHAR_H_IDLE (square 40×40) since the source idle
    // crops are square — keeps aspect 1:1 so no horizontal squash.
    function sliceIdleSheet(sheetImg) {
      const result = [];
      for (let r = 0; r < IDLE_SHEET.rowBases.length; r++) {
        const baseY = IDLE_SHEET.rowBases[r];
        const cropY = baseY - IDLE_SHEET.frameH;
        const rowCols = IDLE_SHEET.colsByRow[r];
        const row = [];
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = rowCols[i];
          const cropX = centerX - IDLE_SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width  = CHAR_W_IDLE;
          c.height = CHAR_H_IDLE;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            sheetImg,
            cropX, cropY, IDLE_SHEET.frameW, IDLE_SHEET.frameH,
            0, 0, CHAR_W_IDLE, CHAR_H_IDLE
          );
          chromaKeyWhite(c);
          row.push(c);
        }
        result.push(row);
      }
      return result;
    }

    // Strict near-white kill pass — eliminates the small enclosed near-white
    // blobs that the exterior flood-fill misses (e.g. negative space between
    // wings and body in Elzoran's sheet that read in-game as a "dust/smoke"
    // aura on grass). Dragon palette has no pure white, so threshold 230 is
    // safe; orbs (purple), body (blue), wings (orange), crest (gold), eyes
    // (red), flame (orange) all sit well below this in at least one channel.
    function killNearWhiteSpeckles(canvas, threshold) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const t = threshold;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i + 3] > 0 && data[i] >= t && data[i + 1] >= t && data[i + 2] >= t) {
          data[i + 3] = 0;
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // Elzoran fly sheet slicer — flood-fill chroma + speckle-kill at SOURCE
    // resolution, then per-frame NEAREST downsample to ELZ_DISPLAY_W ×
    // ELZ_DISPLAY_H (112×72). NEAREST keeps the pixel-art crisp at the ~3×
    // downsample ratio; bilinear at this ratio was visibly blurring the face
    // and wing-vein detail. Flood-fill handles the white BG; speckle-kill
    // catches the enclosed near-white islands the flood can't reach.
    function sliceElzoranSheet(sheetImg) {
      const work = document.createElement('canvas');
      work.width  = sheetImg.naturalWidth  || sheetImg.width;
      work.height = sheetImg.naturalHeight || sheetImg.height;
      const wctx = work.getContext('2d');
      wctx.drawImage(sheetImg, 0, 0);
      chromaKeyExteriorWhite(work, 245);
      // Erase the row-label glyphs (UP FLY / LEFT FLY / RIGHT FLY / DOWN FLY)
      // that sit in the inter-row strips on the left margin. Flood-fill chroma
      // can't reach them (dark text enclosed by white), so they survive as
      // visible "smears" in the col-0 crops without an explicit wipe. The
      // zones below were measured via PIL — they only cover empty inter-row
      // white space + the labels, never the dragon content.
      wctx.clearRect(0, 300, 140,  62);  // between UP and LEFT  (LEFT FLY)
      wctx.clearRect(0, 540, 140,  72);  // between LEFT and RIGHT (RIGHT FLY)
      wctx.clearRect(0, 795, 140,  82);  // between RIGHT and DOWN (DOWN FLY)
      // Kill any remaining near-white pixels enclosed by dragon body parts.
      // The flood-fill above only reaches BG connected to the canvas edge,
      // leaving small enclosed white regions that look like smoke specks
      // on a grass BG in-game. Threshold 230 spares all palette colors.
      killNearWhiteSpeckles(work, 230);

      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = ELZORAN_FLY_SHEET.rowBases[dir];
        const cropY = baseY - ELZORAN_FLY_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = ELZORAN_FLY_SHEET.cols[i];
          const cropX = centerX - ELZORAN_FLY_SHEET.frameW / 2;
          // Per-frame source-res work canvas — required so keepCenterConnected
          // can flood at full fidelity. Frames in this sheet overlap (rows
          // UP and RIGHT in particular, where the adjacent pose's wing tip
          // reaches into the current crop window); the center-flood retains
          // only pixels connected to Elzoran's body, dropping the neighbor
          // wing fragments that would otherwise survive as floating bits.
          const fw = document.createElement('canvas');
          fw.width  = ELZORAN_FLY_SHEET.frameW;
          fw.height = ELZORAN_FLY_SHEET.frameH;
          const fwctx = fw.getContext('2d');
          fwctx.imageSmoothingEnabled = false;
          fwctx.drawImage(
            work,
            cropX, cropY, ELZORAN_FLY_SHEET.frameW, ELZORAN_FLY_SHEET.frameH,
            0, 0, ELZORAN_FLY_SHEET.frameW, ELZORAN_FLY_SHEET.frameH
          );
          keepCenterConnected(fw, Math.floor(ELZORAN_FLY_SHEET.frameW / 2));
          // Bake the cleaned frame down to display size (NEAREST keeps the
          // pixel-art crisp; see the slicer header comment for ratio notes).
          const c = document.createElement('canvas');
          c.width  = ELZ_DISPLAY_W;
          c.height = ELZ_DISPLAY_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            fw,
            0, 0, ELZORAN_FLY_SHEET.frameW, ELZORAN_FLY_SHEET.frameH,
            0, 0, ELZ_DISPLAY_W, ELZ_DISPLAY_H
          );
          result[dir].push(c);
        }
      }
      return result;
    }

    // Build Elzoran's IDLE frame set by cloning each fly frame and alpha-
    // masking out the purple plasma orbs at his hands. The dragon body
    // (blue), wings (orange), fire (orange), gold trim, and red eyes all
    // sit outside the magenta color range, so they're preserved untouched.
    // Result: same body pose, no smoke aura — used when npc.isMoving=false.
    function makeElzoranIdleFrames(flyFrames) {
      const out = { up: [], left: [], right: [], down: [] };
      for (const dir of ['up', 'left', 'right', 'down']) {
        for (const frame of flyFrames[dir]) {
          const c = cloneCanvas(frame);
          alphaOutMagenta(c);
          out[dir].push(c);
        }
      }
      return out;
    }
    // Clone a canvas pixel-for-pixel so we can mutate one without affecting
    // the original.
    function cloneCanvas(srcCanvas) {
      const c = document.createElement('canvas');
      c.width  = srcCanvas.width;
      c.height = srcCanvas.height;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(srcCanvas, 0, 0);
      return c;
    }
    // Alpha-out magenta/purple pixels (R high, G low, B high, R≈B). Removes
    // Elzoran's plasma orbs without touching his blue body, gold trim,
    // orange wings/fire, or red eyes.
    function alphaOutMagenta(canvas) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        if (r > 95 && g < 100 && b > 95 && Math.abs(r - b) < 110) {
          data[i + 3] = 0;
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // Aurexion walk sheet slicer — two-pass:
    //   1. Copy the full sheet into a work canvas at SOURCE resolution and
    //      run a single flood-fill chroma pass to alpha-out the BG. This
    //      works at the sheet level (not per-frame) since the inter-frame
    //      BG is one big connected white region.
    //   2. Slice each frame from the work canvas with bilinear-downsample
    //      into AUR_DISPLAY_W × AUR_DISPLAY_H. NEAREST would drop ~12-14×
    //      worth of source detail; the bilinear average keeps the armor
    //      and jet-flame highlights legible at the smaller display size.
    function sliceAurexionSheet(sheetImg) {
      // Pass 1: source-res flood-fill chroma on the entire sheet.
      const work = document.createElement('canvas');
      work.width  = sheetImg.naturalWidth  || sheetImg.width;
      work.height = sheetImg.naturalHeight || sheetImg.height;
      const wctx = work.getContext('2d');
      wctx.drawImage(sheetImg, 0, 0);
      chromaKeyExteriorWhite(work, 245);

      // Pass 2: slice + bilinear bake.
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = AUREXION_SHEET.rowBases[dir];
        const cropY = baseY - AUREXION_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = AUREXION_SHEET.cols[i];
          const cropX = centerX - AUREXION_SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width  = AUR_DISPLAY_W;
          c.height = AUR_DISPLAY_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = true;
          cctx.imageSmoothingQuality = 'high';
          cctx.drawImage(
            work,
            cropX, cropY, AUREXION_SHEET.frameW, AUREXION_SHEET.frameH,
            0, 0, AUR_DISPLAY_W, AUR_DISPLAY_H
          );
          result[dir].push(c);
        }
      }
      return result;
    }

    // Flood-fill chroma key — alpha out near-white pixels that are CONNECTED
    // from the canvas edges (i.e., the actual background). Pixels matching
    // the threshold but enclosed by a darker outline (e.g. interior white
    // armor) stay opaque. Iterative DFS so we don't blow the call stack on
    // large canvases.
    function chromaKeyExteriorWhite(canvas, threshold) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const W = canvas.width, H = canvas.height;
      const isNW = (idx) =>
        data[idx] >= threshold && data[idx + 1] >= threshold && data[idx + 2] >= threshold;
      const visited = new Uint8Array(W * H);
      const stack = [];
      // Seed from any near-white edge pixel (all 4 sides of the canvas).
      for (let x = 0; x < W; x++) {
        const top = x, bot = (H - 1) * W + x;
        if (!visited[top] && isNW(top * 4)) { visited[top] = 1; stack.push(top); }
        if (!visited[bot] && isNW(bot * 4)) { visited[bot] = 1; stack.push(bot); }
      }
      for (let y = 0; y < H; y++) {
        const left = y * W, right = y * W + (W - 1);
        if (!visited[left]  && isNW(left  * 4)) { visited[left]  = 1; stack.push(left);  }
        if (!visited[right] && isNW(right * 4)) { visited[right] = 1; stack.push(right); }
      }
      // 4-connected DFS.
      while (stack.length) {
        const p = stack.pop();
        const x = p % W, y = (p - x) / W;
        if (x > 0)     { const n = p - 1; if (!visited[n] && isNW(n * 4)) { visited[n] = 1; stack.push(n); } }
        if (x < W - 1) { const n = p + 1; if (!visited[n] && isNW(n * 4)) { visited[n] = 1; stack.push(n); } }
        if (y > 0)     { const n = p - W; if (!visited[n] && isNW(n * 4)) { visited[n] = 1; stack.push(n); } }
        if (y < H - 1) { const n = p + W; if (!visited[n] && isNW(n * 4)) { visited[n] = 1; stack.push(n); } }
      }
      // Alpha out the flooded BG region.
      for (let p = 0; p < W * H; p++) {
        if (visited[p]) data[p * 4 + 3] = 0;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // Eurakeon walk sheet slicer — same slicer pattern as the player + Voltyran,
    // but bakes at EUR_DISPLAY_W × EUR_DISPLAY_H (2x Voltyran's footprint) so
    // Eurakeon reads as a larger presence. Source is white-bg, so the shared
    // chromaKeyWhite() pass produces transparent alpha around his silhouette
    // before the frame goes into the rotation.
    // Color-chroma helper — alpha-out every pixel within `threshold` of the
    // target RGB. Used by the combat sheet slicer where the BG is a flat
    // dark gray (~65,65,68) rather than white, so chromaKeyWhite would miss
    // it. Computes Manhattan distance per pixel for speed.
    function chromaKeyColor(canvas, r, g, b, threshold) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const dr = data[i]   - r;
        const dg = data[i+1] - g;
        const db = data[i+2] - b;
        const dist = Math.abs(dr) + Math.abs(dg) + Math.abs(db);
        if (dist <= threshold) data[i+3] = 0;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // Combat sheet slicer — same two-stage pattern as Aur/Elz: source-res
    // chroma on the whole sheet, then per-frame NEAREST bake into the
    // CHAR_W_COMBAT × CHAR_H_COMBAT display canvas. Returns a map keyed by
    // action name (punch / kick / blast / sword / blaster), each value an
    // array of 4 frame canvases.
    function sliceCombatSheet(sheetImg) {
      // Pass 1: copy the whole sheet to a source-res work canvas and chroma
      // out the gray BG. Threshold 95 catches both the flat BG AND the soft
      // dust/smoke halo the artist drew around action frames (sword, blast,
      // blaster all had low-saturation gray haze that read as a gray box on
      // grass at threshold 35). Higher threshold can graze the very darkest
      // character shadows but the largest-component pass below cleans those
      // up by keeping only the character + their connected effect.
      const work = document.createElement('canvas');
      work.width  = sheetImg.naturalWidth  || sheetImg.width;
      work.height = sheetImg.naturalHeight || sheetImg.height;
      const wctx = work.getContext('2d');
      wctx.imageSmoothingEnabled = false;
      wctx.drawImage(sheetImg, 0, 0);
      chromaKeyColor(work, 65, 65, 68, 95);

      // Pass 2: slice using per-frame variable (srcX, srcW) so beam/effect
      // frames capture their full visual rather than getting clipped at a
      // fixed frame boundary. All frames bake at the SAME 4× downsample so
      // character size stays consistent across the animation; the dest
      // canvas WIDTH varies per frame (height fixed at CHAR_H_COMBAT).
      // Each frame goes through a per-frame source-res scratch canvas so
      // keepLargestComponent can isolate the character + connected effect
      // from any adjacent-frame bleed, then NEAREST-bake to dest size.
      const result = { punch: [], kick: [], blast: [], sword: [], blaster: [] };
      const actions = Object.keys(result);
      const scale = COMBAT_SHEET.bakeScale;
      const srcH  = COMBAT_SHEET.frameH;
      for (const action of actions) {
        const baseY = COMBAT_SHEET.rowBases[action];
        const srcY  = baseY - srcH + 1;
        const frameSpec = COMBAT_SHEET.frames[action];
        for (let i = 0; i < COMBAT_FRAMES; i++) {
          const [srcX, srcW] = frameSpec[i];
          const destW = Math.floor(srcW / scale);
          // Per-frame source-res scratch
          const fw = document.createElement('canvas');
          fw.width  = srcW;
          fw.height = srcH;
          const fwctx = fw.getContext('2d');
          fwctx.imageSmoothingEnabled = false;
          fwctx.drawImage(work, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);
          keepLargestComponent(fw);
          // NEAREST-bake to dest. Dest height padded to CHAR_H_COMBAT for
          // foot-alignment consistency; image fills from the BOTTOM up so
          // feet land at the bottom edge of the canvas regardless of pose.
          const c = document.createElement('canvas');
          c.width  = destW;
          c.height = CHAR_H_COMBAT;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          const destH_natural = Math.floor(srcH / scale);   // 51
          const destY = CHAR_H_COMBAT - destH_natural;       // 5 — feet flush to bottom
          cctx.drawImage(fw, 0, 0, srcW, srcH, 0, destY, destW, destH_natural);
          result[action].push(c);
        }
      }
      return result;
    }

    function sliceEurakeonSheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = EURAKEON_SHEET.rowBases[dir];
        const cropY = baseY - EURAKEON_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = EURAKEON_SHEET.cols[i];
          const cropX = centerX - EURAKEON_SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width  = EUR_DISPLAY_W;
          c.height = EUR_DISPLAY_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            sheetImg,
            cropX, cropY, EURAKEON_SHEET.frameW, EURAKEON_SHEET.frameH,
            0, 0, EUR_DISPLAY_W, EUR_DISPLAY_H
          );
          chromaKeyWhite(c);
          result[dir].push(c);
        }
      }
      return result;
    }

    // Returns a new canvas with the source canvas flipped horizontally.
    // Used to synthesize an opposite-foot walk frame from a single source pose.
    function mirrorCanvas(srcCanvas) {
      const m = document.createElement('canvas');
      m.width = srcCanvas.width;
      m.height = srcCanvas.height;
      const ctx = m.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.translate(srcCanvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(srcCanvas, 0, 0);
      return m;
    }

    // Convert near-white pixels to transparent. Source sheet has solid white BG.
    // ============ Lava tile post-process (variant C — ashy cave) ============
    // The raw tile_lava.png reads as bright active magma — too high contrast
    // against the lower-saturation player + enemy sprites and makes the
    // south region feel like a hazard floor rather than a region you walk
    // around in. This post-process drops the tile to brightness 0.40 and
    // saturation 0.50 so it reads as cooled magma in a dark cave with
    // residual ember glow. Both knobs exposed so the look can be tuned
    // without touching pipeline code.
    const LAVA_BRIGHTNESS = 0.40;   // 0..1 — multiplies RGB after desat
    const LAVA_SATURATION = 0.50;   // 0..1 — 0=fully gray, 1=untouched

    function postProcessLavaTile(canvas) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const sat   = LAVA_SATURATION;
      const bright = LAVA_BRIGHTNESS;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        // Rec. 601 luma → gray midpoint we desaturate toward.
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        const dr = gray + (r - gray) * sat;
        const dg = gray + (g - gray) * sat;
        const db = gray + (b - gray) * sat;
        data[i]   = Math.min(255, dr * bright);
        data[i+1] = Math.min(255, dg * bright);
        data[i+2] = Math.min(255, db * bright);
      }
      ctx.putImageData(imgData, 0, 0);
    }

    function chromaKeyWhite(canvas) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const w = canvas.width;
      const h = canvas.height;
      // ---- Pass 1: strict white → fully transparent ----
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        if (r > 240 && g > 240 && b > 240) {
          data[i + 3] = 0;
        }
      }
      // ---- Pass 2: AA halo cleanup ----
      // The artist drew characters with anti-aliased edges against a white
      // background. After pass 1, the EDGE pixels (e.g. RGB 220,225,230)
      // survive because they're not pure-white — but they ARE light grayish
      // pixels that read as a white outline on dark backgrounds like the
      // lava tile. Any high-brightness, low-saturation pixel adjacent to an
      // already-transparent pixel is almost certainly AA halo; kill it.
      // Two-channel reuse: scan once, mark halo pixels, then erase. Done
      // in two phases so the scan sees the pass-1 state, not the in-flight
      // halo zeros.
      const halo = new Uint8Array(w * h);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          if (data[i + 3] < 200) continue;
          const r = data[i], g = data[i + 1], b = data[i + 2];
          // Only pixels that are LIGHT (>=200 brightness in all three) and
          // GRAYISH (max-min channel spread < 22) qualify as halo candidates.
          if (r < 200 || g < 200 || b < 200) continue;
          const maxC = Math.max(r, g, b), minC = Math.min(r, g, b);
          if (maxC - minC >= 22) continue;
          // Adjacency check: any 4-neighbor already transparent?
          let touchesTrans = false;
          if (x > 0     && data[(i - 4)        + 3] === 0) touchesTrans = true;
          else if (x < w - 1 && data[(i + 4)        + 3] === 0) touchesTrans = true;
          else if (y > 0     && data[(i - w*4)      + 3] === 0) touchesTrans = true;
          else if (y < h - 1 && data[(i + w*4)      + 3] === 0) touchesTrans = true;
          if (touchesTrans) halo[y * w + x] = 1;
        }
      }
      for (let i = 0; i < halo.length; i++) {
        if (halo[i]) data[i * 4 + 3] = 0;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // ============ Canvas setup ============
    // Canvas backing store is the VIEWPORT in logical pixels — not the full
    // world. The camera offset decides which slice of the (larger) world gets
    // drawn into this backing store each frame.
    const canvas = document.getElementById('game');
    canvas.width  = VIEWPORT_W;   // 320 — what fits on screen at once
    canvas.height = VIEWPORT_H;   // 320
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ============ Camera ============
    // World-space top-left corner of the visible viewport. Updated each frame
    // by updateCamera() to track the player while staying within world bounds.
    const camera = { x: 0, y: 0 };

    // ============ NPCs ============
    // Each NPC wanders freely: picks a random direction, walks in it until
    // either a per-direction timer expires or movement gets blocked by a
    // collider (tree, world bound, other NPC, or the player). On block /
    // timer-out, it picks a fresh direction (biased away from the current
    // one so it doesn't stutter). Occasionally it picks 'idle' and stands
    // still for a beat. No scripted interaction — just ambient life.
    const NPCS = [
      {
        id: 'voltyran',
        framesKey: 'voltyranFrames',
        walkOrder: VOLTYRAN_WALK_ORDER,
        x: 400, y: 320,
        w: VOL_DISPLAY_W, h: VOL_DISPLAY_H,
        speed: 40,                 // px / second (player is 96)
        facing: 'down',            // starting direction (used for first render)
        animFps: 6,
        animTime: 0,
        animFrame: 0,
        currentDir: 'down',        // 'up' | 'down' | 'left' | 'right' | 'idle'
        dirTimer: 0,               // 0 forces a re-pick on the very first frame
        // Cries — pseudo-archaic lines themed to Voltyran's golden/forge/sun
        // presence. One is picked at random on each fresh touch.
        cries: [
          "Hail, wanderer. The forge yet burns.",
          "By gilded oath, I bid thee welcome.",
          "Mine blade hungers for righteous strife.",
          "Yon path is fraught — tread with valor.",
          "The sun's spear cleaveth even shadow.",
        ],
      },
      // Eurakeon — second NPC, spawns up-and-left of player so the player has
      // to actually look around to find both. Same wander system as Voltyran,
      // but baked at 2x footprint (EUR_DISPLAY_W × EUR_DISPLAY_H) so he reads
      // as a larger, more imposing presence. Speed slightly slower than
      // Voltyran to read as a different rhythm of movement.
      {
        id: 'eurakeon',
        framesKey: 'eurakeonFrames',
        walkOrder: EURAKEON_WALK_ORDER,
        x: 160, y: 200,
        w: EUR_DISPLAY_W, h: EUR_DISPLAY_H,
        speed: 34,
        facing: 'down',
        animFps: 6,
        animTime: 0,
        animFrame: 0,
        currentDir: 'down',
        dirTimer: 0,
        // Cries — pseudo-archaic lines themed to Eurakeon's shadow/dragon/
        // eldritch presence. One is picked at random on each fresh touch.
        cries: [
          "Sssoul-wanderer… thy heart echoes.",
          "The veil thinneth where thou treadest.",
          "Beware the hush 'twixt the stars.",

      {

    // ============ UFO interaction (Aethryx Expanse gateway) ============
    // The UFO sits at a hardcoded tile position. When the player's foot-box
    // (expanded by INTERACT_PAD) overlaps the UFO's footprint, a "TAP A"
    // prompt appears above the UFO. Pressing A while adjacent opens the
    // Aethryx Expanse modal (interplanetary travel menu — currently stubbed).
    const ufoState = {
      adjacent: false,    // true when player is close enough to interact
    };
    function ufoBodyBox() {
      return {
        x: UFO_TILE_X * TILE_SIZE,
        y: UFO_TILE_Y * TILE_SIZE,
        w: UFO_W,
        h: UFO_H,
      };
    }
    // Adjacency check for the huge house in Central — sets hugeHouseState.adjacent
    // when the player's foot-box overlaps a band just south of the building's
    // bottom edge (where the gold gate is). Caches the obj ref so the A-press
    // handler can read its world position.
    function updateHugeHouseAdjacency() {
      hugeHouseState.adjacent = false;
      hugeHouseState.obj      = null;
      if (currentRegion !== 'central') return;
      const dims = HOUSE_TYPES['house-huge'];
      for (const obj of MAP_DATA.objects) {
        if (obj.type !== 'house-huge') continue;
        // Interact zone: a band along the SOUTH bottom edge of the sprite,
        // where the gate is visually. Centered on the bottom half of the
        // building, extending a tile-and-a-half south into the open grass.
        const ix = obj.x * TILE_SIZE + dims.w * 0.30;
        const iy = obj.y * TILE_SIZE + dims.h - 8;
        const iw = dims.w * 0.40;
        const ih = TILE_SIZE * 1.5;
        const interactBox = { x: ix, y: iy, w: iw, h: ih };
        if (rectIntersect(playerFootbox(player.x, player.y), interactBox)) {
          hugeHouseState.adjacent = true;
          hugeHouseState.obj      = obj;
        }
        break;   // there's only one house-huge per region
      }
    }

    function updateUfoAdjacency() {
      const ib = playerInteractBox(player.x, player.y);
      ufoState.adjacent = rectIntersect(ib, ufoBodyBox());
    }

    // ============ NPC interaction (touch cry) ============
    // When the player's foot-box (expanded by INTERACT_PAD on every side) overlaps
    // an NPC's body-box, a small olden-language line from that NPC's cries pool
    // appears above their head. The active NPC + line stay locked until either
    // (a) the player walks away, or (b) the player touches a different NPC, at
    // which point a new line is rolled. The line only re-rolls on the EDGE
    // between not-touching and touching — sliding along an NPC doesn't spam.
    const INTERACT_PAD = 3;   // logical pixels — adjacency tolerance
    const interactState = {
      activeNpcId: null,    // id of the npc currently being touched (or null)
      line:        null,    // currently-displayed cry, or null
    };
    function playerInteractBox(x, y) {
      const fb = playerFootbox(x, y);
      return {
        x: fb.x - INTERACT_PAD,
        y: fb.y - INTERACT_PAD,
        w: fb.w + INTERACT_PAD * 2,
        h: fb.h + INTERACT_PAD * 2,
      };
    }
    function updateInteractions() {
      const ib = playerInteractBox(player.x, player.y);
      let touched = null;
      for (const npc of NPCS) {
        if (npc.active === false) continue;
        if ((npc.region || 'central') !== currentRegion) continue;
        if (rectIntersect(ib, npcBodyBox(npc))) { touched = npc; break; }
      }
      if (!touched) {
        if (interactState.activeNpcId !== null) {
          interactState.activeNpcId = null;
          interactState.line        = null;
        }
        return;
      }
      // Edge — first frame of touching this specific NPC. Roll a new cry.
      if (touched.id !== interactState.activeNpcId) {
        interactState.activeNpcId = touched.id;
        const pool = touched.cries && touched.cries.length ? touched.cries : null;
        interactState.line = pool ? pool[Math.floor(Math.random() * pool.length)] : null;
      }
    }

    // Draw the cry balloon above an NPC's head when interactState targets it.
    // Canvas-drawn so it sits inside the same render pipeline as the world.
    // Auto-widths to the text, clamps to the viewport, with a gold border + dark
    // glass background matching the rest of the site's chrome.
    function drawCryBalloon(npc, screenX, screenY) {
      if (!interactState.line || interactState.activeNpcId !== npc.id) return;
      const text = interactState.line;
      ctx.font = "8px 'Cinzel', serif";
      const padX = 5, padY = 4;
      const textW = Math.ceil(ctx.measureText(text).width);
      let boxW = textW + padX * 2;
      const boxH = 14;
      let boxX = Math.round(screenX + npc.w / 2 - boxW / 2);
      let boxY = Math.round(screenY - boxH - 3);
      // Clamp to viewport (the canvas) so the balloon never gets cut off.
      if (boxX < 2) boxX = 2;
      if (boxX + boxW > VIEWPORT_W - 2) boxX = VIEWPORT_W - 2 - boxW;
      if (boxY < 2) boxY = Math.round(screenY + npc.h + 3); // flip below if no room above
      // Background pill — semi-opaque void glass.
      ctx.fillStyle   = 'rgba(10, 6, 24, 0.88)';
      ctx.strokeStyle = '#e8c878';
      ctx.lineWidth   = 1;
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1);
      // Text — gold, vertically centered.
      ctx.fillStyle    = '#f4e3b3';
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'left';
      ctx.fillText(text, boxX + padX, boxY + boxH / 2 + 0.5);
    }

    // ====== Wander helpers ======
    // Compute an NPC's body-box at an arbitrary (x, y) — same shape as the
    // resting one, just at hypothetical coords. Used to test would-be moves.
    // Body-box scales with NPC height: at Voltyran's 42×40, this resolves to
    // a 34×16 feet-rect inset 4px from the sides and tucked 18px from the top.
    // Bigger NPCs (like Eurakeon at 84×80) get a proportionally bigger box so
    // collision still tracks the visible silhouette rather than a tiny patch
    // at the center.
    function npcBodyBoxAt(npc, x, y) {
      const s = npc.h / NPC_H;  // scale factor relative to base NPC size
      return {
        x: x + 4 * s,
        y: y + npc.h - 18 * s,
        w: npc.w - 8 * s,
        h: 16 * s,
      };
    }

    // True if the NPC's body-box at (x, y) would overlap anything solid:
    // world bound, tree collider, another NPC, or the player's foot-box.
    function npcBlocked(npc, x, y) {
      const box = npcBodyBoxAt(npc, x, y);
      if (box.x < 0) return true;
      if (box.y < 0) return true;
      if (box.x + box.w > MAP_WIDTH  * TILE_SIZE) return true;
      if (box.y + box.h > MAP_HEIGHT * TILE_SIZE) return true;
      for (const c of COLLIDERS) {
        if (rectIntersect(box, c)) return true;
      }
      for (const other of NPCS) {
        if (other === npc) continue;
        if (other.active === false) continue;
        if (rectIntersect(box, npcBodyBox(other))) return true;
      }
      if (rectIntersect(box, playerFootbox(player.x, player.y))) return true;
      return false;
    }

    // Pick a new wander direction. 12% chance to idle, otherwise a uniform
    // pick among the 4 cardinals — but never the SAME direction we just had
    // (that produces more interesting wandering and avoids the NPC stuttering
    // forward against the same wall over and over).
    function pickNpcDirection(npc) {
      if (Math.random() < 0.12) {
        npc.currentDir = 'idle';
      } else {
        const all = ['up', 'down', 'left', 'right'];
        const choices = all.filter(d => d !== npc.currentDir);
        npc.currentDir = choices[Math.floor(Math.random() * choices.length)];
      }
      // Hold this direction for 1.2 – 3.5 seconds before considering a re-pick.
      npc.dirTimer = 1.2 + Math.random() * 2.3;
    }

    // NPC collision rect — same idea as the player's foot-box, but a bit
    // larger and centered on the sprite. Blocks the player from walking through.
    // Scales with NPC height (see npcBodyBoxAt) so bigger NPCs still collide
    // along their full feet line rather than a tiny baseline patch.
    function npcBodyBox(npc) {
      const s = npc.h / NPC_H;
      return {
        x: npc.x + 4 * s,
        y: npc.y + npc.h - 18 * s,
        w: npc.w - 8 * s,
        h: 16 * s,
      };
    }

    function updateNPCs(dt) {
      for (const npc of NPCS) {
        // Docked NPCs (parked in the Aetherstride ship UI) skip all AI +
        // rendering + collision. Toggled via the Aethryx Expanse faction menu.
        if (npc.active === false) continue;
        // Region scoping — NPCs only update in their home region (default
        // 'central' if not specified).
        if ((npc.region || 'central') !== currentRegion) continue;
        // Tick down the direction timer. When it expires, pick a fresh one.
        npc.dirTimer -= dt;
        if (npc.dirTimer <= 0) pickNpcDirection(npc);

        // Translate current direction into a movement vector + facing.
        let dx = 0, dy = 0;
        if (npc.currentDir === 'right') { dx =  1; npc.facing = 'right'; }
        if (npc.currentDir === 'left')  { dx = -1; npc.facing = 'left';  }
        if (npc.currentDir === 'down')  { dy =  1; npc.facing = 'down';  }
        if (npc.currentDir === 'up')    { dy = -1; npc.facing = 'up';    }
        // 'idle' leaves dx/dy zero and keeps the current facing.

        if (dx !== 0 || dy !== 0) {
          // Animate walk cycle while in motion.
          npc.animTime += dt;
          npc.animFrame = Math.floor(npc.animTime * npc.animFps) % ANIM_FRAMES;
          // Axis-separated movement with collision (same idea as the player):
          // attempt X first, then Y, so an NPC bumping into a wall slides along
          // it instead of getting stuck. If a move is blocked, abandon the
          // current direction and pick a new one on the next frame.
          const tryX = npc.x + dx * npc.speed * dt;
          if (!npcBlocked(npc, tryX, npc.y)) {
            npc.x = tryX;
          } else if (dx !== 0) {
            npc.dirTimer = 0;  // re-pick next frame
          }
          const tryY = npc.y + dy * npc.speed * dt;
          if (!npcBlocked(npc, npc.x, tryY)) {
            npc.y = tryY;
          } else if (dy !== 0) {
            npc.dirTimer = 0;
          }
        } else {
          // Idle pose — freeze on the rest frame.
          npc.animTime = 0;
          npc.animFrame = 0;
        }
      }
    }

    // ============ Player state ============
    // Position is the TOP-LEFT corner of the sprite, in logical pixels.
    // Spawn the player at the center of the map.
    const player = {
      x: (MAP_WIDTH  * TILE_SIZE - CHAR_W) / 2,   // → 144 in a 10-wide map
      y: (MAP_HEIGHT * TILE_SIZE - CHAR_H) / 2,   // → 137.5 with CHAR_H=45
      speed: 96,         // logical pixels per second (≈ 3 tiles per second)
      facing: 'down',    // direction the sprite faces; defaults to 'down' on spawn
      animTime: 0,       // seconds of accumulated walk-cycle time
      animFrame: 0,      // 0..3 — current frame within the walk cycle
      mode: 'walk',      // 'walk' | 'run' | 'fly' — drives speed, anim FPS, and frame set
      isMoving: false,   // true on any frame where the player is inputting movement (renderer reads this)
      // Idle state — activates when mode='walk' and no input. idlePose 0..3
      // is the current row of animation_idle_player.png; it advances every
      // IDLE_POSE_DURATION seconds. idleAnimTime ticks the within-pose loop.
      idlePose:      0,
      idlePoseTime:  0,   // seconds spent in the current pose (advances toward IDLE_POSE_DURATION)
      idleAnimTime:  0,   // seconds for within-pose micro-animation (cycles via IDLE_ANIM_FPS)
      idleAnimFrame: 0,   // 0..3 — current col within the current pose row
      // Combat action state (Phase B). When non-null, the renderer draws
      // from ASSETS.combatFrames[combatAction] at frame [combatPhase] instead
      // of the walk/fly sheet. Cleared automatically by update() once the
      // 4-frame animation has elapsed (COMBAT_TOTAL_MS).
      combatAction:    null,   // null | 'punch' | 'kick' | 'sword' | 'blaster' | 'blast'
      combatPhase:     0,      // 0..(COMBAT_FRAMES-1)
      combatStartedAt: 0,      // performance.now() at action start; 0 when idle
    };

    // ============ Input state ============
    // Two independent input sources — keyboard (desktop) and joystick (mobile).
    // Combined via OR in update(), so both can coexist if needed. `run` is the
    // raw B-button state (hold). The B state machine below converts it into a
    // mode signal (walk / run / fly) by also tracking double-tap timing.
    const keyInput = { up: false, down: false, left: false, right: false };
    const joyInput = { up: false, down: false, left: false, right: false };

    // Run multiplier — applied while B is held. Faster than walk, slower than
    // fly. Affects both movement speed and walk-cycle animation FPS so feet
    // visibly keep up with the faster traversal.
    const RUN_SCALE = 1.5;
    // Fly multiplier — bumps both movement speed and wing-flap animation FPS
    // so flight reads as the privileged traversal mode. (Walk = base 1×.)
    const FLY_SCALE = 2.25;

    // ============ Combat & movement input (Phase A — May 2026) ============
    // PHASE A REWRITE NOTES — this section was the B-button state machine
    // (single-tap run sustain, double-tap fly sustain, debounced commits).
    // The schematic combat plan changed all of that:
    //   - Run mode is removed entirely. Movement is one speed.
    //   - B is now Kick (combat). The old tap/hold/double-tap classifier
    //     for B is gone; B is a simple discrete press.
    //   - Fly is now toggled by L+R simultaneous TAP (release before
    //     LR_HOLD_THRESHOLD).
    //   - L+R HOLD (past LR_HOLD_THRESHOLD) = Ult.
    //   - L alone = Special 1 (after LR_GRACE_MS to confirm R isn't coming).
    //   - R alone = Special 2 (after LR_GRACE_MS).
    //   - A = context-sensitive: interact if interactable in range,
    //     else Punch.
    //   - A→B / A→B→A / B→A→B chains within COMBO_WINDOW_MS detect combo
    //     moves (Sword Swing on ABA, Blaster Shot on BAB).
    //
    // Phase A scope is INPUT DETECTION + CONSOLE LOGGING only. No
    // animations, no SPC pool, no actual special-attack effects yet. Once
    // combo detection feels right in playtest, Phase B adds animations.
    //
    // Run mode and its sprite sheet were fully removed in May 2026 — see
    // the commit history. Movement is one speed; only walk and fly remain.

    // Tunable input windows. All in milliseconds.
    const COMBO_WINDOW_MS    = 400;   // max gap between taps in an A↔B chain (touch input naturally has 250-400ms gaps; 250 was always pruning the chain on phones)
    function nowMs() { return performance.now(); }

    // B-button state machine (Nov 2026 control remap):
    //   HOLD B           → run mode active for as long as B is down
    //   DOUBLE-TAP B     → toggle fly mode (sustained on/off)
    //   single tap (no double) → no-op, just records lastTapAt
    // Fly is independent of run; both can be set, fly wins for rendering.
    const bState = {
      anyDown:    false,   // is B currently pressed?
      pressedAt:  0,       // timestamp of current press (or 0)
      lastTapAt:  0,       // timestamp of last single-tap (for double-tap detection)
      flyEnabled: false,   // sustained fly toggle
    };
    function resetBState() {
      bState.anyDown    = false;
      bState.pressedAt  = 0;
      bState.lastTapAt  = 0;
      bState.flyEnabled = false;
    }
    // Hold-vs-tap thresholds. A press shorter than TAP_MAX_MS counts as a
    // tap (and may upgrade to a double-tap if a second tap follows within
    // DOUBLE_TAP_WINDOW). Anything longer than TAP_MAX_MS is treated as
    // a hold (run mode).
    const TAP_MAX_MS        = 240;
    const DOUBLE_TAP_WINDOW = 350;
    function onBPress() {
      bState.anyDown   = true;
      bState.pressedAt = nowMs();
    }
    function onBRelease() {
      const heldFor = nowMs() - bState.pressedAt;
      bState.anyDown = false;
      // If the press was short enough to be a tap, check for double-tap.
      if (heldFor <= TAP_MAX_MS) {
        const sinceLastTap = nowMs() - bState.lastTapAt;
        if (sinceLastTap <= DOUBLE_TAP_WINDOW && bState.lastTapAt > 0) {
          // Double tap — toggle fly.
          bState.flyEnabled = !bState.flyEnabled;
          console.log('[input] FLY TOGGLE → ' + (bState.flyEnabled ? 'ON' : 'OFF'));
          bState.lastTapAt = 0;   // reset so triple-tap doesn't keep toggling
        } else {
          bState.lastTapAt = nowMs();
        }
      }
      // If it was a hold (run), nothing to do — currentRunMode() reads
      // anyDown directly so run ends the moment release fires.
    }
    // Compatibility stub for legacy call sites (window-blur, modal-open, etc).
    function syncB() { /* no-op — bState transitions are event-driven now */ }

    // ============ Y/X combat combo detection (Nov 2026 remap) ============
    // Y = punch, X = kick. Chains within COMBO_WINDOW_MS detect higher-tier
    // moves: Y→X→Y = Sword Swing, X→Y→X = Blaster Shot. Two-input Y→X or
    // X→Y is logged but stays in the chain so it can upgrade to a 3-input
    // combo. Chain auto-truncates on pause and clears after a 3-combo fires.
    const combatChain = [];   // array of { btn: 'y'|'x', t: nowMs() }

    function pushCombatInput(btn) {
      const t = nowMs();
      // Prune stale entries beyond the combo window.
      while (combatChain.length > 0 && (t - combatChain[combatChain.length - 1].t) > COMBO_WINDOW_MS) {
        combatChain.length = 0;
        break;
      }
      combatChain.push({ btn, t });
      // Cap chain length at 3.
      if (combatChain.length > 3) combatChain.shift();
      // Classify.
      if (combatChain.length === 3) {
        const seq = combatChain.map(e => e.btn).join('');
        if (seq === 'yxy') {
          console.log('[combat] SWORD SWING (combo: Y→X→Y)');
          fireCombatAction('sword');
          combatChain.length = 0;
          return;
        }
        if (seq === 'xyx') {
          console.log('[combat] BLASTER SHOT (combo: X→Y→X)');
          fireCombatAction('blaster');
          combatChain.length = 0;
          return;
        }
        // 3-input chain that isn't YXY or XYX — drop the oldest and let
        // the new input anchor a sub-chain.
        combatChain.shift();
      }
      if (combatChain.length === 2) {
        const seq = combatChain.map(e => e.btn).join('');
        if (seq === 'yx' || seq === 'xy') {
          console.log('[combat] Y/X combo (so far): ' + seq.toUpperCase());
          return;
        }
      }
      // Single input — basic punch (Y) or kick (X).
      console.log('[combat] ' + (btn === 'y' ? 'PUNCH' : 'KICK'));
      fireCombatAction(btn === 'y' ? 'punch' : 'kick');
    }

    // Set the player into a combat animation. Snappy / interruptible — calling
    // again mid-animation restarts at frame 0 with the new action. The
    // ticker in update() clears the action when COMBAT_TOTAL_MS has elapsed.
    function fireCombatAction(action) {
      player.combatAction    = action;
      player.combatPhase     = 0;
      player.combatStartedAt = nowMs();
    }

    // ============ L/R wiped (Nov 2026 remap) ============
    // L and R shoulders are intentionally no-op — see applyHotzone above.
    // The 80ms-grace pair-detection state machine and pollLRHold() were
    // removed when fly moved to B-double-tap and Ult was deferred.

// Decide the current movement mode.
    //   flyEnabled (B double-tap toggle) → fly  (highest priority)
    //   B held (past press)              → run
    //   otherwise                        → walk
    function currentRunMode() {
      if (bState.flyEnabled) return 'fly';
      if (bState.anyDown)    return 'run';
      return 'walk';
    }
    // No-op stub. Previously: auto-cleared run/fly sustains once the
    // player stopped moving. Now fly is a manual toggle (L+R tap to enter,
    // L+R tap to exit) and there is no run sustain to clear. Kept as a
    // stub so the call site in update() doesn't need to change.
    function maybeClearToggles(_inputActive) { /* no-op — see comment above */ }

    function setKey(e, value) {
      // While any modal is open, the keyboard is reserved for menu nav —
      // arrow keys move focus / cursor, not the player. Returning false
      // here also avoids "leaking" a held movement key into the game when
      // the modal closes (the openModal block already zeroes keyInput).
      if (modalState.current) return false;
      // Returns true if the key matched a movement / run key (so we can
      // preventDefault and avoid page scroll).
      const k = e.key;
      if (k === 'ArrowUp'    || k === 'w' || k === 'W') { keyInput.up    = value; return true; }
      if (k === 'ArrowDown'  || k === 's' || k === 'S') { keyInput.down  = value; return true; }
      if (k === 'ArrowLeft'  || k === 'a' || k === 'A') { keyInput.left  = value; return true; }
      if (k === 'ArrowRight' || k === 'd' || k === 'D') { keyInput.right = value; return true; }
      // Y key = Y button (Punch). Press only.
      if ((k === 'y' || k === 'Y') && value) {
        pushCombatInput('y');
        return true;
      }
      // X key = X button (Kick). Press only.
      if ((k === 'x' || k === 'X') && value) {
        pushCombatInput('x');
        return true;
      }
      // Shift = B button (run). Press → onBPress. Release → onBRelease.
      // Hold = run, double-tap = fly. Tap timing handled inside the B
      // state machine.
      if (k === 'Shift') {
        if (value) onBPress(); else onBRelease();
        return true;
      }
      // F = fly toggle shortcut for desktop testing (skip the double-tap
      // dance). Same effect as a controller B double-tap.
      if ((k === 'f' || k === 'F') && value) {
        bState.flyEnabled = !bState.flyEnabled;
        console.log('[input] FLY TOGGLE (keyboard F) → ' + (bState.flyEnabled ? 'ON' : 'OFF'));
        return true;
      }
      // Enter / Space = A button (interact). Press only.
      if ((k === 'Enter' || k === ' ') && value) {
        if (modalState.current === 'aethryx') { closeModal(); return true; }
        const exit = regionExitReady();
        if (exit === 'north') { transitionRegion('north');   return true; }
        if (exit === 'south') { transitionRegion('central'); return true; }
        if (exit === 'south-enter')        { transitionRegion('south');   return true; }
        if (exit === 'central-from-south') { transitionRegion('central'); return true; }
        if (exit === 'hq')    { transitionRegion('hq');      return true; }
        if (exit === 'central-from-hq') { transitionRegion('central'); return true; }
        if (hugeHouseState.adjacent) { transitionRegion('hq'); return true; }
        if (ufoState.adjacent) { openModal('aethryx');       return true; }
        return true;
      }
      return false;
    }

    window.addEventListener('keydown', (e) => {
      if (setKey(e, true) && !e.repeat) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      if (setKey(e, false)) e.preventDefault();
    });
    // If the window loses focus mid-press (alt-tab, etc), drop all input — otherwise
    // the key would appear "stuck" until they tap that same key on return.
    window.addEventListener('blur', () => {
      keyInput.up = keyInput.down = keyInput.left = keyInput.right = false;
      resetBState();
    });

    // ============ Hotzone controller (GBA-style chassis) ============
    // Each .hotzone button on the controller frame has a `data-hot` attribute
    // identifying which control it represents. D-pad arrows are wired to
    // joyInput (which the game loop reads). Face buttons / shoulders / menu /
    // start / select are reserved for future sessions — they capture touches
    // (preventing accidental page scroll) but don't drive any game logic yet.

    // Maps each in-flight touch identifier to the hotzone it started on, so
    // releases tear down the correct hotzone even when fingers swap order.
    const hotzoneTouches = new Map();

    // Haptic feedback — short pulse on every PRESS (not release). Tuned so the
    // hand barely registers it consciously but every tap "feels real" via the
    // Vibration API. Movement buttons get a softer pulse than menu/face buttons
    // since holding the D-pad shouldn't feel like rapid-fire taps. Graceful no-op
    // on devices without vibration support (most iOS browsers).
    function haptic(intensity) {
      if (!('vibrate' in navigator)) return;
      try { navigator.vibrate(intensity); } catch (_) { /* swallow */ }
    }

    function applyHotzone(name, pressed) {
      // ============ Control map (Nov 2026 remap) ============
      //   D-pad     — movement
      //   A         — interact (UFO / NPC / region exit / chest / close Aethryx)
      //   B         — hold = run; double-tap = fly toggle
      //   X         — kick (combat)
      //   Y         — punch (combat)
      //   L / R     — wiped (no-op for now; reserved for future)
      //   Menu     — Hub modal      Start — Pause modal      Select — Map modal
      //   Combos: Y→X→Y = Sword Swing, X→Y→X = Blaster Shot
      // ======================================================

      // Movement directions wire into the shared input state. Soft pulse on press.
      if (name === 'up' || name === 'down' || name === 'left' || name === 'right') {
        if (pressed) haptic(6);
        if (modalState.current) return;
        joyInput[name] = pressed;
        return;
      }
      // B — hold-vs-double-tap classifier. Fires on BOTH press AND release
      // (unlike combat buttons) so the state machine can tell hold from tap.
      if (name === 'b') {
        if (pressed) haptic(6);
        if (modalState.current) return;
        if (pressed) onBPress(); else onBRelease();
        return;
      }
      // X = Kick. Combat input — press only.
      if (name === 'x') {
        if (pressed) {
          haptic(6);
          if (modalState.current) return;
          pushCombatInput('x');
        }
        return;
      }
      // Y = Punch. Combat input — press only.
      if (name === 'y') {
        if (pressed) {
          haptic(6);
          if (modalState.current) return;
          pushCombatInput('y');
        }
        return;
      }
      // L / R — wiped clean. Soft haptic so the tap still feels alive but
      // no game action fires. Reserved for future specials / Ult once the
      // combat design locks them in.
      if (name === 'l' || name === 'r') {
        if (pressed) haptic(4);
        return;
      }
      // Modal-trigger buttons fire on PRESS only, not release. Tapping the
      // same button while its modal is open toggles it closed.
      if (pressed) {
        haptic(12);
        if (name === 'menu')   { toggleModal('hub');   return; }
        if (name === 'select') { toggleModal('map');   return; }
        if (name === 'start')  { toggleModal('pause'); return; }
        // A — pure interact. Closes Aethryx if open, transitions region at
        // an edge, opens Aethryx near the UFO, otherwise no-op (combat is
        // on X / Y now). Future hooks: NPC dialog, chest open.
        if (name === 'a') {
          if (modalState.current === 'aethryx') { closeModal(); return; }
          const exit = regionExitReady();
          if (exit === 'north') { transitionRegion('north');   return; }
          if (exit === 'south') { transitionRegion('central'); return; }
          if (exit === 'south-enter')        { transitionRegion('south');   return; }
          if (exit === 'central-from-south') { transitionRegion('central'); return; }
          if (exit === 'hq')    { transitionRegion('hq');      return; }
          if (exit === 'central-from-hq') { transitionRegion('central'); return; }
          if (hugeHouseState.adjacent) { transitionRegion('hq'); return; }
          if (ufoState.adjacent)       { openModal('aethryx');  return; }
          return;
        }
        console.log('[hotzone] press:', name);
      }
    }

    // ============ Modal management ============
    // Three independent modal panels (hub, map, pause) but only one can be
    // open at a time. modalState.current tracks which is active (or null).
    // While a modal is open: the game loop SKIPS update() (so player can't
    // move), but render() still runs (so the world stays drawn behind pause).
    // All open / close paths share these helpers so behavior stays consistent.
    const modalState = { current: null };

    function openModal(name) {
      // Close any currently-open modal first.
      if (modalState.current && modalState.current !== name) {
        closeModal();
      }
      const el = document.getElementById('modal-' + name);
      if (!el) return;
      el.hidden = false;
      // Force a reflow so the .open class transition actually animates.
      // Without this, removing [hidden] and adding .open in the same tick
      // skips the fade-in.
      void el.offsetWidth;
      el.classList.add('open');
      modalState.current = name;
      // Per-modal open hooks (e.g., update map marker position).
      if (name === 'map') { updateMapMarker(); resetMapCursor(); }
      if (name === 'aethryx') refreshFactionUI();
      // Auto-focus the first interactive button so arrow nav has a starting
      // point. Slight delay so the modal's fade-in transition lands first.
      if (name === 'hub' || name === 'pause' || name === 'aethryx') {
        setTimeout(() => {
          const firstBtn = el.querySelector(
            '.hub-item, .pause-btn:not([disabled]), .faction-slot:not([disabled])'
          );
          if (firstBtn) firstBtn.focus();
        }, 60);
      }
      // Drop any in-flight movement so the player doesn't keep walking when
      // the modal closes (could otherwise feel like the world "remembered"
      // the keypress through the pause). Run modifier also clears so the
      // player isn't stuck in a sprint they didn't ask for after a pause.
      keyInput.up = keyInput.down = keyInput.left = keyInput.right = false;
      joyInput.up = joyInput.down = joyInput.left = joyInput.right = false;
      resetBState();
      player.mode = 'walk';
    }

    function closeModal() {
      if (!modalState.current) return;
      const el = document.getElementById('modal-' + modalState.current);
      modalState.current = null;
      document.body.classList.remove('modal-open');
      if (!el) return;
      el.classList.remove('open');
      // Wait for the fade-out to finish before re-hiding so the transition
      // is visible. 280ms = 250ms transition + small buffer.
      setTimeout(() => {
        if (!modalState.current) el.hidden = true;
      }, 280);
    }

    function toggleModal(name) {
      if (modalState.current === name) closeModal();
      else openModal(name);
    }

    // ============ Faction UI (Aethryx Expanse modal) ============
    // Each .faction-slot[data-npc=…] mirrors an NPC entry. The slot's
    // active|docked class follows the npc.active flag. Tapping a slot
    // toggles the flag — the engine's updateNPCs / blocked / updateInteractions
    // / drawWorld all respect it, so the NPC vanishes from the level cleanly.
    function refreshFactionUI() {
      const grid = document.getElementById('faction-grid');
      if (!grid) return;
      grid.querySelectorAll('.faction-slot[data-npc]').forEach(slot => {
        const id = slot.dataset.npc;
        const npc = NPCS.find(n => n.id === id);
        if (!npc) return;
        const isActive = npc.active !== false;
        slot.classList.toggle('docked', !isActive);
        const statusEl = slot.querySelector('.faction-status');
        if (statusEl) statusEl.textContent = isActive ? 'In Viridia' : 'Docked';
      });
    }
    // Bind clicks once at boot — slots are static DOM, no need to re-bind on open.
    document.querySelectorAll('.faction-slot[data-npc]').forEach(slot => {
      slot.addEventListener('click', () => {
        const id = slot.dataset.npc;
        const npc = NPCS.find(n => n.id === id);
        if (!npc) return;
        npc.active = !(npc.active !== false);  // toggle (treats undefined as true)
        refreshFactionUI();
        haptic(8);
      });
    });

    // ============ Summon Faction to Ship ============
    // Teleports all 4 wired NPCs (Vol / Eur / Aur / Elz) to grouped positions
    // around the player's current spot, in the player's current region. NPCs
    // un-dock if they were docked, face the player, then resume their normal
    // autonomous wander after a brief 0.5s pause.
    //
    // Layout: 4 cardinal directions around the player, ~72 px out (≈2 tiles).
    // Each NPC faces inward toward the player so the spawn reads as a group
    // rallying to the ship.
    //
    // Collision: each spot is npcBlocked-checked. If the ideal position is
    // occupied (tree, house, another NPC, player), the function searches a
    // small spiral around the target until a free spot is found. Falls back
    // to the ideal position if 32 attempts fail (better visible-but-clipped
    // than invisible).
    function summonFactionToShip() {
      const wiredIds = ['voltyran', 'eurakeon', 'aurexion', 'elzoran'];
      // [dx, dy, faceTowardPlayer] for N / E / S / W
      const offsets = [
        { dx:   0, dy: -72, facing: 'down'  },   // N — faces down toward player
        { dx:  72, dy:   0, facing: 'left'  },   // E — faces left toward player
        { dx:   0, dy:  72, facing: 'up'    },   // S — faces up toward player
        { dx: -72, dy:   0, facing: 'right' },   // W — faces right toward player
      ];
      const worldW = MAP_WIDTH  * TILE_SIZE;
      const worldH = MAP_HEIGHT * TILE_SIZE;
      // Spiral search offsets — tried if the ideal spot is blocked.
      const spiral = [
        [0,0], [16,0], [-16,0], [0,16], [0,-16],
        [24,16], [-24,16], [24,-16], [-24,-16],
        [32,0], [-32,0], [0,32], [0,-32],
        [48,24], [-48,24], [48,-24], [-48,-24],
        [16,40], [-16,40], [16,-40], [-16,-40],
      ];
      const placed = [];
      for (let i = 0; i < wiredIds.length; i++) {
        const npc = NPCS.find(n => n.id === wiredIds[i]);
        if (!npc) continue;
        const off = offsets[i];
        const ideal_x = player.x + off.dx;
        const ideal_y = player.y + off.dy;
        // Update region BEFORE collision-checking (npcBlocked uses the
        // active+region gate via npcBodyBox lookups for other NPCs)
        npc.region = currentRegion;
        npc.active = true;
        let nx = ideal_x, ny = ideal_y, found = false;
        for (const [sdx, sdy] of spiral) {
          const tx = Math.max(0, Math.min(worldW - npc.w, ideal_x + sdx));
          const ty = Math.max(0, Math.min(worldH - npc.h, ideal_y + sdy));
          if (!npcBlocked(npc, tx, ty)) {
            nx = tx; ny = ty; found = true; break;
          }
        }
        npc.x = nx;
        npc.y = ny;
        // Face the player so the group reads as "rallying to the ship."
        npc.facing    = off.facing;
        npc.currentDir = 'idle';   // hold idle for half a second
        npc.dirTimer  = 0.5;       // then re-pick a wander direction
        npc.animFrame = 0;
        npc.animTime  = 0;
        placed.push(`${wiredIds[i]}@(${Math.round(nx)},${Math.round(ny)})${found ? '' : ' [fallback]'}`);
      }
      console.log('[summon] faction spawned:', placed.join(', '));
      refreshFactionUI();
      haptic(20);
      closeModal();
    }
    const summonBtn = document.getElementById('summon-faction-btn');
    if (summonBtn) {
      summonBtn.addEventListener('click', summonFactionToShip);
    }

    // Map marker — position the "you are here" dot inside the map placeholder
    // based on player's normalized position within the world bounds.
    function updateMapMarker() {
      const marker = document.getElementById('map-marker');
      if (!marker) return;
      const worldW = MAP_WIDTH  * TILE_SIZE;
      const worldH = MAP_HEIGHT * TILE_SIZE;
      const nx = (player.x + CHAR_W / 2) / worldW;
      const ny = (player.y + CHAR_H / 2) / worldH;
      marker.style.left = (nx * 100).toFixed(2) + '%';
      marker.style.top  = (ny * 100).toFixed(2) + '%';
    }

    // Wire modal close buttons + backdrop taps. Every element with [data-close]
    // (the X button, the dimmed backdrop, the Resume button) closes the modal.
    document.querySelectorAll('.modal').forEach((modalEl) => {
      modalEl.addEventListener('click', (e) => {
        if (e.target.closest('[data-close]')) {
          closeModal();
        }
      });
    });

    // Pause-modal action buttons that switch to a different modal (e.g.,
    // "Open Astralpack" from pause should close pause + open hub).
    document.querySelectorAll('[data-pause-action]').forEach((btn) => {
      const action = btn.dataset.pauseAction;
      if (action !== 'hub' && action !== 'map') return;   // 'exit' navigates away
      btn.addEventListener('click', () => {
        closeModal();
        // Give the close transition a moment before opening the next modal.
        setTimeout(() => openModal(action), 180);
      });
    });

    // Hub item taps — placeholder for future feature wiring. Each item logs
    // for now so it's clear which button was pressed during testing.
    document.querySelectorAll('[data-hub]').forEach((btn) => {
      btn.addEventListener('click', () => {
        console.log('[hub] select:', btn.dataset.hub);
        // Placeholder: each of these will open its own sub-view in future sessions.
      });
    });

    // Keyboard shortcuts — Escape closes any open modal. M/X/Y also trigger
    // the same modals as the controller buttons (useful for desktop testing).
    // Return/Enter mirrors the A button (context-sensitive interact —
    // currently opens the Aethryx Expanse modal when adjacent to the UFO).
    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      if (e.key === 'Escape' && modalState.current) {
        closeModal();
        e.preventDefault();
        return;
      }
      // Modal hotkeys only fire when no modal is open OR when toggling the
      // same one. (Letting them swap freely while open would race with the
      // close transition.)
      if (e.key === 'm' || e.key === 'M') { toggleModal('hub');   e.preventDefault(); }
      if (e.key === 'x' || e.key === 'X') { toggleModal('map');   e.preventDefault(); }
      if (e.key === 'y' || e.key === 'Y') { toggleModal('pause'); e.preventDefault(); }
      // Enter/Return → A button (interact). Fires through applyHotzone so the
      // same toggle logic the controller's A button uses applies: open when
      // adjacent to an interactable, close when the resulting modal is already
      // on screen. (Mirrors the Y-and-Y / X-and-X / M-and-M close-on-same-key
      // pattern the user expects.)
      if (e.key === 'Enter') {
        applyHotzone('a', true);
        e.preventDefault();
      }
      // Arrow keys — modal navigation when a modal is open. Hub + Pause +
      // Aethryx cycle focus through their buttons; Map slides a cosmic-blue
      // cursor across the chart. Movement keys are ignored while a modal
      // is open (see setKey early-return).
      if (modalState.current) {
        const arrow = arrowKeyName(e.key);
        if (arrow) {
          handleModalArrow(arrow);
          e.preventDefault();
        }
      }
    });

    function arrowKeyName(k) {
      if (k === 'ArrowUp')    return 'up';
      if (k === 'ArrowDown')  return 'down';
      if (k === 'ArrowLeft')  return 'left';
      if (k === 'ArrowRight') return 'right';
      return null;
    }
    function handleModalArrow(dir) {
      const m = modalState.current;
      if (m === 'hub')     modalArrowFocus('hub',     dir, 2);   // 2-col grid
      if (m === 'pause')   modalArrowFocus('pause',   dir, 1);   // stack
      if (m === 'aethryx') modalArrowFocus('aethryx', dir, 4);   // 4-col faction grid
      if (m === 'map')     moveMapCursor(dir);
    }
    function modalArrowFocus(modalName, dir, cols) {
      const panel = document.querySelector('#modal-' + modalName + ' .modal-panel');
      if (!panel) return;
      // Focusable: hub items, enabled pause buttons, enabled faction slots.
      const btns = Array.from(panel.querySelectorAll(
        '.hub-item, .pause-btn:not([disabled]), .faction-slot:not([disabled])'
      ));
      if (btns.length === 0) return;
      let idx = btns.indexOf(document.activeElement);
      if (idx === -1) idx = 0;
      if (dir === 'left')  idx = Math.max(0,            idx - 1);
      if (dir === 'right') idx = Math.min(btns.length-1, idx + 1);
      if (dir === 'up')    idx = Math.max(0,            idx - cols);
      if (dir === 'down')  idx = Math.min(btns.length-1, idx + cols);
      btns[idx].focus();
    }

    // ============ Map cursor (X modal arrow nav) ============
    // mapCursor is normalized to 0..1 inside the map canvas. Reset to the
    // central region (0.5, 0.5) every time the map modal opens. Arrow keys
    // shift it MAP_CURSOR_STEP per press, clamped to the canvas bounds.
    const mapCursor = { x: 0.5, y: 0.5 };
    const MAP_CURSOR_STEP = 0.06;
    function updateMapCursorUI() {
      const c = document.getElementById('map-cursor');
      if (!c) return;
      c.style.left = (mapCursor.x * 100).toFixed(2) + '%';
      c.style.top  = (mapCursor.y * 100).toFixed(2) + '%';
    }
    function moveMapCursor(dir) {
      if (dir === 'up')    mapCursor.y = Math.max(0, mapCursor.y - MAP_CURSOR_STEP);
      if (dir === 'down')  mapCursor.y = Math.min(1, mapCursor.y + MAP_CURSOR_STEP);
      if (dir === 'left')  mapCursor.x = Math.max(0, mapCursor.x - MAP_CURSOR_STEP);
      if (dir === 'right') mapCursor.x = Math.min(1, mapCursor.x + MAP_CURSOR_STEP);
      updateMapCursorUI();
      // Reveal the cursor on first interaction — keeps it from competing with
      // the "you are here" headshot marker when the map first opens.
      const c = document.getElementById('map-cursor');
      if (c) c.classList.add('visible');
    }
    function resetMapCursor() {
      mapCursor.x = 0.5;
      mapCursor.y = 0.5;
      updateMapCursorUI();
      const c = document.getElementById('map-cursor');
      if (c) c.classList.remove('visible');
    }

    function bindHotzone(el) {
      const name = el.dataset.hot;
      if (!name) return;

      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          hotzoneTouches.set(t.identifier, name);
        }
        applyHotzone(name, true);
      }, { passive: false });

      const release = (e) => {
        e.preventDefault();
        let stillHeld = false;
        for (const t of e.changedTouches) {
          hotzoneTouches.delete(t.identifier);
        }
        // If any other touch is still on this same hotzone, keep it pressed.
        for (const v of hotzoneTouches.values()) {
          if (v === name) { stillHeld = true; break; }
        }
        if (!stillHeld) applyHotzone(name, false);
      };
      el.addEventListener('touchend',    release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });

      // Desktop fallback: mousedown / mouseup also drive the hotzones, useful
      // for testing the controller layout on a non-touch device.
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        applyHotzone(name, true);
      });
      const mouseRelease = () => applyHotzone(name, false);
      el.addEventListener('mouseup',    mouseRelease);
      el.addEventListener('mouseleave', mouseRelease);
    }

    document.querySelectorAll('.hotzone').forEach(bindHotzone);

    // ============ Tap-to-interact on world objects ============
    // Tapping a sprite that's currently showing an INTERACT prompt is
    // equivalent to pressing A. First wired interactable: the UFO.
    function worldFromTap(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const sx   = canvas.width  / rect.width;
      const sy   = canvas.height / rect.height;
      const cx   = (clientX - rect.left) * sx;
      const cy   = (clientY - rect.top)  * sy;
      return { x: cx + camera.x, y: cy + camera.y };
    }
    function handleWorldTap(e) {
      if (modalState.current) return;
      let cx, cy;
      if (e.changedTouches && e.changedTouches.length) {
        cx = e.changedTouches[0].clientX;
        cy = e.changedTouches[0].clientY;
      } else {
        cx = e.clientX;
        cy = e.clientY;
      }
      const wp = worldFromTap(cx, cy);
      if (ufoState.adjacent) {
        const ux = UFO_TILE_X * TILE_SIZE;
        const uy = UFO_TILE_Y * TILE_SIZE;
        if (wp.x >= ux && wp.x < ux + UFO_W && wp.y >= uy && wp.y < uy + UFO_H) {
          haptic(12);
          openModal('aethryx');
          e.preventDefault();
          return;
        }
      }
    }
    canvas.addEventListener('click',      handleWorldTap);
    canvas.addEventListener('touchstart', handleWorldTap, { passive: false });

    // ============ Fix 2: D-pad drag-to-turn ============
    // Track which hotzone each in-flight finger is currently OVER (separate
    // from hotzoneTouches which tracks the hotzone it STARTED on). On every
    // touchmove, if the finger has crossed onto a different D-pad arrow,
    // release the previous arrow and press the new one — so sliding from

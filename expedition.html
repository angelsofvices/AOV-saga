<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="description" content="The Viridia Expedition — explorable 2D RPG prototype of The AOV™ Saga. Session 1: foundation." />
  <title>The Viridia Expedition · The AOV Saga</title>

  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#050310">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://angelsofvices.com/expedition.html">
  <meta property="og:title" content="The Viridia Expedition — The AOV Saga">
  <meta property="og:description" content="Session 1 of a 2D RPG prototype exploring the world of Viridia.">
  <meta property="og:image" content="https://angelsofvices.com/icons/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ============ Foundations (shared with the rest of the saga site) ============ */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #050310;
      --void-2: #0a0618;
      --gold: #e8c878;
      --gold-bright: #f5dc9c;
      --gold-deep: #b8923f;
      --gold-pale: #f4e3b3;
      --cosmic-blue: #5fa8ff;
      --vice: #e85a5a;
      --ivory: #f3ecdc;
      --mist: #b8aec8;
      --mist-deep: #6f6582;
      --border-soft: rgba(232, 200, 120, 0.08);
      --border: rgba(232, 200, 120, 0.18);
      --border-gold: rgba(232, 200, 120, 0.28);
      --glass: rgba(20, 12, 38, 0.55);
      --glass-strong: rgba(28, 16, 54, 0.72);

      --font-display: 'Cinzel', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-meta: 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--font-body);
      background: var(--void);
      color: var(--ivory);
      position: relative;
      min-height: 100vh;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;  /* prevents pinch-zoom + scroll-bounce on mobile */
    }

    [hidden] { display: none !important; }

    /* ============ Cosmic backdrop ============ */
    .cosmos {
      position: fixed; inset: 0; z-index: -3; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(232, 200, 120, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 30% 50%, rgba(95, 168, 255, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 80%, rgba(184, 124, 255, 0.06) 0%, transparent 55%),
        linear-gradient(180deg, #050310 0%, #0a0618 50%, #050310 100%);
    }
    .stars {
      position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden;
    }
    .stars::before {
      content: ''; position: absolute; inset: -50%;
      background-image:
        radial-gradient(1px 1px at 23% 17%, rgba(243, 236, 220, 0.6), transparent),
        radial-gradient(1px 1px at 67% 41%, rgba(232, 200, 120, 0.5), transparent),
        radial-gradient(1px 1px at 84% 73%, rgba(243, 236, 220, 0.6), transparent),
        radial-gradient(1px 1px at 12% 83%, rgba(243, 236, 220, 0.4), transparent),
        radial-gradient(1px 1px at 45% 28%, rgba(184, 124, 255, 0.35), transparent);
      background-size: 700px 700px;
      animation: drift 320s linear infinite;
      opacity: 0.55;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-300px, -300px, 0); }
    }

    /* ============ Top nav ============ */
    .nav-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 18px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      background: linear-gradient(180deg, rgba(5, 3, 16, 0.7), transparent);
      pointer-events: none;
    }
    .nav-back {
      font-family: var(--font-meta);
      font-size: 0.55rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mist);
      text-decoration: none;
      pointer-events: auto;
      padding: 6px 12px;
      border: 1px solid var(--border-soft);
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .nav-back:hover, .nav-back:active { color: var(--gold); border-color: var(--gold); }

    /* ============ Loading screen ============ */
    .loading {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--void);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .loading.done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-eyebrow {
      font-family: var(--font-meta);
      font-size: 0.5rem;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 18px;
    }
    .loading-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      letter-spacing: 0.12em;
      background: linear-gradient(180deg, var(--gold-pale) 0%, var(--gold-bright) 50%, var(--gold-deep) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 22px;
    }
    .loading-bar {
      width: 220px;
      height: 4px;
      background: rgba(232, 200, 120, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright));
      transition: width 0.3s ease;
      box-shadow: 0 0 12px rgba(232, 200, 120, 0.5);
    }
    .loading-status {
      font-family: var(--font-meta);
      font-size: 0.55rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mist);
      margin-top: 14px;
      min-height: 12px;
    }

    /* (Old stage CSS removed — replaced by .device chassis above.) */

    /* ============ Device chassis (controller frame + screen + hotzones) ============
       The whole viewport becomes a handheld-style "device" — controller PNG fills
       most of the screen, game canvas sits at the screen rectangle, hotzone divs
       overlay each button/D-pad arrow for touch input. */
    .device {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;   /* cosmos + stars show through the letterbox region */
      overflow: hidden;
    }
    /* Chassis preserves the controller's native 768:1376 aspect — no distortion.
       Scales to fit whichever viewport dimension is the limit. overflow:hidden
       so any canvas pixels extending past the chassis bounds get clipped. */
    .device-chassis {
      position: relative;
      width: min(100vw, calc(100vh * 768 / 1376));
      aspect-ratio: 768 / 1376;
      overflow: hidden;
    }
    /* Controller frame PNG — rendered ON TOP of the canvas via a pseudo-element.
       Uses controller_frame.png which is the source art with its placeholder green
       screen rectangle chroma-keyed to transparent. The opaque controller art (frame,
       buttons, cosmic backdrop) sits at z-index 2 over the canvas (z-index 1), and
       the transparent screen cutout reveals the game canvas behind it.
       pointer-events:none lets touches pass through to the hotzones below. */
    .device-chassis::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('/assets/controller_frame.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 2;
    }

    /* Game canvas — sits BEHIND the controller frame, sized to exactly fill the
       screen-cutout bbox measured from controller_main.png's green placeholder.
       The cutout is kept TIGHT to the original gold trim — the trim stays
       visible all the way around. To make the play area feel bigger, the camera
       viewport is now tighter (fewer tiles visible at once) rather than the
       cutout being larger.
         The gold trim has a curved bottom "bay" — alpha=0 only extends to
         y=745 at the corners but dips down to y=779 in the center column.
         Sizing the canvas to the corner bbox left visible dead space in the
         bay (the user complaint). The full interior bbox is:
            top: y=84,  bottom: y=779,  height = 696
            left: x=58, right:  x=710,  width  = 653
         → CSS percentages:
            left:   58/768   = 7.5521%
            top:    84/1376  = 6.1047%
            width:  653/768  = 85.0260%
            height: 696/1376 = 50.5814%
       The canvas is RECTANGULAR (covers the full corner-bbox), but the
       chassis frame at z-index:2 paints its gold-trim curves on top, so the
       canvas pixels outside the visible curved cutout are masked away. Net
       effect: the game now fills every visible cosmetic-frame interior pixel.
       Cutout aspect 0.938 — slight vertical stretch of the 224×224 canvas
       (~5%), which pixel art absorbs cleanly. */
    .device-screen {
      position: absolute;
      left: 7.5521%;
      top: 6.1047%;
      width: 85.0260%;
      height: 50.5814%;
      z-index: 1;
    }
    .device-screen canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    /* Hotzones — invisible touch targets sitting on top of each button in the art.
       z-index:3 keeps them ABOVE the ::after controller-frame overlay so taps land.
       `data-hot` attribute drives the JS handler. */
    .hotzone {
      position: absolute;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      cursor: pointer;
      pointer-events: auto;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      z-index: 3;
      /* Uncomment for debug visualization of hot zones: */
      /* outline: 2px solid rgba(255, 0, 0, 0.7); background: rgba(255,0,0,0.15); */
    }
    .hotzone:active {
      /* Subtle visual feedback on press — semi-translucent gold flash. */
      background: rgba(232, 200, 120, 0.10);
      border-radius: 8px;
    }

    /* D-pad (left side, cross shape) — Fix 1 (Nov 2026 polish pass).
       Per-arrow alignment measured against controller_frame.png art using
       debug-outlined screenshots. Each arrow's hotzone now sits on its
       visible stub instead of in the dead zone between stubs.
       Original values (pre-fix, kept for rollback reference):
         hz-up    { left: 16%; top: 64.5%; }
         hz-down  { left: 16%; top: 80%;   }
         hz-left  { left:  6%; top: 72%;   }
         hz-right { left: 31%; top: 72%;   } */
    .hz-up    { left: 16%; top: 59.5%; width: 16%; height: 7%; }
    .hz-down  { left: 16%; top: 71%;   width: 16%; height: 7%; }
    .hz-left  { left:  7%; top: 65%;   width: 11%; height: 7%; }
    .hz-right { left: 29%; top: 65%;   width: 11%; height: 7%; }

    /* Face buttons (right side, diamond — X top, Y left, A right, B bottom) */
    .hz-x { left: 73%; top: 64.5%; width: 11%; height: 6%; }
    .hz-y { left: 60%; top: 71.5%; width: 11%; height: 6%; }
    .hz-a { left: 85%; top: 71.5%; width: 11%; height: 6%; }
    .hz-b { left: 73%; top: 78.5%; width: 11%; height: 6%; }

    /* Shoulders */
    .hz-l { left:  3%; top: 1.5%; width: 14%; height: 5%; }
    .hz-r { left: 83%; top: 1.5%; width: 14%; height: 5%; }

    /* Bottom row: analog stub, MENU, START, SELECT */
    .hz-analog { left:  8%; top: 87%;   width: 16%; height: 8%; border-radius: 50%; }
    .hz-menu   { left: 42%; top: 89%;   width: 16%; height: 9%; }
    .hz-start  { left:  8%; top: 95.5%; width: 18%; height: 4%; }
    .hz-select { left: 74%; top: 95.5%; width: 18%; height: 4%; }

    /* ============ Modal overlays (Hub / Map / Pause) ============
       Three button-triggered views layered above the device chassis. All share
       a common dim+fade pattern. The chassis remains visible through pause
       (lighter dim) but hidden behind hub + map (stronger backdrop). Each
       modal has an [data-asset] slot where the user's real art will live. */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(5, 3, 16, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .modal-pause .modal-backdrop {
      background: rgba(5, 3, 16, 0.55);   /* lighter — game still readable */
    }
    .modal-panel {
      position: relative;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--glass-strong);
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 1px rgba(232,200,120,0.4);
      transform: translateY(8px);
      transition: transform 0.25s ease;
    }
    .modal.open .modal-panel { transform: translateY(0); }
    .modal-eyebrow {
      font-family: var(--font-meta);
      font-size: 0.5rem;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
      text-align: center;
      margin-bottom: 10px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      background: linear-gradient(180deg, var(--gold-pale), var(--gold-bright) 50%, var(--gold-deep));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 22px;
    }
    .modal-close {
      position: absolute;
      top: 10px; right: 12px;
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--mist);
      font-family: var(--font-meta);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover, .modal-close:active {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* Hub menu — 2-column grid, 3 rows: RIZERS / CODEX / ASTRALPACK / PROFILE / SAVE / OPTIONS */
    .hub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .hub-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      background: rgba(10, 6, 24, 0.65);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--ivory);
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }
    .hub-item:hover, .hub-item:active {
      border-color: var(--gold);
      background: rgba(20, 12, 38, 0.85);
    }
    .hub-icon {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border: 1px dashed var(--border-gold);
      border-radius: 4px;
      background-color: rgba(232, 200, 120, 0.05);
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-meta);
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      color: var(--mist-deep);
    }
    /* Wired hub icons — once art is in place, swap the dashed placeholder border
       for a clean solid one and hide the "ART" placeholder text via transparent
       color. Adding a new icon = add a new selector here pointing at the file. */
    .hub-icon[data-asset="icon-codex"],
    .hub-icon[data-asset="icon-rizers"],
    .hub-icon[data-asset="icon-astralpack"],
    .hub-icon[data-asset="icon-profile"],
    .hub-icon[data-asset="icon-save"],
    .hub-icon[data-asset="icon-options"] {
      border-style: solid;
      border-color: var(--border);
      background-color: transparent;
      color: transparent;
    }
    .hub-icon[data-asset="icon-codex"]      { background-image: url('/assets/icons/codex.png'); }
    .hub-icon[data-asset="icon-rizers"]     { background-image: url('/assets/icons/rizers.png'); }
    .hub-icon[data-asset="icon-astralpack"] { background-image: url('/assets/icons/astralpack.png'); }
    .hub-icon[data-asset="icon-profile"]    { background-image: url('/assets/icons/profile.png'); }
    .hub-icon[data-asset="icon-save"]       { background-image: url('/assets/icons/save.png'); }
    .hub-icon[data-asset="icon-options"]    { background-image: url('/assets/icons/options.png'); }

    /* Map — Viridia world map illustration. The 4:5 aspect-ratio matches the
       source PNG exactly (1122×1402), so the image fills the panel edge-to-edge
       with no letterboxing. background-size: cover gracefully crops if a
       future panel ever stretches off-ratio. */
    .map-canvas {
      position: relative;
      aspect-ratio: 4 / 5;
      border: 1px solid var(--border-gold);
      border-radius: 3px;
      background-color: var(--void-2);
      background-image: linear-gradient(180deg, rgba(95,168,255,0.06), rgba(184,124,255,0.06));
      overflow: hidden;
    }
    .map-canvas[data-asset="map-viridia"] {
      /* The ?v=2 query bumps the cache key so a re-exported map shows up on
         the next page load instead of being served from the browser's image
         cache. Bump this version (?v=3, ?v=4, …) any time obj_map.png is
         re-saved with new artwork. */
      background-image:
        linear-gradient(180deg, rgba(95,168,255,0.04), rgba(184,124,255,0.04)),
        url('/assets/obj_map.png?v=2');
      background-size: cover, cover;
      background-position: center, center;
      background-repeat: no-repeat, no-repeat;
    }
    .map-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-meta);
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mist-deep);
      text-align: center;
      padding: 24px;
    }
    /* Map marker — player headshot inside a pulsing gold ring. The background-
       image data URL is set by setMapMarkerHeadshot() at boot from a cropped
       region of the walk sheet (DOWN row, frame 0 — face visible). */
    .map-marker {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50%;
      background-color: var(--void-2);
      background-size: 240% 240%;
      background-position: center 12%;
      background-repeat: no-repeat;
      border: 2px solid var(--gold-bright);
      box-shadow: 0 0 0 2px rgba(232,200,120,0.25), 0 0 16px rgba(232,200,120,0.7);
      animation: marker-pulse 1.6s ease-in-out infinite;
      transform: translate(-50%, -50%);
      pointer-events: none;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    @keyframes marker-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(232,200,120,0.25), 0 0 16px rgba(232,200,120,0.7); }
      50%      { box-shadow: 0 0 0 6px rgba(232,200,120,0.0),  0 0 22px rgba(232,200,120,1.0); }
    }
    /* Map cursor — distinct from .map-marker. Cosmic-blue crosshair the
       player moves with arrow keys while the map modal is open. Defaults
       to the canvas center on open. */
    .map-cursor {
      position: absolute;
      width: 22px; height: 22px;
      border: 2px solid var(--cosmic-blue);
      border-radius: 3px;
      box-shadow: 0 0 12px rgba(95,168,255,0.6), inset 0 0 4px rgba(95,168,255,0.4);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: left 0.12s ease, top 0.12s ease, opacity 0.18s ease;
      left: 50%; top: 50%;
      opacity: 0;            /* hidden by default — only appears after the player moves it */
    }
    .map-cursor.visible { opacity: 1; }
    .map-cursor::before,
    .map-cursor::after {
      content: '';
      position: absolute;
      background: var(--cosmic-blue);
      box-shadow: 0 0 6px rgba(95,168,255,0.8);
    }
    .map-cursor::before { left: 50%; top: -6px;  width: 2px; height: 6px;  transform: translateX(-50%); }
    .map-cursor::after  { left: 50%; bottom: -6px; width: 2px; height: 6px;  transform: translateX(-50%); }
    .map-label {
      font-family: var(--font-meta);
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mist);
      text-align: center;
      margin-top: 12px;
    }

    /* Aethryx faction grid — 4 cols × 2 rows of NPC roster slots. Each slot
       shows the NPC's short name + active/docked status. Tap to toggle. */
    .aethryx-section-label {
      font-family: var(--font-meta);
      font-size: 0.5rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mist);
      margin: 4px 0 8px;
    }
    .faction-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .faction-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      background: rgba(10, 6, 24, 0.55);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--ivory);
      font-family: var(--font-display);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .faction-slot:hover, .faction-slot:active,
    .faction-slot:focus,
    .faction-slot:focus-visible {
      border-color: var(--gold);
      color: var(--gold-bright);
      outline: none;
      box-shadow: 0 0 12px rgba(232, 200, 120, 0.35);
    }
    .hub-item:focus,
    .hub-item:focus-visible,
    .pause-btn:focus,
    .pause-btn:focus-visible {
      outline: none;
      border-color: var(--gold);
      color: var(--gold-bright);
      box-shadow: 0 0 12px rgba(232, 200, 120, 0.35);
    }
    .faction-slot .faction-name {
      font-size: 0.72rem;
      color: var(--gold-bright);
    }
    .faction-slot .faction-status {
      font-family: var(--font-meta);
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      color: var(--mist);
    }
    /* Docked state — slot dimmed, status reads "Docked". */
    .faction-slot.docked {
      background: rgba(10, 6, 24, 0.30);
      border-color: var(--border-soft);
    }
    .faction-slot.docked .faction-name   { color: var(--mist-deep); }
    .faction-slot.docked .faction-status { color: var(--mist-deep); }
    /* Locked state — disabled, deep dim. */
    .faction-slot.locked {
      background: rgba(10, 6, 24, 0.20);
      border-color: rgba(232, 200, 120, 0.05);
      cursor: not-allowed;
    }
    .faction-slot.locked .faction-name,
    .faction-slot.locked .faction-status {
      color: rgba(184, 174, 200, 0.30);
    }

    /* Pause — compact panel with stacked actions */
    .pause-stack {
      display: flex; flex-direction: column; gap: 10px;
    }
    .pause-btn {
      padding: 14px 20px;
      background: rgba(10, 6, 24, 0.65);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--ivory);
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .pause-btn:hover, .pause-btn:active {
      border-color: var(--gold);
      color: var(--gold-bright);
    }
    .pause-btn.primary {
      background: linear-gradient(180deg, rgba(232,200,120,0.18), rgba(232,200,120,0.06));
      border-color: var(--gold);
      color: var(--gold-bright);
    }

    @media (prefers-reduced-motion: reduce) {
      .stars::before { animation: none; }
      .map-marker { animation: none; }
      .modal, .modal-panel { transition: none; }
    }
  </style>
</head>
<body>

       Lighter dim so the world stays partially visible behind. Wired so a

  <script>
    'use strict';

    // ============ Engine constants ============
    // Logical tile size in pixels. 32 is the engine standard the world is built around.
    // The canvas backing store renders at logical resolution then CSS scales it up.
    const TILE_SIZE = 32;

    // World dimensions in tiles — the FULL playable map. Larger than the viewport
    // so the camera has something to follow as the player walks. Bumped to 40×40
    // after the 1.5× building scale-up to give the procedurally placed town
    // (1 huge + 3 big + 6 med + 9 sml + NPC/UFO safe zones + scattered trees)
    // room to feel like a real small town rather than wall-to-wall houses.
    const MAP_WIDTH = 40;
    const MAP_HEIGHT = 40;

    // Viewport dimensions in tiles — what's actually visible on screen at once.
    // The canvas backing store renders at this resolution, then CSS scales it
    // up to fill the controller's screen cutout. A SMALLER viewport (fewer
    // tiles) makes each tile look bigger inside the same cutout — i.e., the
    // game world "zooms in." 7×7 tiles gives a noticeable zoom over 10×10
    // while still showing enough surroundings to navigate.
    const VIEWPORT_TILES_W = 7;
    const VIEWPORT_TILES_H = 7;
    const VIEWPORT_W = VIEWPORT_TILES_W * TILE_SIZE;   // 224 logical px
    const VIEWPORT_H = VIEWPORT_TILES_H * TILE_SIZE;   // 224 logical px

    // Object dimensions (multiples of tile size).
    const TREE_W = 96;  // 3 tiles wide visually (scaled 1.5× from the original 2-tile footprint so trees stand taller next to the player + 1.5× houses)
    const TREE_H = 96;  // 3 tiles tall visually

    // UFO landmark — Aetherstride terminal (gateway to "The Aethryx Expanse").
    // Wide sideview silhouette. Sized to match the source's natural 3.7:1
    // aspect — at 224×60 the bake is ~4.4× downsample on both axes from the
    // content-bbox crop, so the UFO reads dimensional rather than squashed
    // flat. Hardcoded at a fixed world position so it's a reliable landmark;
    // procgen reserves its zone so houses don't overlap.
    const UFO_W      = 224;
    const UFO_H      = 60;
    const UFO_TILE_X = 25;
    const UFO_TILE_Y = 5;

    // House types — visual W,H in logical pixels (= tile count × TILE_SIZE).
    // Each entry maps to one of the four entry_*house.png assets. Sizes were
    // bumped 1.5× from the initial 3/4/5/8-tile widths so the buildings tower
    // over humanoid NPCs and players. tileW/tileH stay coarse (procgen reserves
    // these tile-blocks for collision spacing); the rendered footprint may
    // slightly overlap the reserve tiles, which is intended — roofs naturally
    // hang past their reserved patch and Y-sort keeps everything readable.
    const HOUSE_TYPES = {
      'house-sml':  { w: Math.round(3 * TILE_SIZE * 1.5), h: Math.round(3 * TILE_SIZE * 1.5), tileW: 5, tileH: 5, asset: 'houseSml'  },  // 144×144
      'house-med':  { w: Math.round(4 * TILE_SIZE * 1.5), h: Math.round(4 * TILE_SIZE * 1.5), tileW: 6, tileH: 6, asset: 'houseMed'  },  // 192×192
      'house-big':  { w: Math.round(5 * TILE_SIZE * 1.5), h: Math.round(5 * TILE_SIZE * 1.5), tileW: 8, tileH: 8, asset: 'houseBig'  },  // 240×240
      'house-huge': { w: Math.round(8 * TILE_SIZE * 1.5), h: Math.round(6 * TILE_SIZE * 1.5), tileW: 12, tileH: 9, asset: 'houseHuge' },  // 384×288
    };

    // ============ Faction HQ region ============
    // Walk up to the huge house in Central + tap A → enter HQ. Inside, the
    // same hugehouse art is rendered at 1280x1024 (3.33x its Central size)
    // as a single background sprite — courtyard finally has walking room.
    // Player spawns just outside the gate; walk south off the region to
    // exit back to Central.
    const HQ_BG_W = 1280;
    const HQ_BG_H = 1024;
    const HQ_COLLIDERS = [
      { x:   67, y: 467, w: 1146, h: 233 },   // building base
      { x:  517, y: 717, w:  217, h: 167 },   // center fountain
      { x:  100, y: 650, w:  167, h: 117 },   // left side pool
      { x: 1017, y: 650, w:  167, h: 117 },   // right side pool
      { x:   17, y: 683, w:  150, h: 183 },   // left greenery
      { x: 1117, y: 683, w:  150, h: 183 },   // right greenery
      { x:    0, y: 717, w:   83, h: 217 },   // outer wall left
      { x: 1197, y: 717, w:   83, h: 217 },   // outer wall right
      { x:    0, y: 860, w:  483, h:  73 },   // bottom wall left
      { x:  793, y: 860, w:  487, h:  73 },   // bottom wall right
    ];
    const hugeHouseState = {
      adjacent:    false,
      obj:         null,
      lastWorldX:  0,
      lastWorldY:  0,
    };


    // Character — width matches a tile, height matches the sheet's true aspect ratio (200:280 = 0.714).
    const CHAR_W = 32;
    const CHAR_H = 45;

    // NPC dimensions — slightly burlier than the player so Voltyran reads as
    // a distinct presence rather than a copy. 42×40 matches the source
    // content's 1.060 aspect ratio with the player's height bracket.
    const NPC_W = 42;
    const NPC_H = 40;
    // Voltyran display size — 1.2x the baseline so he reads as the anchor
    // elder of the four. Eurakeon's 2x scale still references NPC_W /
    // NPC_H (unchanged) so this bump only affects Vol.
    const VOL_DISPLAY_W = 50;
    const VOL_DISPLAY_H = 48;

    // ============ Enemy display sizes ============
    // First import: idle stance only (single static pose). Walk/attack sheets
    // come later. Sizes preserve source content aspect ratios:
    //   Mori    — basic enemy, taller-than-wide tan humanoid (368×621 src) → 36×60
    //   Daemon  — mid-tier enemy, horned dark figure (491×573 src)        → 48×56
    //   Khronis — BOSS, winged demonic colossus (957×907 src)             → 96×91
    const MORI_W    = 36;  const MORI_H    = 60;
    const DAEMON_W  = 48;  const DAEMON_H  = 56;
    const KHRONIS_W = 96;  const KHRONIS_H = 91;
    // Static-frame walk order — same sprite for every facing × every frame
    // so the existing NPC render path (frames[facing][order[animFrame]])
    // works without modification. Used for idle-only enemy imports until
    // their proper directional sheets land.
    const STATIC_ENEMY_ORDER = {
      up:    [0, 0, 0, 0],
      down:  [0, 0, 0, 0],
      left:  [0, 0, 0, 0],
      right: [0, 0, 0, 0],
    };
    // Eurakeon-specific display size. He reads as a larger, more imposing
    // presence than Voltyran — baked at 2x Voltyran's footprint (84×80). The
    // slicer uses these constants so the source 240×280 frame is scaled to
    // the bigger destination canvas directly — no double-scaling at draw time.
    const EUR_DISPLAY_W = 84;
    const EUR_DISPLAY_H = 80;
    // Aurexion display size — 1.4× the player's footprint (32×45 → 45×63).
    // Tall slim humanoid; reads as the commanding astralnaut of the trio
    // (Voltyran is shorter/stocky, Eurakeon is non-humanoid). The slicer's
    // bilinear smoothing keeps the gold trim + helmet legible at this size.
    const AUR_DISPLAY_W = 45;
    const AUR_DISPLAY_H = 63;

    // ============ Sprite-sheet layout (animation_walk_player.png) ============
    // Calibrated to the v3 character's actual content bbox (not the
    // body-center). The character has bushy hair that extends well past the
    // torso on the LEFT/RIGHT/UP rows, so the OLD body-centered cols
    // [305, 546, 789, 1032] were clipping the hair-side of every frame by
    // 7-38px (the user saw it as "cut off when walking right"). New cols are
    // the cross-row bbox-center per column, so each row's full silhouette
    // (hair + body) fits inside the frameW=200 crop with ~16-21px of margin.
    //   Re-measured per-row content bboxes:
    //     UP    y=50..299    cols [(257,417),(517,675),(767,923),(1013,1167)]
    //     LEFT  y=339..587   cols [(259,403),(511,659),(768,911),(1016,1161)]
    //     RIGHT y=648..890   cols [(266,412),(519,662),(784,925),(1029,1170)]
    //     DOWN  y=942..1196  cols [(256,414),(507,666),(763,922),(1011,1169)]
    //   Per-col cross-row span centers: [336, 591, 844, 1090].
    //   rowBases = content y1 + ~4px buffer (kept from feet-clipping fix).
    const SHEET = {
      frameW: 200,
      frameH: 280,
      cols: [336, 591, 844, 1090],
      rowBases: {                    // feet-y of each row's sprite (content y1 + ~4px buffer)
        up:    303,
        left:  591,
        right: 894,
        down: 1200,
      },
    };

    // Animation pace — 8 frames per second through a 4-frame walk cycle (so a step every 125ms).
    const ANIM_FPS = 8;
    const ANIM_FRAMES = 4;

    // Voltyran sheet layout — calibrated from the source PNG via per-row content
    // detection. Same general structure as SHEET (label column + 4 frame columns)
    // but row baselines and frame widths differ slightly because his stance is
    // wider / squatter than the player's.
    const VOLTYRAN_SHEET = {
      frameW: 220,
      frameH: 280,
      cols: [310, 550, 790, 1030],   // averaged column centers across all rows
      rowBases: {
        up:    310,
        left:  596,
        right: 892,
        down: 1180,
      },
    };

    // Voltyran's walk-cycle order. His source sheet appears to have 4 distinct
    // step poses per row (no rest variants like the player's down row had), so
    // a plain [0,1,2,3] cycle works without remapping or mirroring. Kept as a
    // table so per-direction tweaks remain easy.
    const VOLTYRAN_WALK_ORDER = {
      up:    [0, 1, 2, 3],
      down:  [0, 1, 2, 3],
      left:  [0, 1, 2, 3],
      right: [0, 1, 2, 3],
    };

    // Eurakeon walk sheet — calibrated from animation_walk_eurakeon.png via the
    // same row/column content-density probe used for the player + Voltyran
    // sheets. His silhouette spreads wider than the others (purple-flame wings
    // span far on the LEFT/RIGHT rows, max bbox-span 239px on col 3). frameW
    // bumped 240 → 260 so the widest frame fits with a 10-12px margin instead
    // of running flush against the crop edge (which was clipping fire wisps).
    //   Measured content baselines (+3px margin) — feet/tail bottom of each row:
    //     UP    y=50..292    baseline ~295
    //     LEFT  y=341..596   baseline ~599
    //     RIGHT y=647..898   baseline ~901
    //     DOWN  y=942..1174  baseline ~1177
    //   Cross-row bbox-center per column: [325, 575, 828, 1074].
    const EURAKEON_SHEET = {
      frameW: 260,
      frameH: 280,
      cols: [325, 575, 828, 1074],
      rowBases: {
        up:    295,
        left:  599,
        right: 901,
        down: 1177,
      },
    };

    // Eurakeon walk-cycle order. Same shape as Voltyran's — 4 distinct poses
    // per row, no remapping needed. Table kept around for per-direction tweaks.
    const EURAKEON_WALK_ORDER = {
      up:    [0, 1, 2, 3],
      down:  [0, 1, 2, 3],
      left:  [0, 1, 2, 3],
      right: [0, 1, 2, 3],
    };

    // Elzoran fly sheet — calibrated from animation_fly_elzoran.png. He's a
    // FLYING NPC (no walk asset), so this same sheet drives all 4 facings —
    // he hovers in place, never touches the ground.
    //   Measured content bboxes (4 rows × 4 frame cols):
    //     UP    y= 89..298   centers [197, 549, 875, 1194]
    //     LEFT  y=362..539   centers [174, 527, 852, 1144]
    //     RIGHT y=612..792   centers [201, 505, 835, 1189]
    //     DOWN  y=877..1063  centers [175, 499, 827, 1157]
    //   Averaged per-col centers: [187, 520, 847, 1171].
    //   frameW=340 holds the widest col (col 3 right edge=1331 → 10px buffer).
    //   frameH=220 holds the tallest row (UP=210 → 10px buffer).
    const ELZORAN_FLY_SHEET = {
      frameW: 340,
      frameH: 220,
      cols: [187, 520, 847, 1171],
      rowBases: {
        up:    302,
        left:  543,
        right: 796,
        down: 1067,
      },
    };
    const ELZORAN_WALK_ORDER = {
      up:    [0, 1, 2, 3],
      down:  [0, 1, 2, 3],
      left:  [0, 1, 2, 3],
      right: [0, 1, 2, 3],
    };
    // Elzoran display size — 112×72 (~4× the original 60×40 footprint). The
    // root reference (character_elzoran.png, 1024×1024 with content 941×765)
    // packs dense detail: face, scale plates, wing veins, plasma orbs, gold
    // trim. The previous 84×56 bake was hitting a ~4× downsample with
    // bilinear smoothing, which blurred everything into a smear. 112×72 keeps
    // the source aspect (~1.55:1) and pairs with NEAREST resampling so the
    // pixel-art reads crisp.
    const ELZ_DISPLAY_W = 112;
    const ELZ_DISPLAY_H = 72;

    // ============ Combat sheet (animation_combat_player.png) ============
    // 1536×1024 sprite sheet, 5 rows × 4 frames each. Each row is one combat
    // animation: PUNCH, KICK, BLAST, SWORD, BLASTER. Each row's leftmost
    // ~350px is a label glyph that the per-frame crops sit east of.
    //
    // Phase B.5: PER-FRAME variable source crop (was uniform 280×204). Each
    // frame defines its own (srcX, srcW) so beam/effect frames (BLAST f3,
    // SWORD f3, BLASTER f3) can capture the FULL beam tail without clipping
    // — the BLASTER plasma blast extends to source x≈1428, ~370px past the
    // character body. All frames bake at the SAME 4× downsample so character
    // size stays consistent across the animation; the destination canvas
    // width varies per frame (taller frames stay 51px = 204/4 source-pinned).
    //
    // Character body anchor lands at dest x=COMBAT_ANCHOR_X in every frame,
    // independent of canvas width. The renderer aligns this anchor to the
    // walk-box centerline so the character doesn't drift sideways during
    // the animation.
    //
    // Source row Y bands (all 204 px tall):

    // Dest canvas height — natural source/4 = 51 (204/4). Padded to 64 so

    const CHAR_H_COMBAT  = 64;

    const COMBAT_OFFSET_Y = CHAR_H - CHAR_H_COMBAT;   // 45 - 64 = -19

    const COMBAT_FRAMES   = 4;

    // Aurexion walk sheet — calibrated from animation_walk_aurexion.png.

    // Fly canvas dims. Wider than walk's CHAR_W to fit the wing-spread without

    const CHAR_H_FLY  = CHAR_H;            // 45 — match walk for vertical consistency

    // ============ Idle sheet (animation_idle_player.png) ============
    // Unlike the walk/run/fly sheets where rows = directions, this sheet's 4
    // rows are 4 different IDLE POSES (top to bottom). The 4 columns are 4
    // micro-animation frames per pose (looped). The player progresses through
    // poses every IDLE_POSE_DURATION seconds — pose 0 (standing) → pose 1
    // → pose 2 → pose 3 → pose 0 …
    //   Pose heights vary (some sitting/crouching), so frameH is sized to the
    //   shortest pose-to-pose gap to avoid bleed from the row above. With
    //   rowBases at content-y1+~4 and the row 3 gap being 250px, frameH=240
    //   is safe across all rows.
    //   Measured per-row content bboxes:
    //     row 0  y=102..324   cols [(286,412),(521,647),(756,882),(984,1113)]   (standing tall, h=223)
    //     row 1  y=485..596   cols [(222,441),(477,695),(729,945),(973,1192)]   (shorter pose, h=112)

    //   Cols are stored PER-ROW (not cross-row averaged) — pose 0's content is
    //   noticeably right-shifted vs the other rows, and using averaged centers
    //   was causing the standing-breathe cycle to visibly drift left across
    //   its 4 frames. Per-row centers keep each pose's micro-anim in place.
    const IDLE_SHEET = {
      frameW: 240,
      frameH: 240,
      rowBases: [328, 600, 894, 1143],     // pose 0 (top) .. pose 3 (bottom) feet y
      colsByRow: [
        [349, 584, 819, 1048],             // pose 0 (standing) — content sits right of the other rows
        [331, 586, 837, 1082],             // pose 1
        [322, 571, 837, 1090],             // pose 2
        [324, 587, 846, 1090],             // pose 3
      ],
    };

    // Idle canvas dims. Square (40×40) to match the idle source aspect (1.0)
    // so no horizontal squash. Offsets re-anchor the idle canvas onto the
    // walk-canvas foot position so toggling walk ↔ idle doesn't move the
    // visual character around — feet stay put, head sits where its pose lands.
    const CHAR_W_IDLE   = 40;
    const CHAR_H_IDLE   = 40;
    const IDLE_OFFSET_X = (CHAR_W_IDLE - CHAR_W) / 2;   // 4
    const IDLE_OFFSET_Y = CHAR_H - CHAR_H_IDLE;         // 5  (idle canvas is shorter, push it down so feet line up)

    // Pose cycle timing. 15 seconds per pose, cycling top-to-bottom and
    // wrapping. Within each pose, the 4 cols cycle at IDLE_ANIM_FPS for the
    // small in-pose flourish (breathing, blinking, etc).
    const IDLE_POSE_DURATION = 15;   // seconds per pose row
    const IDLE_ANIM_FPS      = 4;    // within-pose micro-animation rate

    // Per-direction walk-cycle ordering. With the v2 character sheet, every
    // row has 4 visually distinct walk poses (the previous fix for the down-
    // row "glide" via mirrored frames is no longer needed). Linear [0,1,2,3]
    // now works cleanly for all four directions.
    const WALK_ORDER = {
      up:    [0, 1, 2, 3],
      down:  [0, 1, 2, 3],
      left:  [0, 1, 2, 3],
      right: [0, 1, 2, 3],
    };

    // ============ Map data ============
    // Procedurally generated town layout. Largest-first rejection sampling so
    // houses don't overlap each other (or NPC/player spawn safe zones), with
    // a 1-tile spacing padding between footprints. Trees fill remaining gaps
    // for natural greenery. Seeded RNG so layout is reproducible across page
    // loads — bump TOWN_SEED to roll a new arrangement.
    //
    // Counts per spec: 1 huge (8×6), 3 big (5×5), 6 medium (4×4), 9 small (3×3).
    const TOWN_SEED = 0x5a6e;
    function seededRng(seed) {
      // Tiny LCG — good enough for layout determinism; not crypto.
      let s = seed >>> 0;
      return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 0x100000000; };
    }
    function generateTownLayout() {
      const rng = seededRng(TOWN_SEED);
      const objects = [];
      const placed  = [];   // {x, y, w, h} in TILE coords, with 1-tile pad already baked in

      // Reserve safe zones around player center + each NPC spawn so houses
      // don't land on top of where the player or NPCs first appear.
      const playerTileX = Math.floor((MAP_WIDTH  * TILE_SIZE / 2) / TILE_SIZE);
      const playerTileY = Math.floor((MAP_HEIGHT * TILE_SIZE / 2) / TILE_SIZE);
      const reserveZones = [
        { x: playerTileX - 3, y: playerTileY - 3, w: 6, h: 6 },   // player spawn
        { x:  5 - 2, y:  6 - 2, w: 5, h: 5 },                      // Eur spawn (~160,200 → tile 5,6)
        { x: 12 - 2, y: 10 - 2, w: 5, h: 5 },                      // Vol spawn (~400,320 → tile 12,10)
        { x: 21 - 2, y: 22 - 2, w: 5, h: 5 },                      // Aur spawn (~700,720 → tile 21,22)
        { x:  7 - 2, y: 27 - 2, w: 5, h: 5 },                      // Elzoran spawn (~240,880 → tile 7,27)
        { x: UFO_TILE_X - 1, y: UFO_TILE_Y - 1, w: 7 + 2, h: 2 + 2 },  // UFO (7×2 tiles at 224×60) + 1-tile pad
      ];
      for (const z of reserveZones) placed.push(z);
      // UFO is a hardcoded landmark — emit it as a world object so it renders
      // and collides like trees/houses. Player taps A while adjacent to open
      // the Aethryx Expanse modal (interplanetary travel hub).
      objects.push({ x: UFO_TILE_X, y: UFO_TILE_Y, type: 'ufo' });

      // Largest-first ordering so the huge/big houses can find their spots
      // while there's still open space; the small ones slot into leftover gaps.
      const houseQueue = [
        { type: 'house-huge', tileW: HOUSE_TYPES['house-huge'].tileW, tileH: HOUSE_TYPES['house-huge'].tileH, count: 1 },
        { type: 'house-big',  tileW: HOUSE_TYPES['house-big' ].tileW, tileH: HOUSE_TYPES['house-big' ].tileH, count: 3 },
        { type: 'house-med',  tileW: HOUSE_TYPES['house-med' ].tileW, tileH: HOUSE_TYPES['house-med' ].tileH, count: 6 },
        { type: 'house-sml',  tileW: HOUSE_TYPES['house-sml' ].tileW, tileH: HOUSE_TYPES['house-sml' ].tileH, count: 9 },
      ];
      function tryPlace(tileW, tileH, padding) {
        for (let attempt = 0; attempt < 400; attempt++) {
          const x = 1 + Math.floor(rng() * (MAP_WIDTH  - tileW - 2));
          const y = 1 + Math.floor(rng() * (MAP_HEIGHT - tileH - 2));
          let overlap = false;
          for (const other of placed) {
            if (x < other.x + other.w + padding &&
                x + tileW + padding > other.x &&
                y < other.y + other.h + padding &&
                y + tileH + padding > other.y) {
              overlap = true; break;
            }
          }
          if (!overlap) return { x, y };
        }
        return null;
      }
      for (const h of houseQueue) {
        for (let i = 0; i < h.count; i++) {
          const spot = tryPlace(h.tileW, h.tileH, 1);
          if (!spot) { console.warn('Town gen: could not place', h.type, i); continue; }
          objects.push({ x: spot.x, y: spot.y, type: h.type });
          placed.push({ x: spot.x, y: spot.y, w: h.tileW, h: h.tileH });
        }
      }
      // Trees fill the remaining gaps. 28 trees on a 40×40 world gives a
      // pleasant scatter without choking the town. Reserve is 3×3 tiles to
      // match the bumped TREE_W/TREE_H visual footprint.
      for (let i = 0; i < 28; i++) {
        const spot = tryPlace(3, 3, 0);
        if (!spot) continue;
        objects.push({ x: spot.x, y: spot.y, type: 'tree' });
        placed.push({ x: spot.x, y: spot.y, w: 3, h: 3 });
      }
      return objects;
    }

    // ============ Region system ============
    // Multi-region world. Each region has its own tiles + objects. Tile types:
    //   0 = grass (default — Central / Viridia)
    //   1 = ice   (North region)
    // Walking past the top of Central transitions to North, and vice versa
    // (entering from the south of North returns to Central). MAP_DATA and
    // COLLIDERS are mutable refs that get hot-swapped by transitionRegion().
    function makeRegionTiles(tileType) {
      const rows = [];
      for (let y = 0; y < MAP_HEIGHT; y++) {
        const row = [];
        for (let x = 0; x < MAP_WIDTH; x++) row.push(tileType);
        rows.push(row);
      }
      return rows;
    }
    const REGIONS = {
      central: {
        id: 'central',
        name: 'Viridia · Central',
        width:  MAP_WIDTH,
        height: MAP_HEIGHT,
        tiles:   makeRegionTiles(0),     // grass
        objects: generateTownLayout(),
      },
      north: {
        id: 'north',
        name: 'Viridia · North',
        width:  MAP_WIDTH,
        height: MAP_HEIGHT,
        tiles:   makeRegionTiles(1),     // ice — placeholder, no assets yet
        objects: [],
      },
      hq: {
        id: 'hq',
        name: 'Faction HQ · Courtyard',
        width:  MAP_WIDTH,
        height: MAP_HEIGHT,
        tiles:   makeRegionTiles(2),     // HQ floor (dispatch in drawTiles)
        objects: [],
      },
      south: {
        id: 'south',
        name: 'Viridia · Southern Lava Fields',
        width:  MAP_WIDTH,
        height: MAP_HEIGHT,
        tiles:   makeRegionTiles(3),     // lava (dispatch in drawTiles)
        objects: [],
      },
    };
    let currentRegion = 'central';
    let MAP_DATA = REGIONS[currentRegion];

    // ============ Collision colliders ============
    // Solid bounding boxes the player's foot-box cannot overlap. Derived from
    // MAP_DATA.objects at boot. Each tree's collider is just its TRUNK (bottom-
    // center 1×1 tile of the 2×2 visual footprint) so the player can walk past
    // a tree's foliage canopy at the top without bumping into invisible air.
    // Sized in LOGICAL pixels, matching the player's movement coordinate space.
    function buildColliders(mapData) {
      const out = [];
      // HQ region — colliders come from the static HQ_COLLIDERS table, not
      // from per-object derivation (the region has no placed objects; the
      // courtyard art is rendered as a single background sprite).
      if (mapData.id === 'hq') {
        for (const c of HQ_COLLIDERS) {
          out.push({ x: c.x, y: c.y, w: c.w, h: c.h });
        }
        return out;
      }
      for (const obj of mapData.objects) {
        if (obj.type === 'tree') {
          // Trunk = the bottom-center 1×1 tile of the visual footprint. Formula
          // is now derived from TREE_W/TREE_H so it scales cleanly if tree
          // dimensions change again (was hardcoded to a 2×2 layout before).
          out.push({
            x: obj.x * TILE_SIZE + (TREE_W - TILE_SIZE) / 2,
            y: obj.y * TILE_SIZE + (TREE_H - TILE_SIZE),
            w: TILE_SIZE,
            h: TILE_SIZE - 4,
          });
        } else if (HOUSE_TYPES[obj.type]) {
          // Houses: collider = the bottom 2/3 of the visual footprint. The
          // top third (roof) is walk-behindable so the player can stand at
          // the back wall without bumping invisible air past the visible roof.
          const dims = HOUSE_TYPES[obj.type];
          const colliderH = Math.round(dims.h * 0.66);
          out.push({
            x: obj.x * TILE_SIZE,
            y: obj.y * TILE_SIZE + (dims.h - colliderH),
            w: dims.w,
            h: colliderH,
          });
        } else if (obj.type === 'ufo') {
          // UFO: collider = bottom half (landing struts area). Top half is
          // hull/dome, walk-behindable like a tree canopy.
          out.push({
            x: obj.x * TILE_SIZE,
            y: obj.y * TILE_SIZE + UFO_H / 2,
            w: UFO_W,
            h: UFO_H / 2,
          });
        } else if (obj.type === 'tomb') {
          // Tombstone / gargoyle — small base collider (bottom strip of
          // the sprite) so player can walk close but not through. Top of
          // sprite stays walk-behindable via Y-sort.
          out.push({
            x: obj.x * TILE_SIZE + 8,
            y: obj.y * TILE_SIZE + TOMB_H - 18,
            w: TOMB_W - 16,
            h: 14,
          });
        }
      }
      return out;
    }
    let COLLIDERS = buildColliders(MAP_DATA);   // rebuilt by transitionRegion()

    // Axis-aligned bbox intersection test — used by both collision and (later) Y-sort.
    function rectIntersect(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    // Player's collision footprint is a small rectangle at the bottom of the
    // sprite — only feet collide, not the head/torso. This lets the player
    // walk "behind" things above them without getting stuck on the canopy.
    const FOOT_W = 18;
    const FOOT_H = 10;
    function playerFootbox(x, y) {
      return {
        x: x + (CHAR_W - FOOT_W) / 2,
        y: y + CHAR_H - FOOT_H,
        w: FOOT_W,
        h: FOOT_H,
      };
    }

    // Returns true if the player's foot-box would be invalid at (x, y) — either
    // off the map, overlapping a solid object collider, or overlapping an NPC.
    function blocked(x, y) {
      const box = playerFootbox(x, y);
      // Map bounds (foot-box, not full sprite — head can poke above the map line).
      if (box.x < 0) return true;
      if (box.y < 0) return true;
      if (box.x + box.w > MAP_WIDTH  * TILE_SIZE) return true;
      if (box.y + box.h > MAP_HEIGHT * TILE_SIZE) return true;
      // Static object colliders (trees etc.).
      for (const c of COLLIDERS) {
        if (rectIntersect(box, c)) return true;
      }
      // Dynamic NPC bodies — recomputed every check because they're moving.
      for (const npc of NPCS) {
        if (npc.active === false) continue;   // docked NPCs don't collide
        if ((npc.region || 'central') !== currentRegion) continue;   // wrong region
        if (rectIntersect(box, npcBodyBox(npc))) return true;
      }
      return false;
    }

    // ============ Asset registry ============
    // Source images live at /assets/. Each entry knows its target size — the loader
    // produces a cached offscreen canvas at that size, so render-time draws are 1:1
    // (no GPU scaling per frame even from large source PNGs).
    const ASSET_SPECS = {
      // Grass tile — bake from the INTERIOR of the source PNG, skipping the lighter outer
      // pixels that would otherwise sample into the tile's edges and create visible
      // "gutter" lines when tiled. The crop pulls the central 1054×1054 region of the
      // 1254×1254 source. Result: each 32×32 tile is built from consistent inner-green
      // content, so adjacent tiles meet seamlessly.
      grass: {
        src: '/assets/tile_grass.png',
        w: TILE_SIZE, h: TILE_SIZE,
        crop: { x: 100, y: 100, w: 1054, h: 1054 },
      },
      // North-region snow tile. Same 1254×1254 source convention as grass —
      // the outer ~100px on every side is anti-aliased near-white that bleeds
      // into adjacent tiles when tiled, so we inner-crop to the central
      // 1054×1054 of saturated content. Replaces the procedural ice tile that
      // shipped before the real asset was ready.
      snow: {
        src: '/assets/tile_snow.png',
        w: TILE_SIZE, h: TILE_SIZE,
        crop: { x: 100, y: 100, w: 1054, h: 1054 },
      },
      // South-region lava tile. Dark cracked basalt with bright orange magma
      // veins. Same 1254×1254 convention so the inner-crop convention holds.
      lava: {
        src: '/assets/tile_lava.png',

      // Houses — entry_*house.png. The sml/med variants ship with transparent

      houseSml:  { src: '/assets/entry_smlhouse.png',  w: HOUSE_TYPES['house-sml' ].w, h: HOUSE_TYPES['house-sml' ].h },

      ufo: {

      runSheet: { src: '/assets/animation_run_player.png', raw: true },

      // Eurakeon walk sheet — sliced into 16 frame canvases at boot, same
      // pipeline as the player + Voltyran sheets but with EURAKEON_SHEET coords.

      eurakeonSheet: { src: '/assets/animation_walk_eurakeon.png', raw: true },
      // Aurexion walk sheet — 4×4 directional walk (Aur's sheet ships with 5

      aurexionSheet: { src: '/assets/animation_walk_aurexion.png', raw: true },
      // Elzoran fly sheet — 4×4 directional. He's a flying NPC (no walk
      // asset), so this same sheet drives every facing — he hovers always.
      elzoranSheet: { src: '/assets/animation_fly_elzoran.png', raw: true },
      // Enemy idle stances. Single-pose static art — the bake crops to the
      // tight content bbox so empty source pixels aren't wasted, then
      // scales to display size preserving aspect.
      moriIdle:    { src: '/assets/character_mori.png',    w: MORI_W,    h: MORI_H,    crop: { x: 375, y: 208, w: 368, h: 621 } },
      daemonIdle:  { src: '/assets/character_daemon.png',  w: DAEMON_W,  h: DAEMON_H,  crop: { x: 295, y: 253, w: 491, h: 573 } },
      khronisIdle: { src: '/assets/character_khronis.png', w: KHRONIS_W, h: KHRONIS_H, crop: { x:  64, y: 117, w: 957, h: 907 } },
      // Combat sheet — 5 rows × 4 frames (PUNCH / KICK / BLAST / SWORD /
      // BLASTER). Sliced via sliceCombatSheet() at boot. Loaded raw because
      // we need the original 1536×1024 source for the per-frame chroma key
      // pass before downsampling each frame to CHAR_W_COMBAT × CHAR_H_COMBAT.
      combatSheet: { src: '/assets/animation_combat_player.png', raw: true },
      // Enemy walk sheets — 4 directions × 4 frames, white BG. Sliced at
      // boot via sliceMoriSheet / sliceDaemonSheet / sliceKhronisSheet
      // (mirror the Voltyran slicer pattern).
      moriSheet:    { src: '/assets/animation_walk_mori.png',    raw: true },
      daemonSheet:  { src: '/assets/animation_walk_daemon.png',  raw: true },
      khronisSheet: { src: '/assets/animation_walk_khronis.png', raw: true },
    };

    // After load, ASSETS[key] is a ready-to-blit HTMLCanvasElement at the target size.
    // ASSETS.charFrames is set after sheet slicing — { up:[c0,c1,c2,c3], left:[…], right:[…], down:[…] }
    const ASSETS = {};

    // ============ Asset loader ============
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Failed to load: ' + src));
        img.src = src;
      });
    }

    // Draw a source image into an offscreen canvas at target size and return that canvas.
    // Crisp pixel-art scaling: imageSmoothingEnabled = false.
    // If `crop` is provided, only that source region is sampled (skips e.g. lighter edge pixels).
    function bakeToTileCanvas(img, w, h, crop) {
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      if (crop) {
        ctx.drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, w, h);
      } else {
        ctx.drawImage(img, 0, 0, w, h);
      }
      return c;
    }

    async function loadAllAssets(onProgress) {
      const keys = Object.keys(ASSET_SPECS);
      let loaded = 0;
      for (const key of keys) {
        const spec = ASSET_SPECS[key];
        if (onProgress) onProgress(loaded / keys.length, `Loading ${key}…`);
        const img = await loadImage(spec.src);
        if (spec.raw) {
          // Don't bake — keep raw image for later slicing.
          ASSETS[key] = img;
        } else {
          const baked = bakeToTileCanvas(img, spec.w, spec.h, spec.crop);
          // Optional white-background chroma key (for source PNGs that ship
          // without alpha, e.g. entry_bighouse.png / entry_hugehouse.png).
          if (spec.chroma) chromaKeyWhite(baked);
          ASSETS[key] = baked;
        }
        loaded++;
      }
      // After all images load, slice both sprite sheets into frame canvases.
      if (onProgress) onProgress(0.92, 'Cutting frames…');
      ASSETS.charFrames     = sliceCharSheet(ASSETS.sheet);
      ASSETS.flyFrames      = sliceFlySheet(ASSETS.flySheet);
      ASSETS.runFrames      = sliceRunSheet(ASSETS.runSheet);
      ASSETS.idleFrames     = sliceIdleSheet(ASSETS.idleSheet);
      ASSETS.voltyranFrames = sliceVoltyranSheet(ASSETS.voltyranSheet);
      ASSETS.eurakeonFrames = sliceEurakeonSheet(ASSETS.eurakeonSheet);
      ASSETS.aurexionFrames = sliceAurexionSheet(ASSETS.aurexionSheet);
      ASSETS.elzoranFrames     = sliceElzoranSheet(ASSETS.elzoranSheet);
      // Enemy idle frame sets — wrap each static sprite into the
      // {up,down,left,right} array shape the NPC renderer expects. Same
      // sprite for every facing → enemy stands at attention regardless of
      // direction. Replace with proper directional sheets in Phase D.
      // All three enemies now have real walk sheets — slice each. The
      // moriIdle / daemonIdle / khronisIdle static character files are
      // retained in ASSETS as portrait/reference art but no longer drive
      // the NPC renderer.
      ASSETS.moriFrames    = sliceMoriSheet(ASSETS.moriSheet);
      ASSETS.daemonFrames  = sliceDaemonSheet(ASSETS.daemonSheet);
      ASSETS.khronisFrames = sliceKhronisSheet(ASSETS.khronisSheet);

      // Post-process the lava tile to a darker ash/cave look (variant C).
      // See LAVA_BRIGHTNESS / LAVA_SATURATION above to tune.
      if (ASSETS.lava) postProcessLavaTile(ASSETS.lava);
      // Combat — { punch:[c0..c3], kick:[…], blast:[…], sword:[…], blaster:[…] }
      ASSETS.combatFrames      = sliceCombatSheet(ASSETS.combatSheet);
      // NOTE: idle-without-smoke variant is a WIP — masking purple removed the
      // plasma orbs the user wants to keep. The right filter is "moving dark
      // smoke wisps" only; needs a different approach (probably frame-diff
      // against an averaged base, or a clean idle asset). Helpers below
      // (makeElzoranIdleFrames / alphaOutMagenta) left in place for the next
      // pass to iterate on.
      // ASSETS.elzoranIdleFrames = makeElzoranIdleFrames(ASSETS.elzoranFrames);
      if (onProgress) onProgress(1, 'Stepping into the world…');
    }

    // ============ Sprite-sheet slicer ============
    // Extract 16 character frames (4 directions × 4 walk-cycle steps) from the master sheet.
    // Each frame is cropped from the sheet at 200×280, then baked into a CHAR_W×CHAR_H canvas
    // and white-chroma-keyed so the (originally white) background becomes transparent.
    function sliceCharSheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = SHEET.rowBases[dir];
        const cropY = baseY - SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = SHEET.cols[i];
          const cropX = centerX - SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width = CHAR_W;
          c.height = CHAR_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            sheetImg,
            cropX, cropY, SHEET.frameW, SHEET.frameH,
            0, 0, CHAR_W, CHAR_H
          );
          chromaKeyWhite(c);
          result[dir].push(c);
        }
      }
      // (v2 sheet has 4 distinct down-row poses — no synthesized mirror needed.
      // mirrorCanvas() is still defined below for future use if any direction
      // needs a single-frame source augmented into an alternating cycle.)
      return result;
    }

    // Same slicer pattern, but reading from the Voltyran sheet's coordinates
    // and baking each frame at NPC display size (42×40). Voltyran's source is
    // also white-background, so the same chroma-key pass produces transparent
    // alpha around his silhouette.
    function sliceVoltyranSheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };
      for (const dir of directions) {
        const baseY = VOLTYRAN_SHEET.rowBases[dir];
        const cropY = baseY - VOLTYRAN_SHEET.frameH;
        for (let i = 0; i < ANIM_FRAMES; i++) {
          const centerX = VOLTYRAN_SHEET.cols[i];
          const cropX = centerX - VOLTYRAN_SHEET.frameW / 2;
          const c = document.createElement('canvas');
          c.width = NPC_W;
          c.height = NPC_H;
          const cctx = c.getContext('2d');
          cctx.imageSmoothingEnabled = false;
          cctx.drawImage(
            sheetImg,
            cropX, cropY, VOLTYRAN_SHEET.frameW, VOLTYRAN_SHEET.frameH,
            0, 0, NPC_W, NPC_H
          );
          chromaKeyWhite(c);
          result[dir].push(c);
        }
      }
      return result;
    }

    // Mori walk sheet slicer — mirrors the Voltyran slicer (white-BG strict
    // chroma + NEAREST bake to display size). Frame layout: 4 directional
    // rows × 4 frames each. The row-label glyphs sit in col 0 of each row;
    // we skip them by starting the frame iteration at MORI_SHEET.cols[0].
    function sliceMoriSheet(sheetImg) {
      const directions = ['up', 'left', 'right', 'down'];
      const result = { up: [], left: [], right: [], down: [] };

        const cropY = baseY - MORI_SHEET.frameH;

          c.width  = MORI_W;

            sheetImg,

    // Daemon walk sheet slicer — same pattern as Mori (white-BG strict

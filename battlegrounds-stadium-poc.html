<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Stadium POC — The AOV Saga Battlegrounds 2.5D mobile UI prototype." />
  <title>Battlegrounds Stadium POC · The AOV Saga</title>

  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <meta name="theme-color" content="#050310">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ============ Foundations ============ */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #050310;
      --void-2: #0a0618;
      --gold: #e8c878;
      --gold-bright: #f5dc9c;
      --gold-deep: #b8923f;
      --gold-pale: #f4e3b3;
      --emerald: #2fe6a8;
      --crimson: #e85a5a;
      --cosmic-blue: #5fa8ff;
      --virtue: #5fa8ff;
      --vice: #e85a5a;
      --neutral: #b8aec8;
      --unknown: #b87cff;
      --mage-purple: #a875e8;
      --ivory: #f3ecdc;
      --mist: #b8aec8;
      --mist-deep: #6f6582;
      --border-soft: rgba(232, 200, 120, 0.08);
      --border: rgba(232, 200, 120, 0.18);
      --border-gold: rgba(232, 200, 120, 0.28);
      --glass: rgba(20, 12, 38, 0.55);
      --glass-strong: rgba(28, 16, 54, 0.72);

      --font-display: 'Cinzel', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-meta: 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--font-body);
      background: var(--void);
      color: var(--ivory);
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============ Cosmic backdrop layers ============ */
    .cosmos {
      position: fixed; inset: 0; z-index: -3; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(232, 200, 120, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 30% 50%, rgba(95, 168, 255, 0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 50%, rgba(232, 90, 90, 0.08) 0%, transparent 55%),
        linear-gradient(180deg, #050310 0%, #0a0618 50%, #050310 100%);
    }
    .stars {
      position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden;
    }
    .stars::before {
      content: ''; position: absolute; inset: -50%;
      background-image:
        radial-gradient(1px 1px at 23% 17%, rgba(243, 236, 220, 0.7), transparent),
        radial-gradient(1px 1px at 67% 41%, rgba(232, 200, 120, 0.6), transparent),
        radial-gradient(1px 1px at 84% 73%, rgba(243, 236, 220, 0.7), transparent),
        radial-gradient(1px 1px at 12% 83%, rgba(243, 236, 220, 0.5), transparent),
        radial-gradient(1px 1px at 45% 28%, rgba(184, 124, 255, 0.4), transparent),
        radial-gradient(1px 1px at 91% 12%, rgba(243, 236, 220, 0.5), transparent),
        radial-gradient(2px 2px at 76% 88%, rgba(243, 236, 220, 0.7), transparent);
      background-size: 700px 700px;
      animation: drift 320s linear infinite;
      opacity: 0.7;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-300px, -300px, 0); }
    }

    /* Painted Origon backdrop */
    .battlefield-scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-image: url('/scenes/scene_origon_portrait.png');
      opacity: 0.55;
      filter: saturate(0.85) brightness(0.7) blur(1px);
    }
    @media (min-width: 721px) {
      .battlefield-scene { background-image: url('/scenes/scene_origon_landscape.png'); }
    }
    .battlefield-scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center 60%, transparent 30%, rgba(5, 3, 16, 0.55) 100%),
        linear-gradient(180deg, rgba(5, 3, 16, 0.55) 0%, transparent 22%, transparent 78%, rgba(5, 3, 16, 0.5) 100%);
    }

    /* Stadium frame removed — let the platform speak for itself against the cosmic backdrop.
       Future iteration: commission a painted stadium scene asset for proper architecture. */
    .stadium-frame { display: none; }

    /* Spotlight glow above arena */
    .stadium-lights {
      position: fixed;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 18%;
      background:
        radial-gradient(ellipse 60% 100% at 50% 0%, rgba(243, 236, 220, 0.14) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(95, 168, 255, 0.07) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============ Arena ============ */
    .arena {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ============ Top HUD (opponent gem pool + log toggle) ============ */
    .hud-top {
      padding: 14px 14px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
    }
    .pool {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(5, 3, 16, 0.55);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .pool-label {
      font-family: var(--font-meta);
      font-size: 0.5rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--mist);
      opacity: 0.8;
    }
    .pool-gems {
      display: flex;
      gap: 3px;
    }
    .pool-gem {
      width: 7px;
      height: 7px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--gold-bright), var(--gold-deep));
      box-shadow: 0 0 4px rgba(232, 200, 120, 0.5);
    }
    .pool-gem.spent { opacity: 0.18; box-shadow: none; }

    .brand-tag {
      font-family: var(--font-display);
      font-size: 0.55rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }

    /* ============ Opponent team zone (top, foreshortened) ============ */
    .zone {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 4%;
      padding: 0 6%;
      pointer-events: none;
    }
    .zone-opponent {
      flex: 0 0 auto;
      height: 28vh;
      transform-origin: center bottom;
    }
    .zone-player {
      flex: 0 0 auto;
      height: 38vh;
      transform-origin: center top;
    }

    /* ============ Card sprite slot (the "Pokemon" on the floor) ============ */
    .slot {
      position: relative;
      height: 100%;
      aspect-ratio: 5 / 7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: auto;
      transition: transform 0.45s cubic-bezier(0.3, 0.1, 0.3, 1), filter 0.3s ease;
    }
    .slot-img {
      width: 100%;
      height: 88%;
      object-fit: contain;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.7));
      animation: float-idle 5s ease-in-out infinite;
      will-change: transform;
      /* Suppress iOS Safari's built-in long-press image preview so ours takes precedence */
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none;
    }
    @keyframes float-idle {
      0%, 100% { transform: translateY(0) rotate(-0.6deg); }
      50%      { transform: translateY(-5px) rotate(0.6deg); }
    }

    /* Active vs reserve states */
    .slot.is-active {
      z-index: 2;
    }
    .slot.is-reserve {
      transform: scale(0.74) translateY(8%);
      opacity: 0.72;
      filter: saturate(0.75);
    }
    .slot.is-reserve:hover,
    .slot.is-reserve:active {
      opacity: 0.95;
      filter: saturate(0.95);
      transform: scale(0.78) translateY(5%);
    }

    /* Selected target — gold pulse ring on opponent's targeted card */
    .slot.is-target {
      filter: drop-shadow(0 0 14px rgba(232, 200, 120, 0.65));
    }
    .slot.is-target .slot-name { color: var(--gold-bright); }
    .slot.is-target .slot-img {
      animation-name: target-pulse;
      animation-duration: 2.2s;
    }
    @keyframes target-pulse {
      0%, 100% { transform: translateY(0) rotate(-0.6deg) scale(1); filter: drop-shadow(0 0 6px rgba(232, 200, 120, 0.5)); }
      50%      { transform: translateY(-6px) rotate(0.6deg) scale(1.03); filter: drop-shadow(0 0 14px rgba(232, 200, 120, 0.9)); }
    }
    .slot.is-reserve .slot-img {
      animation-name: float-idle-alt;
      animation-duration: 6s;
    }
    @keyframes float-idle-alt {
      0%, 100% { transform: translateY(0) rotate(0.6deg); }
      50%      { transform: translateY(-3px) rotate(-0.6deg); }
    }
    .slot.is-fallen .slot-img {
      filter: grayscale(0.9) brightness(0.4);
      animation: none;
    }

    /* The "shadow disc" on the floor under each sprite — sells the standing-on-platform feel */
    .slot::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 12%;
      right: 12%;
      height: 14px;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.55) 0%, transparent 70%);
      filter: blur(2px);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .slot.is-reserve::after { opacity: 0.4; }

    /* Opponent perspective scaling — far end of platform */
    .zone-opponent .slot.is-active {
      transform: scale(0.92);
    }
    .zone-opponent .slot.is-reserve {
      transform: scale(0.66) translateY(8%);
    }

    /* Player perspective scaling — near end (full size) */
    .zone-player .slot.is-active {
      transform: scale(1);
    }
    .zone-player .slot.is-reserve {
      transform: scale(0.78) translateY(8%);
    }

    /* ============ HP + Name label above each sprite ============ */
    .slot-label {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 110%;
      pointer-events: none;
      text-align: center;
    }
    .slot-name {
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ivory);
      text-shadow: 0 0 8px rgba(5, 3, 16, 0.9), 0 0 3px rgba(5, 3, 16, 1);
      line-height: 1;
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .hp-bar {
      position: relative;
      height: 6px;
      background: rgba(5, 3, 16, 0.7);
      border: 1px solid rgba(232, 200, 120, 0.25);
      border-radius: 1px;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }
    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--virtue), var(--cosmic-blue));
      width: 100%;
      transition: width 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.45s ease;
      box-shadow: 0 0 6px rgba(95, 168, 255, 0.5);
    }
    .hp-fill.green  { background: linear-gradient(90deg, #0f8a66, var(--emerald)); box-shadow: 0 0 6px rgba(47,230,168,0.45); }
    .hp-fill.yellow { background: linear-gradient(90deg, var(--gold-deep), var(--gold)); box-shadow: 0 0 6px rgba(232,200,120,0.45); }
    .hp-fill.red    { background: linear-gradient(90deg, var(--vice), #ff8b3d); box-shadow: 0 0 8px rgba(232,90,90,0.55); }

    /* Reserve sprites get smaller HP bars to match scale */
    .slot.is-reserve .slot-name { font-size: 0.6rem; opacity: 0.85; }

    /* ============ Platform (the angled stage they stand on) ============ */
    .platform-wrap {
      position: relative;
      flex: 0 0 auto;
      height: 14vh;
      margin: 0 4%;
      pointer-events: none;
    }
    .platform {
      position: absolute;
      inset: 0;
      /* Trapezoidal floor — narrow at top (far) wider at bottom (near) */
      clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
      background:
        radial-gradient(ellipse at 50% 90%, rgba(232, 200, 120, 0.35) 0%, rgba(232, 200, 120, 0.05) 35%, transparent 65%),
        linear-gradient(180deg,
          rgba(95, 168, 255, 0.18) 0%,
          rgba(28, 16, 54, 0.65) 100%
        );
      box-shadow:
        0 -2px 0 rgba(232, 200, 120, 0.25) inset,
        0 2px 0 rgba(232, 200, 120, 0.35) inset;
    }
    .platform::before {
      /* Grid pattern hint of depth */
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(232, 200, 120, 0.10) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(232, 200, 120, 0.08) 1px, transparent 1px);
      background-size: 18% 33%;
      opacity: 0.6;
    }

    /* AOV insignia in platform center */
    .platform-insignia {
      position: absolute;
      top: 50%; left: 50%;
      width: clamp(56px, 14vw, 100px);
      aspect-ratio: 1;
      transform: translate(-50%, -55%);
      opacity: 0.85;
      pointer-events: none;
    }

    /* Glow ring around the active fighter on the platform */
    .platform-glow {
      position: absolute;
      bottom: -10px;
      width: 60%;
      height: 20px;
      left: 20%;
      background: radial-gradient(ellipse at center, rgba(232, 200, 120, 0.5) 0%, transparent 60%);
      filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .platform-glow.active { opacity: 1; }

    /* ============ Bottom HUD (player gem pool + actions) ============ */
    .hud-bottom {
      padding: 8px 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
      background: linear-gradient(180deg, transparent 0%, rgba(5, 3, 16, 0.55) 70%);
    }
    .hud-row-pool {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .action-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .action-btn {
      padding: 12px 6px 14px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      color: inherit;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .action-btn:not(:disabled):active,
    .action-btn:not(:disabled):hover {
      border-color: var(--gold);
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(232, 200, 120, 0.25);
    }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .action-name {
      font-family: var(--font-display);
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      color: var(--gold-bright);
      line-height: 1.15;
      min-height: 2.3em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .action-gems {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 6px;
    }
    .action-gem {
      width: 7px;
      height: 7px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--gold-bright), var(--gold-deep));
      box-shadow: 0 0 3px var(--gold);
      display: inline-block;
    }

    /* ============ Attack animation — sprite lunges along platform axis ============ */
    /* Tier scaling: A1 = subtle, A2 = medium, A3 = full lunge */
    .slot.attacking {
      animation-timing-function: cubic-bezier(0.3, 0.1, 0.3, 1);
      z-index: 10;
    }

    /* Player attacking — lunge UP (toward opponent at top) */
    .zone-player .slot.attacking.tier-1 { animation: player-lunge-1 480ms; }
    .zone-player .slot.attacking.tier-2 { animation: player-lunge-2 620ms; }
    .zone-player .slot.attacking.tier-3 { animation: player-lunge-3 780ms; }

    @keyframes player-lunge-1 {
      0%   { transform: scale(1) translateY(0); }
      40%  { transform: scale(1.08) translateY(-22vh); }
      100% { transform: scale(1) translateY(0); }
    }
    @keyframes player-lunge-2 {
      0%   { transform: scale(1) translateY(0); }
      40%  { transform: scale(1.15) translateY(-32vh); }
      100% { transform: scale(1) translateY(0); }
    }
    @keyframes player-lunge-3 {
      0%   { transform: scale(1) translateY(0); }
      40%  { transform: scale(1.22) translateY(-42vh); }
      100% { transform: scale(1) translateY(0); }
    }

    /* Opponent attacking — lunge DOWN (toward player at bottom, scale up since they're rushing toward camera) */
    .zone-opponent .slot.attacking.tier-1 { animation: opp-lunge-1 480ms; }
    .zone-opponent .slot.attacking.tier-2 { animation: opp-lunge-2 620ms; }
    .zone-opponent .slot.attacking.tier-3 { animation: opp-lunge-3 780ms; }

    @keyframes opp-lunge-1 {
      0%   { transform: scale(0.92) translateY(0); }
      40%  { transform: scale(1.02) translateY(22vh); }
      100% { transform: scale(0.92) translateY(0); }
    }
    @keyframes opp-lunge-2 {
      0%   { transform: scale(0.92) translateY(0); }
      40%  { transform: scale(1.10) translateY(32vh); }
      100% { transform: scale(0.92) translateY(0); }
    }
    @keyframes opp-lunge-3 {
      0%   { transform: scale(0.92) translateY(0); }
      40%  { transform: scale(1.18) translateY(42vh); }
      100% { transform: scale(0.92) translateY(0); }
    }

    /* Hit shake on defender */
    @keyframes hit-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .slot.hit .slot-img {
      animation: hit-shake 0.35s ease, float-idle 5s ease-in-out infinite 0.35s;
    }
    /* Vice-red impact flash */
    .slot.hit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(232, 90, 90, 0.65) 0%, transparent 65%);
      mix-blend-mode: screen;
      animation: hit-flash 0.4s ease;
      pointer-events: none;
    }
    @keyframes hit-flash {
      0%, 100% { opacity: 0; }
      40%      { opacity: 1; }
    }

    /* Floating damage number */
    .damage-flyup {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, 0);
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--vice);
      text-shadow: 0 0 18px var(--vice), 0 0 5px rgba(0,0,0,1);
      pointer-events: none;
      z-index: 20;
      animation: damage-rise 1.3s cubic-bezier(0.2, 0.6, 0.2, 1) forwards;
    }
    @keyframes damage-rise {
      0%   { opacity: 0; transform: translate(-50%, 14px) scale(0.7); }
      18%  { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -80px) scale(1); }
    }

    /* ============ Screen shake on A3 ============ */
    @keyframes screen-shake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-4px, 2px); }
      40% { transform: translate(4px, -2px); }
      60% { transform: translate(-3px, -1px); }
      80% { transform: translate(3px, 1px); }
    }
    .arena.shake { animation: screen-shake 0.32s ease; }

    /* ============ Long-press card preview modal ============ */
    .card-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(5, 3, 16, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s ease, visibility 0.22s ease;
      pointer-events: none;
    }
    .card-modal.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .card-modal-image {
      max-width: 92vw;
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.7));
      transform: scale(0.92);
      transition: transform 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .card-modal.open .card-modal-image { transform: scale(1); }
    .card-modal-close {
      position: absolute;
      top: max(18px, env(safe-area-inset-top));
      right: max(18px, env(safe-area-inset-right));
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(5, 3, 16, 0.7);
      color: var(--gold);
      font-family: var(--font-display);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .card-modal-close:hover, .card-modal-close:active {
      border-color: var(--gold);
      color: var(--gold-bright);
      transform: scale(1.08);
    }
    .card-modal-hint {
      position: absolute;
      bottom: max(22px, env(safe-area-inset-bottom));
      left: 0; right: 0;
      text-align: center;
      font-family: var(--font-meta);
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--mist);
      opacity: 0.65;
    }

    /* Subtle long-press feedback while user is holding (before threshold fires) */
    .slot.long-pressing {
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: drop-shadow(0 0 10px rgba(232, 200, 120, 0.45)) brightness(1.08);
    }
    .slot.long-pressing.is-active { transform: scale(1.03); }
    .slot.long-pressing.is-reserve { transform: scale(0.78) translateY(5%); }

    /* ============ Reduced motion ============ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition-duration: 0.1s !important; }
    }

    /* ============ Mobile portrait tweaks ============ */
    @media (max-width: 540px) {
      .zone-opponent { height: 24vh; }
      .zone-player { height: 32vh; }
      .platform-wrap { height: 12vh; }
      .slot-name { font-size: 0.62rem; }
      .action-name { font-size: 0.66rem; }
    }

    /* Tablet+ */
    @media (min-width: 720px) {
      .zone-opponent { height: 30vh; }
      .zone-player { height: 40vh; }
      .platform-wrap { height: 16vh; }
    }
  </style>
</head>
<body>

  <div class="cosmos"></div>
  <div class="stars"></div>
  <div class="battlefield-scene"></div>
  <div class="stadium-lights"></div>
  <div class="stadium-frame"></div>

  <main class="arena" id="arena">

    <!-- TOP HUD: opponent gem pool + brand stripe -->
    <div class="hud-top">
      <div class="pool">
        <span class="pool-label">Opp</span>
        <div class="pool-gems" id="opp-pool"></div>
      </div>
      <div class="brand-tag" id="status-line">Tap reserve to swap · Tap opp to target</div>
    </div>

    <!-- OPPONENT TEAM ZONE (JS-rendered — tap any card to target it) -->
    <div class="zone zone-opponent" id="zone-opponent"></div>

    <!-- ARENA PLATFORM -->
    <div class="platform-wrap">
      <div class="platform">
        <svg class="platform-insignia" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- AOV Ultramax-style compass with crimson X -->
          <defs>
            <radialGradient id="rim" cx="50%" cy="50%" r="50%">
              <stop offset="60%" stop-color="#e8c878" stop-opacity="0"/>
              <stop offset="85%" stop-color="#e8c878" stop-opacity="0.85"/>
              <stop offset="100%" stop-color="#b8923f" stop-opacity="0.6"/>
            </radialGradient>
            <linearGradient id="xgrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#ff8b8b"/>
              <stop offset="50%" stop-color="#e85a5a"/>
              <stop offset="100%" stop-color="#7e2424"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="url(#rim)"/>
          <circle cx="50" cy="50" r="44" fill="none" stroke="#e8c878" stroke-width="1.5" opacity="0.7"/>
          <!-- 4 compass points -->
          <g stroke="#e8c878" stroke-width="1" opacity="0.6">
            <line x1="50" y1="6"  x2="50" y2="18"/>
            <line x1="50" y1="82" x2="50" y2="94"/>
            <line x1="6"  y1="50" x2="18" y2="50"/>
            <line x1="82" y1="50" x2="94" y2="50"/>
          </g>
          <!-- Crimson X -->
          <g stroke="url(#xgrad)" stroke-width="6" stroke-linecap="round">
            <line x1="28" y1="28" x2="72" y2="72"/>
            <line x1="72" y1="28" x2="28" y2="72"/>
          </g>
        </svg>
        <div class="platform-glow active"></div>
      </div>
    </div>

    <!-- PLAYER TEAM ZONE (JS-rendered — tap a reserve to swap active, free) -->
    <div class="zone zone-player" id="zone-player"></div>

    <!-- BOTTOM HUD: player gem pool + attack buttons -->
    <div class="hud-bottom">
      <div class="hud-row-pool">
        <div class="pool">
          <span class="pool-label">You</span>
          <div class="pool-gems" id="player-pool"></div>
        </div>
        <div class="brand-tag" style="font-size:0.5rem;opacity:0.55;">POC · 2.5D Stadium</div>
      </div>

      <div class="action-bar">
        <button class="action-btn" data-tier="1">
          <div class="action-name">Vector Drive</div>
          <div class="action-gems"><span class="action-gem"></span></div>
        </button>
        <button class="action-btn" data-tier="2">
          <div class="action-name">Astral Projection</div>
          <div class="action-gems"><span class="action-gem"></span><span class="action-gem"></span></div>
        </button>
        <button class="action-btn" data-tier="3">
          <div class="action-name">Divine Intuition</div>
          <div class="action-gems"><span class="action-gem"></span><span class="action-gem"></span><span class="action-gem"></span></div>
        </button>
      </div>
    </div>

  </main>

  <!-- ============ Card preview modal (long-press to open) ============ -->
  <div class="card-modal" id="card-modal" aria-hidden="true">
    <button class="card-modal-close" id="card-modal-close" aria-label="Close preview">✕</button>
    <img class="card-modal-image" id="card-modal-image" alt="">
    <div class="card-modal-hint">Tap anywhere to dismiss</div>
  </div>

  <script>
    'use strict';

    // ============ POC card stats (subset) ============
    // Real game pulls from training.html's CARDS database; POC inlines them.
    const CARDS = {
      Aurexion: { atk: 230, def: 170, hp: 180, spd: 200, img: 'card_aurexion.png' },
      Aionis:   { atk: 200, def: 240, hp: 360, spd: 400, img: 'card_aionis.png'   },
      Wynwyrm:  { atk:  70, def: 100, hp: 130, spd:  80, img: 'card_wynwyrm.png'  },
      Drakaryx: { atk: 270, def: 210, hp: 260, spd: 160, img: 'card_drakaryx.png' },
      Voltyran: { atk: 360, def: 260, hp: 300, spd: 420, img: 'card_voltyran.png' },
      Mutaryn:  { atk: 360, def: 260, hp: 340, spd: 300, img: 'card_mutaryn.png'  },
    };

    // ============ State ============
    // teamOrder[0]=left reserve · [1]=center active · [2]=right reserve.
    // Swap is "free" — taps the tapped reserve into position [1].
    // Target is the opponent card the player intends to attack next turn.
    const state = {
      player: {
        teamOrder: ['Aionis', 'Aurexion', 'Wynwyrm'],
        hp: { Aurexion: 180, Aionis: 360, Wynwyrm: 130 },
        gems: 9,
      },
      cpu: {
        teamOrder: ['Voltyran', 'Drakaryx', 'Mutaryn'],
        hp: { Drakaryx: 260, Voltyran: 300, Mutaryn: 340 },
        gems: 9,
      },
      target: 'Drakaryx',  // defaults to opponent's active
      busy: false,
    };

    const $ = (id) => document.getElementById(id);
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function activeOf(side) { return state[side].teamOrder[1]; }
    function isAlive(side, name) { return state[side].hp[name] > 0; }
    function aliveCount(side) { return state[side].teamOrder.filter(n => isAlive(side, n)).length; }

    // ============ Damage math ============
    const TIER_MULT = { 1: 0.33, 2: 0.66, 3: 0.99 };
    function defReduction(def) {
      if (def <= 100) return 1.0;
      if (def <= 200) return 0.75;
      if (def <= 300) return 0.50;
      return 0.25;
    }
    function calcDmg(atkName, defName, tier) {
      const a = CARDS[atkName], d = CARDS[defName];
      return Math.ceil(a.atk * TIER_MULT[tier] * defReduction(d.def));
    }

    // ============ Slot rendering ============
    function renderTeam(side) {
      const zone = $('zone-' + (side === 'player' ? 'player' : 'opponent'));
      zone.innerHTML = '';
      state[side].teamOrder.forEach((name, idx) => {
        const c = CARDS[name];
        const isActive = idx === 1;
        const fallen = !isAlive(side, name);
        const isTarget = side === 'cpu' && state.target === name && !fallen;

        const slot = document.createElement('div');
        slot.className = 'slot ' +
          (isActive ? 'is-active' : 'is-reserve') +
          (fallen ? ' is-fallen' : '') +
          (isTarget ? ' is-target' : '');
        slot.dataset.side = side;
        slot.dataset.card = name;
        if (isActive) slot.id = `slot-${side}-active`;

        const hpPct = Math.max(0, (state[side].hp[name] / c.hp) * 100);
        const hpClass = hpPct <= 25 ? 'red' : hpPct <= 50 ? 'yellow' : hpPct <= 75 ? 'green' : '';

        slot.innerHTML = `
          <div class="slot-label">
            <div class="slot-name">${name}</div>
            <div class="hp-bar"><div class="hp-fill ${hpClass}" style="width:${hpPct}%"></div></div>
          </div>
          <img class="slot-img" src="/cards/${c.img}" alt="${name}">
        `;

        // Wire interaction. Every alive card supports long-press → preview.
        // Quick tap fires the card's primary action:
        //  · Player reserve → swap to active (free)
        //  · Opponent card → set as target
        //  · Player active (no quick action) → still long-press-previewable
        if (!fallen) {
          slot.style.cursor = 'pointer';
          let onTap = null;
          if (side === 'player' && !isActive) {
            onTap = () => swapActive(name);
          } else if (side === 'cpu') {
            onTap = () => setTarget(name);
          }
          attachLongPress(slot, () => openCardModal(name), onTap);
        }

        zone.appendChild(slot);
      });
    }

    // Free swap — tapped reserve becomes active, old active slides into that slot.
    function swapActive(name) {
      if (state.busy) return;
      if (!isAlive('player', name)) return;
      const order = state.player.teamOrder;
      const idx = order.indexOf(name);
      if (idx === 1) return; // already active
      [order[1], order[idx]] = [order[idx], order[1]];
      renderTeam('player');
      flashStatus(`Swapped → ${name} now active`);
    }

    // Set target on opponent side
    function setTarget(name) {
      if (state.busy) return;
      if (!isAlive('cpu', name)) return;
      state.target = name;
      renderTeam('cpu');
      flashStatus(`Target: ${name}`);
    }

    function flashStatus(text) {
      const el = $('status-line');
      el.textContent = text;
      clearTimeout(flashStatus._t);
      flashStatus._t = setTimeout(() => {
        el.textContent = 'Tap reserve to swap · Tap opp to target';
      }, 1800);
    }

    // ============ Pool / damage UI ============
    function renderPool(elId, count, max) {
      const el = $(elId);
      el.innerHTML = '';
      for (let i = 0; i < max; i++) {
        const g = document.createElement('div');
        g.className = 'pool-gem' + (i >= count ? ' spent' : '');
        el.appendChild(g);
      }
    }

    function showDamage(side, cardName, amount) {
      const slot = document.querySelector(`.slot[data-side="${side}"][data-card="${cardName}"]`);
      if (!slot) return;
      const fly = document.createElement('div');
      fly.className = 'damage-flyup';
      fly.textContent = '−' + amount;
      slot.appendChild(fly);
      setTimeout(() => fly.remove(), 1400);
      slot.classList.add('hit');
      setTimeout(() => slot.classList.remove('hit'), 420);
    }

    // ============ Combat: SPD-aware, target-aware ============
    // Player attacks the current target. SPD compares attacker.spd vs target.spd.
    // Faster strikes first. If target lives, target counter-attacks the player's active.
    async function playerAttack(tier) {
      if (state.busy) return;
      const playerName = activeOf('player');
      const targetName = state.target;
      if (!isAlive('cpu', targetName)) return;
      if (!isAlive('player', playerName)) return;

      state.busy = true;
      document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);

      const playerSpd = CARDS[playerName].spd;
      const targetSpd = CARDS[targetName].spd;
      const playerFirst = playerSpd > targetSpd ||
        (playerSpd === targetSpd && Math.random() < 0.5);

      flashStatus(`SPD ${playerName} ${playerSpd} vs ${targetName} ${targetSpd} — ${playerFirst ? playerName : targetName} strikes first`);

      // Sequence the two attacks
      if (playerFirst) {
        await executeAttack('player', playerName, targetName, tier);
        if (isAlive('cpu', targetName) && isAlive('player', playerName)) {
          await sleep(380);
          const cpuTier = pickCpuTier();
          await executeAttack('cpu', targetName, playerName, cpuTier);
        }
      } else {
        const cpuTier = pickCpuTier();
        await executeAttack('cpu', targetName, playerName, cpuTier);
        if (isAlive('player', playerName) && isAlive('cpu', targetName)) {
          await sleep(380);
          await executeAttack('player', playerName, targetName, tier);
        }
      }

      // Auto-bump fallen cards out of active slot if needed
      autoPromoteIfFallen('player');
      autoPromoteIfFallen('cpu');
      renderTeam('player');
      renderTeam('cpu');

      state.busy = false;
      document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
    }

    // One attack action — animates attacker, applies damage to defender.
    async function executeAttack(attackerSide, attackerName, defenderName, tier) {
      const defenderSide = attackerSide === 'player' ? 'cpu' : 'player';

      const sprite = document.querySelector(`.slot[data-side="${attackerSide}"][data-card="${attackerName}"]`);
      if (!sprite) return;

      if (tier === 3) $('arena').classList.add('shake');
      sprite.classList.remove('attacking', 'tier-1', 'tier-2', 'tier-3');
      void sprite.offsetWidth;
      sprite.classList.add('attacking', 'tier-' + tier);

      await sleep(360);

      const dmg = calcDmg(attackerName, defenderName, tier);
      state[defenderSide].hp[defenderName] = Math.max(0, state[defenderSide].hp[defenderName] - dmg);
      showDamage(defenderSide, defenderName, dmg);

      // Update the defender's HP bar in-place
      const defSlot = document.querySelector(`.slot[data-side="${defenderSide}"][data-card="${defenderName}"]`);
      if (defSlot) {
        const fill = defSlot.querySelector('.hp-fill');
        const maxHp = CARDS[defenderName].hp;
        const pct = Math.max(0, (state[defenderSide].hp[defenderName] / maxHp) * 100);
        fill.style.width = pct + '%';
        fill.classList.remove('green', 'yellow', 'red');
        if (pct <= 25)      fill.classList.add('red');
        else if (pct <= 50) fill.classList.add('yellow');
        else if (pct <= 75) fill.classList.add('green');
        if (pct === 0) defSlot.classList.add('is-fallen');
      }

      // Spend the gem
      state[attackerSide].gems = Math.max(0, state[attackerSide].gems - tier);
      renderPool(attackerSide === 'player' ? 'player-pool' : 'opp-pool', state[attackerSide].gems, 9);

      await sleep(820);
      sprite.classList.remove('attacking', 'tier-1', 'tier-2', 'tier-3');
      $('arena').classList.remove('shake');
    }

    function pickCpuTier() {
      // Simple AI: if it can finish the player target in one shot, do that.
      const playerName = activeOf('player');
      for (let t = 1; t <= 3; t++) {
        if (calcDmg(state.target, playerName, t) >= state.player.hp[playerName]) return t;
      }
      return 3;
    }

    // If the active card fell, promote the next alive reserve into the center slot.
    function autoPromoteIfFallen(side) {
      const order = state[side].teamOrder;
      if (isAlive(side, order[1])) return;
      const aliveReserve = order.find(n => isAlive(side, n));
      if (!aliveReserve) return;
      const idx = order.indexOf(aliveReserve);
      [order[1], order[idx]] = [order[idx], order[1]];
      if (side === 'cpu') state.target = order[1]; // re-target the new active
    }

    // ============ Long-press detection ============
    // Holds the pointer 450ms with <12px of movement → fires onLongPress.
    // Quick release → fires onTap (if provided).
    // Drag/scroll cancels everything.
    const LONG_PRESS_MS = 450;
    const MOVE_TOLERANCE = 12;

    function attachLongPress(el, onLongPress, onTap) {
      let timer = null;
      let startX = 0, startY = 0;
      let fired = false;
      let active = false;

      function start(e) {
        // Only respond to primary pointer
        if (e.button !== undefined && e.button !== 0) return;
        const t = e;
        startX = t.clientX;
        startY = t.clientY;
        fired = false;
        active = true;
        el.classList.add('long-pressing');
        timer = setTimeout(() => {
          if (!active) return;
          fired = true;
          el.classList.remove('long-pressing');
          onLongPress();
        }, LONG_PRESS_MS);
      }
      function move(e) {
        if (!active) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.hypot(dx, dy) > MOVE_TOLERANCE) cancel();
      }
      function end() {
        if (!active) return;
        const wasFired = fired;
        cancel();
        if (!wasFired && onTap) onTap();
      }
      function cancel() {
        active = false;
        if (timer) { clearTimeout(timer); timer = null; }
        el.classList.remove('long-pressing');
      }

      el.addEventListener('pointerdown', start);
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', end);
      el.addEventListener('pointerleave', cancel);
      el.addEventListener('pointercancel', cancel);
      // Block the iOS Safari context menu since we own the long-press
      el.addEventListener('contextmenu', e => e.preventDefault());
    }

    // ============ Card preview modal ============
    function openCardModal(cardName) {
      const c = CARDS[cardName];
      if (!c) return;
      const modal = $('card-modal');
      const img = $('card-modal-image');
      img.src = '/cards/' + c.img;
      img.alt = cardName;
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeCardModal() {
      const modal = $('card-modal');
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }

    // Tap-anywhere-to-dismiss
    $('card-modal').addEventListener('click', closeCardModal);
    $('card-modal-close').addEventListener('click', e => {
      e.stopPropagation();
      closeCardModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeCardModal();
    });

    // ============ Wire up + init ============
    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', () => playerAttack(parseInt(btn.dataset.tier, 10)));
    });

    renderTeam('player');
    renderTeam('cpu');
    renderPool('player-pool', state.player.gems, 9);
    renderPool('opp-pool', state.cpu.gems, 9);
  </script>
</body>
</html>
